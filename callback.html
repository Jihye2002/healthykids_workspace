<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #f9f9f9;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #03c75a; 
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: #333; font-weight: 500; font-size: 18px; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2 id="status-message">가입 정보를 확인하고 있습니다...</h2>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        async function handleNaverCallback() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash || window.location.search.substring(1));
            const accessToken = params.get('access_token');
            const statusMsg = document.getElementById('status-message');
        
            if (!accessToken) {
                window.location.replace('/index.html');
                return;
            }
        
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                const response = await fetch(`/get-naver-profile?token=${accessToken}`);
                const data = await response.json();
            
                if (data.response) {
                    const p = data.response; // p.name, p.email 등이 들어있음
            
                    // 1. DB에서 사용자 조회
                    let { data: user } = await supabase
                        .from('users')
                        .select('*')
                        .eq('email', p.email)
                        .maybeSingle();
            
                    // 2. DB에 저장할 데이터 준비
                    const userData = { email: p.email, name: p.name };
            
                    if (user) {
                        // [로그인] 기존 유저: 이름이 변경되었을 수 있으므로 업데이트
                        statusMsg.textContent = "로그인 중...";
                        await supabase.from('users').update({ name: p.name }).eq('email', p.email);
                    } else {
                        // [회원가입] 신규 유저
                        statusMsg.textContent = "회원가입 진행 중...";
                        const { error: insertErr } = await supabase.from('users').insert([userData]);
                        if (insertErr) throw insertErr;
                    }
            
                    // 3. Auth 메타데이터 업데이트 (UI 반영용)
                    await supabase.auth.updateUser({ data: { name: p.name } });
                    
                    window.location.replace('/index.html');
                }
            } catch (err) {
                console.error("연동 실패:", err);
                window.location.replace('/login.html');
            }
        handleNaverCallback();
    </script>
</body>
</html>
