<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 처리 중...</title>
</head>
<body>
    <h2>로그인 처리 중입니다. 잠시만 기다려주세요...</h2>
    
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        async function handleCallback() {
            // 1. URL에서 액세스 토큰 추출 (네이버가 # 뒤에 붙여서 보냄)
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');

            if (!accessToken) {
                alert("로그인 정보를 가져올 수 없습니다.");
                window.location.href = '/login.html';
                return;
            }

            // 2. Supabase 설정 가져오기
            const res = await fetch('/get-config');
            const config = await res.json();
            const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);

            // 3. Supabase에 토큰 전달 (signInWithIdToken)
            const { data, error } = await supabase.auth.signInWithIdToken({
                provider: 'naver',
                token: accessToken,
            });

            if (error) {
                console.error("Supabase 로그인 실패:", error);
                alert("로그인 처리 중 오류가 발생했습니다.");
            } else {
                console.log("성공! 메인 페이지로 이동합니다.");
                window.location.href = '/index.html';
            }
        }

        handleCallback();
    </script>
</body>
</html>
