<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 처리 중...</title>
</head>
<body>
    <h2>로그인 처리 중입니다. 잠시만 기다려주세요...</h2>
    
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
        async function handleCallback() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');
    
            if (!accessToken) {
                alert("로그인 정보가 없습니다.");
                window.location.href = '/login.html';
                return;
            }
    
            // 1. 네이버 프로필 정보 가져오기
            const naverRes = await fetch('https://openapi.naver.com/v1/nid/me', {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const result = await naverRes.json();
            const p = result.response; // 네이버 응답 데이터
    
            // 2. Supabase 연결
            const res = await fetch('/get-config');
            const config = await res.json();
            const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
    
            // 3. 사용자 정보 저장 및 업데이트 (UPSERT 방식)
            // email을 기준으로 이미 있으면 업데이트, 없으면 신규 생성합니다.
            const { error } = await supabase
                .from('users')
                .upsert({
                    email: p.email,
                    name: p.name,
                    nickname: p.nickname,
                    profile_image: p.profile_image,
                    gender: p.gender,         // 선택 항목
                    birthday: p.birthday,     // 선택 항목
                    birthyear: p.birthyear
                }, { onConflict: 'email' }); // email이 중복되면 업데이트
    
            if (error) {
                console.error("DB 저장 오류:", error);
                alert("회원 정보 저장 중 오류가 발생했습니다.");
            } else {
                alert(p.name + "님, 환영합니다!");
                window.location.href = '/index.html';
            }
        }
    
        handleCallback();
    </script>
</body>
</html>
