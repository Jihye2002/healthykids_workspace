<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #f9f9f9;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #03c75a; /* 네이버의 상징색 */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: #333; font-weight: 500; font-size: 18px; }
    </style>
</head>
        <body>
            <div class="spinner"></div>
            <h2>로그인 정보를 확인하고 있습니다...</h2>

                <script type="module">
                    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
                
                    async function handleCallback() {
                        // 1. 토큰 가져오기 (Hash 우선, 없으면 Search)
                        const hashParams = new URLSearchParams(window.location.hash.substring(1));
                        const searchParams = new URLSearchParams(window.location.search);
                        let accessToken = hashParams.get('access_token') || searchParams.get('access_token');
                
                        if (!accessToken) {
                            alert("로그인 정보가 없습니다.");
                            window.location.href = '/login.html';
                            return;
                        }
                
                        try {
                            // 2. 네이버 프로필 정보 가져오기
                            const response = await fetch(`/get-naver-profile?token=${accessToken}`);
                            const data = await response.json();
                            
                            if (!data.response) {
                                console.error("데이터 가져오기 실패:", data);
                                alert("사용자 정보를 가져올 수 없습니다.");
                                window.location.href = '/login.html';
                                return;
                            }
                
                            const p = data.response;
                
                            // 3. Supabase 연결
                            const res = await fetch('/get-config');
                            const config = await res.json();
                            const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                            window.supabase = supabase;
                
                            // 4. 가입 여부 확인 및 분기
                            const { data: existingUser } = await supabase
                                .from('users')
                                .select('email')
                                .eq('email', p.email)
                                .maybeSingle();
                
                            if (!existingUser) {
                                window.location.replace(`/signup.html?email=${p.email}&name=${encodeURIComponent(p.name)}`);
                            } else {
                                localStorage.setItem('user_email', p.email);
                                localStorage.setItem('user_name', p.name);
                                window.location.replace('/index.html');
                            }
                        } catch (err) {
                            console.error("처리 중 오류 발생:", err);
                            alert("로그인 처리 중 오류가 발생했습니다.");
                        }
                    }
                
                    handleCallback();
                </script>
        </body>
</html>
