<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #f9f9f9;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #03c75a; /* 네이버의 상징색 */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: #333; font-weight: 500; font-size: 18px; }
    </style>
</head>
        <body>
            <div class="spinner"></div>
            <h2>로그인 정보를 확인하고 있습니다...</h2>

                <script type="module">
                    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

                    async function handleCallback() {
                        // 1. Supabase 초기화
                        const res = await fetch('/get-config');
                        const config = await res.json();
                        const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                    
                        // 2. Supabase 세션 확인 (구글/카카오 로그인 후 리다이렉트 시)
                        const { data: { session } } = await supabase.auth.getSession();
                    
                        if (session) {
                            // 구글/카카오 로그인 성공 케이스
                            const user = session.user;
                            const email = user.email;
                            const name = user.user_metadata.full_name || user.user_metadata.name || "사용자";
                    
                            // DB에 유저가 있는지 확인 (없으면 추가)
                            const { data: existing } = await supabase.from('users').select('*').eq('email', email).maybeSingle();
                            if (!existing) {
                                await supabase.from('users').insert([{ email, name }]);
                            }
                    
                            localStorage.setItem('user_email', email);
                            localStorage.setItem('user_name', name);
                            window.location.replace('/index.html');
                            return;
                        }
                    
                        // 3. 네이버 로그인 케이스 (세션이 없다면 네이버 토큰 확인)
                        const hashParams = new URLSearchParams(window.location.hash.substring(1));
                        const searchParams = new URLSearchParams(window.location.search);
                        let accessToken = hashParams.get('access_token') || searchParams.get('access_token');
                    
                        if (accessToken) {
                            try {
                                const response = await fetch(`/get-naver-profile?token=${accessToken}`);
                                const data = await response.json();
                    
                                if (!data.response) throw new Error("네이버 프로필 정보 없음");
                    
                                const p = data.response;
                                const { data: existingUser } = await supabase
                                    .from('users')
                                    .select('email, name')
                                    .eq('email', p.email)
                                    .maybeSingle();
                    
                                if (!existingUser) {
                                    // 신규 유저: 가입 페이지로 이동 (정보 전달)
                                    window.location.replace(`/signup.html?email=${encodeURIComponent(p.email)}&name=${encodeURIComponent(p.name)}`);
                                } else {
                                    // 기존 유저: 로그인 처리
                                    localStorage.setItem('user_email', existingUser.email);
                                    localStorage.setItem('user_name', existingUser.name);
                                    localStorage.setItem('login_type', 'naver');
                                    window.location.replace('/index.html');
                                }
                            } catch (err) {
                                console.error("네이버 처리 중 오류:", err);
                                alert("로그인 처리 중 오류가 발생했습니다.");
                                window.location.href = '/login.html';
                            }
                        } else {
                            alert("로그인 정보가 없습니다.");
                            window.location.href = '/login.html';
                        }
                    }
                    
                    handleCallback();
                </script>
        </body>
</html>
