<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 처리 중...</title>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Pretendard', sans-serif; background-color: #f9f9f9; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e0e0e0; border-top: 5px solid #03c75a; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #333; font-weight: 500; font-size: 18px; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2 id="status-message">가입 정보를 확인하고 있습니다...</h2>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        async function handleNaverCallback() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash || window.location.search.substring(1));
            const accessToken = params.get('access_token');
            const statusMsg = document.getElementById('status-message');
        
            if (!accessToken) {
                window.location.replace('/index.html');
                return;
            }
        
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                
                const response = await fetch(`/get-naver-profile?token=${accessToken}`);
                const data = await response.json();
            
                if (data.response) {
                    const p = data.response;
                    console.log("네이버 프로필 데이터:", p);
            
                    localStorage.setItem('user', JSON.stringify({
                        email: p.email,
                        name: p.name,
                        provider: 'naver'
                    }));
            
                    // 1. 기존 유저 조회
                    let { data: user, error: fetchErr } = await supabase
                        .from('users')
                        .select('email')
                        .eq('email', p.email)
                        .maybeSingle();
            
                    if (fetchErr) console.error("조회 에러:", fetchErr);
            
                    // 2. 업데이트 또는 삽입
                    if (user) {
                    statusMsg.textContent = "로그인 중...";
                    const { error: updateErr } = await supabase
                        .from('users')
                        .update({ name: p.name })
                        .eq('email', p.email);
                    
                    if (updateErr) {
                        console.error("업데이트 실패:", updateErr);
                        // 업데이트 실패 시 강제로 멈추거나 예외 처리
                        throw new Error("DB 업데이트 실패: " + updateErr.message);
                    }
                    console.log("DB 업데이트 성공!");
                } else {
                    statusMsg.textContent = "회원가입 진행 중...";
                    const { error: insertErr } = await supabase
                        .from('users')
                        .insert({ 
                            email: p.email, 
                            name: p.name 
                        });
                    
                    if (insertErr) {
                        console.error("DB 삽입 실패! 에러 상세:", insertErr);
                        // 삽입 실패 시 강제로 멈추거나 예외 처리
                        throw new Error("DB 삽입 실패: " + insertErr.message);
                    }
                    console.log("DB 삽입 성공!");
                }
                
                // 위 로직이 모두 에러 없이 통과되면 여기로 넘어옵니다.
                statusMsg.textContent = "완료되었습니다!";
                window.location.replace('/index.html');
                } else {
                    throw new Error("네이버 프로필 정보를 가져올 수 없습니다.");
                }
            } catch (err) {
                console.error("연동 실패:", err);
                statusMsg.textContent = "오류 발생! 콘솔을 확인하세요.";
            }
        }
        
        handleNaverCallback();
    </script>
</body>
</html>
