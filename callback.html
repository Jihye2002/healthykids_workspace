<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #f9f9f9;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #03c75a; 
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: #333; font-weight: 500; font-size: 18px; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2 id="status-message">가입 정보를 확인하고 있습니다...</h2>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        async function handleNaverCallback() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash || window.location.search.substring(1));
            const accessToken = params.get('access_token');
            const statusMsg = document.getElementById('status-message');
        
            if (!accessToken) {
                window.location.replace('/index.html');
                return;
            }
        
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                const response = await fetch(`/get-naver-profile?token=${accessToken}`);
                const data = await response.json();
            
                if (data.response) {
                    const p = data.response; // 네이버 프로필 정보
            
                    // 1. [로컬 저장] 네이버 사용자 정보 저장 (index.html에서 식별용)
                    localStorage.setItem('user', JSON.stringify({
                        email: p.email,
                        name: p.name,
                        provider: 'naver'
                    }));
            
                    // 2. [DB 처리] users 테이블에서 사용자 조회
                    let { data: user } = await supabase
                        .from('users')
                        .select('*')
                        .eq('email', p.email)
                        .maybeSingle();
            
                    // 3. [DB 업데이트 또는 삽입]
                    if (user) {
                        statusMsg.textContent = "로그인 중...";
                        await supabase.from('users').update({ name: p.name }).eq('email', p.email);
                    } else {
                        statusMsg.textContent = "회원가입 진행 중...";
                        const { error: insertErr } = await supabase.from('users').insert([{ 
                            email: p.email, 
                            name: p.name 
                        }]);
                        if (insertErr) throw insertErr;
                    }
            
                    statusMsg.textContent = "완료되었습니다!";
                    window.location.replace('/index.html');
                } else {
                    throw new Error("네이버 프로필 정보를 가져올 수 없습니다.");
                }
            } catch (err) {
                console.error("연동 실패:", err);
                statusMsg.textContent = "오류 발생! 로그인 페이지로 이동합니다.";
                setTimeout(() => window.location.replace('/login.html'), 2000);
            }
        }
        
        handleNaverCallback();
    </script>
</body>
</html>
