<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 처리 중...</title>
</head>
<body>
    <h2>로그인 처리 중입니다. 잠시만 기다려주세요...</h2>
    
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        async function handleCallback() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');

            if (!accessToken) {
                alert("로그인 정보가 없습니다.");
                window.location.href = '/login.html';
                return;
            }

            // 1. 서버를 통해 안전하게 네이버 프로필 정보 가져오기
            const response = await fetch(`/get-naver-profile?token=${accessToken}`);
            const data = await response.json();
            
            if (!data.response) {
                console.error("데이터 가져오기 실패:", data);
                alert("사용자 정보를 가져올 수 없습니다.");
                return;
            }

            const p = data.response;

            // 2. Supabase 연결
            const res = await fetch('/get-config');
            const config = await res.json();
            const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);

            // 3. Supabase DB에 정보 저장 (Upsert)
            const { error } = await supabase
                .from('users')
                .upsert({
                    email: p.email,
                    name: p.name,
                    nickname: p.nickname,
                    profile_image: p.profile_image,
                    gender: p.gender,
                    birthday: p.birthday,
                    birthyear: p.birthyear
                }, { onConflict: 'email' });

            // ... (기존 DB 저장 코드)
            if (error) {
                alert("오류 발생");
            } else {
                // [핵심] index.html이 볼 수 있도록 이메일을 저장
                localStorage.setItem('user_email', p.email); 
                // alert(p.name + "님, 환영합니다!"); // 이 팝업은 없애거나 그대로 두셔도 됩니다.
                window.location.replace('/index.html');
            }

        handleCallback();
    </script>
</body>
</html>
