<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #f9f9f9;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #03c75a; /* 네이버의 상징색 */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: #333; font-weight: 500; font-size: 18px; }
    </style>
</head>
        <body>
            <div class="spinner"></div>
            <h2>로그인 정보를 확인하고 있습니다...</h2>

                <script type="module">
                    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

                    async function handleNaverCallback() {
                        // URL에서 토큰 확인
                        const hash = window.location.hash.substring(1);
                        const params = new URLSearchParams(hash || window.location.search.substring(1));
                        const accessToken = params.get('access_token');
                    
                        // 만약 네이버 토큰이 없다면? (잘못 들어온 경우)
                        if (!accessToken) {
                            window.location.replace('/index.html');
                            return;
                        }
                    
                        try {
                            // Supabase 초기화
                            const res = await fetch('/get-config');
                            const config = await res.json();
                            const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                    
                            // 네이버 프로필 조회 (서버 API 호출)
                            const response = await fetch(`/get-naver-profile?token=${accessToken}`);
                            const data = await response.json();
                    
                            if (data.response) {
                                const p = data.response; // p.email, p.name 등
                    
                                // DB 확인 및 가입/로그인 처리
                                let { data: user } = await supabase
                                    .from('users')
                                    .select('*')
                                    .eq('email', p.email)
                                    .maybeSingle();
                    
                                if (!user) {
                                    const { data: newUser } = await supabase
                                        .from('users')
                                        .insert([{ email: p.email, name: p.name }])
                                        .select()
                                        .single();
                                    user = newUser;
                                }
                    
                                // 세션 저장 및 이동
                                localStorage.setItem('user_email', user.email);
                                localStorage.setItem('user_name', user.name);
                                window.location.replace('/index.html');
                            }
                        } catch (err) {
                            console.error("네이버 연동 실패:", err);
                            window.location.replace('/login.html');
                        }
                    }
                    
                    handleNaverCallback();
                </script>
        </body>
</html>
