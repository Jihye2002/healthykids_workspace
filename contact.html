<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 | 사용자지원</title>
    <style>
        /* 기본 리셋 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background-color: #fff; }

        /* --- 헤더 --- */
        .header { display: flex; align-items: center; padding: 10px 20px; flex-wrap: nowrap; gap: 20px; width: 100%;}
        .logo { flex-shrink: 0; }
        .logo img { display: block; width: 100%; max-width: 180px; height: auto; }
        .container { 
            display: flex; 
            align-items: center; 
            width: 100%; 
            gap: 20px; 
            flex: 1; 
            justify-content: space-between;
        }
        .search-bar { 
            display: flex; 
            align-items: center; 
            flex: 1;
            max-width: 800px;
            gap: 8px; 
        }
        .search-bar input { flex: 1 1 auto; padding: 10px; font-size: 15px; border: 1px solid #316ef4; min-width: 50px; border-radius: 5px; }
        .search-bar button { background-color: #fff; border: none; cursor: pointer; flex-shrink: 0; width: 30px; }
        .user-menu {
            display: flex;
            align-items: center;
            justify-content: flex-end; 
            white-space: nowrap;
            flex-shrink: 0;
            font-size: 15px;
            font-weight: 600;
        }
        
        #before-login {
            display: flex;
            align-items: center; /* 로그인, |, 회원가입을 한 줄로 정렬 */
        }

        /* 기존 스타일 아래에 추가 */
        #after-login {
            display: none; /* 기본적으로 숨김 처리 */
        }
        
        .user-menu a {
            white-space: nowrap;
            text-decoration: none;
            color: #6d6d6d;
            padding: 0 5px; 
            display: flex; /* 링크 안의 텍스트도 정렬 유지 */
            align-items: center;
        }
        
        .user-menu a:hover {
            color: #000000; 
        }
        
        .divider {
            margin: 0 4px;
            color: #6d6d6d;
            display: flex;       /* 추가: 수평 정렬을 위해 */
            align-items: center; /* 추가: 수평 정렬을 위해 */
        }
        /* --- 내비게이션 --- */
        /* --- 네비게이션바 전체 설정 --- */
        .navbar { 
            background-color: #2f63c7; 
            position: relative; 
        }

        .menu-list { 
            width: 100%;
            display: flex; 
            justify-content: center; /* 메뉴를 가로 중앙으로 정렬 */
            align-items: center;
            flex-wrap: nowrap;
            white-space: nowrap;
            list-style: none; 
            padding: 0;         /* 위아래 적절한 여백 */
            margin: 0;
            overflow-x: visible;
        }

        .menu-list > li { 
            flex: 1; 
            padding: 0 20px;
            text-align: center;
            position: relative;
            white-space: nowrap;
        }

        /* 상단 메인 메뉴 링크 스타일 */
        .menu-list > li { 
            display: block; 
            padding: 10px 15px; 
            color: white; 
            text-decoration: none; 
            font-weight: 600;
            transition: background 0.3s;
            white-space: nowrap;
        }

        /* 1. 메가 메뉴 전체 패널 */
        .mega-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%; 
            background-color: #ffffff;
            border-bottom: 3px solid #2f63c7;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        /* 호버 시 메가 메뉴 나타남 */
        .navbar:hover .mega-menu {
            display: block; 
        }

        /* 2. 컬럼 컨테이너 (정렬 담당) */
        .mega-content {
            display: flex;
            justify-content: stretch;
            width: 100%;
            padding: 20px 0;
        }

        /* 3. 각 컬럼 스타일 */
        .column {
            flex: 1;
            text-align: center;
            border-right: 1px solid #eee;
        }

        .column:last-child {
            border-right: none;
        }

        .column ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .column ul li a {
            color: #333;
            padding: 10px 0;
            display: block;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .column ul li a:hover {
            color: #2f63c7;
            font-weight: bold;
            background-color: #f8fbff;
        }        

        .page-container { max-width: 600px; margin: 50px auto; padding: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        .submit-btn { width: 100%; padding: 15px; background: #2f63c7; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .submit-btn:hover { background: #234d9e; }
    </style>
</head>
<body>

    <div class="container">
        <form class="search-bar" action="search.html" method="get">
            <input type="text" name="q" placeholder="검색어를 입력하세요">
            <button type="submit"><img src="https://github.com/Jihye2002/healthykids_workspace/blob/main/search.png?raw=true" alt="검색버튼" width="40" height="40"></button>

    </ul>

    <div class="mega-menu">
        <div class="mega-content">
            <div class="column">
                <ul>
                    <li><a href="edit-profile.html">개인정보 수정</a></li>
                    <li><a href="withdraw.html">회원탈퇴</a></li>
                </ul>
            </div>

            <div class="column">
                <ul>
                    <li><a href="ongoing.html">진행중인 영상</a></li>
                    <li><a href="video.html?type=hygiene">위생안전</a></li>

                </ul>

            <div class="column">
                <ul>
                    <li>
                        <a href="viewer.html?file=하루건강체크리스트.pdf">하루건강 체크리스트</a>

                    <li><a href="viewer.html?file=퀴즈.pdf">퀴즈</a></li>
                    <li><a href="viewer.html?file=활동지.pdf">활동지</a></li>

            <div class="column">
                <ul>
                    <li><a href="viewer.html?file=위생안전수칙.pdf">위생안전자료</a></li>

<div class="page-container">
    <h2>1:1 상담 문의</h2>
    <form id="contact-form">
        <div class="input-group">
            <label>이름</label>
            <input type="text" id="name" required placeholder="이름을 입력해주세요">
        </div>
        <div class="input-group">
            <label>이메일</label>
            <input type="email" id="email" required placeholder="답변받으실 이메일 주소">
        </div>
        <div class="input-group">
            <label>문의 내용</label>
            <textarea id="message" rows="8" required placeholder="문의하실 내용을 자세히 적어주세요"></textarea>
        </div>
        <button type="submit" class="submit-btn">문의하기</button>
    </form>
</div>


<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // 1. 전역 상태 관리
    window.supabaseInstance = null;
    window.initPromise = null;

    async function initSupabase() {
        if (window.supabaseInstance) return window.supabaseInstance;
        
        if (sessionStorage.getItem('is_sb_initialized') === 'true') {
            const config = JSON.parse(sessionStorage.getItem('sb_config'));
            window.supabaseInstance = createClient(config.url, config.key);
            return window.supabaseInstance;
        }

        if (window.initPromise) return window.initPromise;

        window.initPromise = (async () => {
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                sessionStorage.setItem('sb_config', JSON.stringify({ url: config.SUPABASE_URL, key: config.SUPABASE_ANON_KEY }));
                sessionStorage.setItem('is_sb_initialized', 'true');
                window.supabaseInstance = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                return window.supabaseInstance;
            } catch (err) {
                console.error("초기화 실패:", err);
                return null;
            }
        })();
        return window.initPromise;
    }

    async function clearAllAuth() {
        const sb = await initSupabase();
        if (sb) await sb.auth.signOut();
        localStorage.clear();
        sessionStorage.clear();
    }

    // 2. UI 업데이트
    async function updateUI(session) {
        const sb = await initSupabase();
        const beforeLogin = document.getElementById('before-login');
        const afterLogin = document.getElementById('after-login');
        const welcomeMsg = document.getElementById('welcome-message');

        const naverUser = JSON.parse(localStorage.getItem('user'));
        const isNaver = naverUser && naverUser.provider === 'naver';
        const currentUser = session?.user || (isNaver ? naverUser : null);

        if (!currentUser) {
            if (beforeLogin) beforeLogin.style.display = 'flex';
            if (afterLogin) afterLogin.style.display = 'none';
            return;
        }

        if (beforeLogin) beforeLogin.style.display = 'none';
        if (afterLogin) afterLogin.style.display = 'flex';

        try {
            let displayName = "사용자";
            if (isNaver) {
                const { data: dbUser } = await sb.from('users').select('name').eq('email', naverUser.email).maybeSingle();
                displayName = dbUser?.name || naverUser.name || "사용자";
            } else {
                const provider = currentUser.app_metadata?.provider;
                const isSocial = ['google', 'kakao'].includes(provider);
                const table = isSocial ? 'users' : 'public.users';
                const col = isSocial ? 'name' : 'nickname';
                const { data: dbUser } = await sb.from(table).select(col).eq('email', currentUser.email).maybeSingle();
                displayName = dbUser?.[col] || currentUser.user_metadata?.[col] || "사용자";
            }
            if (welcomeMsg) welcomeMsg.textContent = displayName;
        } catch (err) { console.error("UI 업데이트 오류:", err); }
    }

    async function init() {
        const sb = await initSupabase();
        if (!sb) return;

        // 로그아웃 버튼 이벤트 리스너 (중복 방지: 여기서 한 번만 등록)
        document.getElementById('logout-btn')?.addEventListener('click', async (e) => {
            e.preventDefault();
            await clearAllAuth();
            window.location.reload();
        });

        // 세션 체크 및 UI 업데이트
        const { data: { session } } = await sb.auth.getSession();
        updateUI(session);

        sb.auth.onAuthStateChange((event, session) => {
            updateUI(session);
        });
    }

    document.addEventListener('DOMContentLoaded', init);

    // 문의하기 버튼 제출
    document.getElementById('contact-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const sb = await initSupabase();
        const { data: { session } } = await sb.auth.getSession();
        
        const insertData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            message: document.getElementById('message').value,
            user_id: session?.user?.id || null 
        };

        const { error } = await sb.from('inquiries').insert([insertData]);

        if (error) {
            console.error("DB 저장 에러:", error);
            alert('문의 접수 중 오류가 발생했습니다.');
        } else {
            alert('문의가 성공적으로 접수되었습니다!');
            document.getElementById('contact-form').reset();
        }
    });
</script>
</body>
