<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>헬시키즈 | 내 정보 수정</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #afe1fc; }
        .box { background: white; padding: 30px; width: 400px; margin: 0 auto; border: 2px solid #2f63c7; text-align: left; border-radius: 20px; }
        h2 { text-align: center; color: #2f63c7; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .input-field { width: 100%; padding: 10px; border: 2px solid #ddd; outline: none; box-sizing: border-box; border-radius: 8px; }
        .input-field:focus { border: 2px solid #000; }
        
        /* 수정 불가 필드 스타일 */
        .input-field:disabled { background-color: #e0e0e0; color: #666; cursor: not-allowed; border-color: #ccc; }
        
        #status-msg { margin: 15px 0; padding: 15px; border-radius: 10px; display: none; text-align: center; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fail { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .btn-save { background-color: #2f63c7; color: white; border: none; padding: 15px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 10px; font-size: 16px; margin-top: 10px; }
        .btn-pw { display:block; margin-top:20px; text-align:center; color: #2f63c7; text-decoration: underline; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>내 정보 수정</h2>
        
        <div id="status-msg"></div>

        <div class="input-group">
            <label>이름 (고칠 수 없어요!)</label>
            <input type="text" id="name" class="input-field" disabled>
        </div>

        <div class="input-group">
            <label>아이디 (알파벳과 숫자를 같이 3글자~12글자 써주세요!)</label>
            <input type="text" id="user-id" class="input-field">
        </div>

        <div class="input-group">
            <label>나만의 특별한 별명을 지어봐요!</label>
            <input type="text" id="nickname" class="input-field">
        </div>

        <div class="input-group">
            <label>비밀번호 찾기 질문</label>
            <input type="text" id="question" class="input-field">
        </div>

        <div class="input-group">
            <label>질문에 대한 답을 자음과 모음을 섞어서 한글로 1글자나 더 길게 써주세요!</label>
            <input type="text" id="answer" class="input-field">
        </div>

        <button class="btn-save" id="submit-btn" onclick="saveProfile()">저장하기</button>
        
        <a href="update-password.html" class="btn-pw">비밀번호를 바꾸고 싶어요!</a>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        let supabase;

        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
            loadUserData();
        }

        async function loadUserData() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;
            
            const { data } = await supabase.from('public.users')
                .select('*')
                .eq('id', user.id) // 고유 ID로 조회
                .single();

            if (data) {
                document.getElementById('name').value = data.name;
                document.getElementById('user-id').value = data.email.split('@')[0];
                document.getElementById('nickname').value = data.nickname;
                document.getElementById('question').value = data.security_question || "";
                document.getElementById('answer').value = data.security_answer || "";
            }
        }

        window.saveProfile = async () => {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            
            const userId = document.getElementById('user-id').value.trim().toLowerCase();
            const nickname = document.getElementById('nickname').value.trim();
            const question = document.getElementById('question').value.trim();
            const answer = document.getElementById('answer').value.trim();
            
            if (!/^(?=.*[a-z])(?=.*\d)[a-z0-9]{3,12}$/.test(userId)) {
                showMessage("아이디는 영어+숫자 조합 3~12글자로 적어주세요!", false);
                submitBtn.disabled = false; return;
            }
            if (!nickname) { showMessage("별명을 써주세요!", false); submitBtn.disabled = false; return; }
            if (!/^[가-힣]+$/.test(answer)) { showMessage("정답은 한글로 적어주세요!", false); submitBtn.disabled = false; return; }

            const { data: { user } } = await supabase.auth.getUser();
            const newEmail = `${userId}@healthykids.com`;

            // DB 업데이트
            const { error } = await supabase.from('public.users').update({
                nickname, security_question: question, security_answer: answer, email: newEmail
            }).eq('id', user.id);

            // 이메일 변경 처리
            if (newEmail !== user.email) {
                await supabase.auth.updateUser({ email: newEmail });
            }

            if (error) { 
                showMessage("오류가 발생했어요. 다시 시도해 주세요!", false); 
                submitBtn.disabled = false; 
            } else { 
                showMessage("성공! 변경된 정보로 다시 아이디와 비밀번호를 써봐요!", true);
                setTimeout(async () => {
                    await supabase.auth.signOut(); 
                    location.href = "login.html"; 
                }, 3000);
            }
        };

        function showMessage(msg, isSuccess) {
            const box = document.getElementById('status-msg');
            box.textContent = msg;
            box.className = isSuccess ? 'success' : 'fail';
            box.style.display = 'block';
        }

        init();
    </script>
</body>
</html>
