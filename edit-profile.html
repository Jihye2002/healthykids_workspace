<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>헬시키즈 | 내 정보 수정</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #afe1fc; }
        .box { background: white; padding: 30px; width: 400px; margin: 0 auto; border: 2px solid #2f63c7; text-align: left; }
        h2 { text-align: center; color: #2f63c7; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .input-field { width: 100%; padding: 10px; border: 2px solid #ddd; outline: none; box-sizing: border-box; }
        .input-field:focus { border: 2px solid #000; }
        .input-field:disabled { background-color: #f0f0f0; color: #888; cursor: not-allowed; }
        
        /* 아이디 밑 비밀번호 배치 레이아웃 */
        .pw-container { display: flex; gap: 10px; align-items: center; }
        .btn-pw { white-space: nowrap; background-color: #2f63c7; color: white; padding: 10px; text-decoration: none; font-size: 12px; font-weight: bold; border: none; cursor: pointer; }

        #status-msg { margin: 15px 0; padding: 15px; display: none; text-align: center; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fail { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .btn-save { background-color: #2f63c7; color: white; border: none; padding: 15px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>내 정보 수정</h2>
        <div id="status-msg"></div>

        <div class="input-group">
            <label>이름 (고칠 수 없어요!)</label>
            <input type="text" id="name" class="input-field" disabled>
        </div>
        
        <div class="input-group">
            <label>아이디</label>
            <input type="text" id="user-id" class="input-field">
        </div>

        <div class="input-group">
            <label>비밀번호</label>
            <div class="pw-container">
                <input type="password" value="********" class="input-field" disabled>
                <a href="update-password.html" class="btn-pw">비밀번호를 바꿀래요!</a>
            </div>
        </div>

        <div class="input-group">
            <label>나만의 특별한 별명</label>
            <input type="text" id="nickname" class="input-field">
        </div>
        <div class="input-group">
            <label>비밀번호 찾기 질문</label>
            <input type="text" id="question" class="input-field">
        </div>
        <div class="input-group">
            <label>질문에 대한 답 (한글 1글자 이상)</label>
            <input type="text" id="answer" class="input-field">
        </div>

        <button class="btn-save" id="submit-btn" onclick="saveProfile()">저장하기</button>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        let supabase;

        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
            loadUserData();
        }

        async function loadUserData() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;
            
            const { data, error } = await supabase.from('public.users')
                .select('name, email, nickname, security_question, security_answer')
                .eq('id', user.id)
                .single();

            if (data) {
                document.getElementById('name').value = data.name || "";
                document.getElementById('user-id').value = data.email ? data.email.split('@')[0] : "";
                document.getElementById('nickname').value = data.nickname || "";
                document.getElementById('question').value = data.security_question || "";
                document.getElementById('answer').value = data.security_answer || "";
            }
        }

        window.saveProfile = async () => {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            
            const userId = document.getElementById('user-id').value.trim().toLowerCase();
            const nickname = document.getElementById('nickname').value.trim();
            const question = document.getElementById('question').value.trim();
            const answer = document.getElementById('answer').value.trim();
            
            if (!/^[a-z0-9]{3,12}$/.test(userId)) {
                showMessage("아이디는 영어+숫자 조합 3~12글자로 적어주세요!", false);
                submitBtn.disabled = false; return;
            }
            if (!nickname) { showMessage("별명을 입력해주세요!", false); submitBtn.disabled = false; return; }
            if (!/^[가-힣]+$/.test(answer)) { showMessage("정답은 한글로 적어주세요!", false); submitBtn.disabled = false; return; }

            const { data: { user } } = await supabase.auth.getUser();
            const newEmail = `${userId}@healthykids.com`;

            const { error } = await supabase.from('public.users').update({
                nickname, security_question: question, security_answer: answer, email: newEmail
            }).eq('id', user.id);

            if (newEmail !== user.email) {
                await supabase.auth.updateUser({ email: newEmail });
            }

            if (error) { 
                showMessage("오류가 발생했어요. 다시 시도해 주세요!", false); 
                submitBtn.disabled = false; 
            } else { 
                showMessage("성공! 다시 로그인해 주세요.", true);
                setTimeout(async () => {
                    await supabase.auth.signOut(); 
                    location.href = "login.html"; 
                }, 2000);
            }
        };

        function showMessage(msg, isSuccess) {
            const box = document.getElementById('status-msg');
            box.textContent = msg;
            box.className = isSuccess ? 'success' : 'fail';
            box.style.display = 'block';
        }

        init();
    </script>
</body>
</html>
