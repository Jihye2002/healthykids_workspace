<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>헬시키즈 | 계정 찾기</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 40px; background-color: #afe1fc; }
        
        .main-box { 
            background: white; 
            padding: 40px; 
            width: 600px; 
            margin: 40px auto; 
            border: 2px solid #2f63c7; 
            text-align: left; 
        }

        .background-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            pointer-events: none;
        }

        .floating-shape {
            position: fixed;
            z-index: 0;
            animation: floatShape 6s infinite ease-in-out;
        }

        @keyframes floatShape {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* 도형 모양들 */
        .star { color: #b39ddb; font-size: 24px; }
        .triangle { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 20px solid #ffcc80; }
        
        h2 { text-align: center; margin-top: 0; }
        h3 { color: #2f63c7; margin-bottom: 10px; }
        
        .container { display: flex; align-items: stretch; gap: 30px; margin-top: 20px; }
        .section { flex: 1; }
        .divider { border-left: 1.5px solid #ddd; margin: 10px 0; }
        
        .input-wrapper { width: 100%; height: 45px; margin: 8px 0; border: 2px solid #ddd; display: flex; align-items: center; background: white; }
        .input-field { width: 100%; height: 100%; border: none; outline: none; padding: 0 12px; }

        .notice {
            background-color: #fff0f0;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ffcccc;
            line-height: 1.5;
        }
        
        button { width: 100%; background-color: #2f63c7; color: white; border: none; padding: 12px; margin-top: 30px; cursor: pointer; font-weight: bold; text-align: center; }

        #id-result {
            color: #2f63c7;
        }
        
        #pw-result {
            margin-top: 15px;
            font-weight: bold;
            color: #316ef4;
            text-align: center;
        }
            
        
        .qna-box { 
            margin-top: 25px; 
            padding: 20px; 
            border: 2px solid #2f63c7; 
            background-color: #f8fbff; 
            display: none;
        }

        .result-area {
            margin-top: 25px;
            padding: 15px;
            border-top: 2px solid #2f63c7;
            text-align: center;
        }
        
        #temp-pw-display {
            background-color: transparent !important;
            font-size: 16px;
            color: #2f63c7;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
        }

        .login-link {
            color: rgb(128, 128, 128); 
            text-decoration: none; 
            font-weight: bold;
            transition: color 0.3s ease;
        }
    
        .login-link:hover {
            color: rgb(50, 50, 50);
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 14px;
        }
        
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2s;
        }
        
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div class="background-elements">
        <div class="floating-shape" style="top: 15%; left: 10%; font-size: 35px; color: #a2d2ff; transform: rotate(15deg);">★</div>
        <div class="floating-shape" style="top: 55%; right: 8%; font-size: 28px; color: #fdfd96; transform: rotate(-20deg);">★</div>
        
        <div class="floating-shape" style="width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 25px solid #ffcc80; top: 10%; left: 40%;"></div>
        <div class="floating-shape" style="width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 35px solid #a0c4ff; top: 85%; right: 35%;"></div>
    </div>

    <div class="main-box">
        <h2>계정 찾기</h2>
        <p style="text-align: center; color: #444; margin-bottom: 30px;">
            아이디나 비밀번호를 잊으셨나요? 아래에서 정보를 입력해 주세요!
        </p>

        <div class="container">
            <div class="section">
                <h3>아이디 찾기</h3>
                <div class="input-wrapper">
                    <input type="text" id="find-nickname" class="input-field" placeholder="회원가입, 개인정보 수정 메뉴에서 입력하신 별명으로!">
                </div>
                <button onclick="findId()">아이디 찾기</button>
                <div id="id-result" class="result-text"></div>
            </div>

            <div class="divider"></div>

            <div class="section">
                <h3>비밀번호 찾기</h3>
                <div class="input-wrapper">
                    <input type="text" id="find-pw-id" class="input-field" placeholder="아이디를 입력해 주세요!">
                </div>
                <button onclick="requestSecurityQuestion()">비밀번호 질문 확인</button>
            </div>
        </div>

        <div id="qna-box" class="qna-box">
            <h3 style="margin-top: 0;">질문 확인</h3>
            <p id="security-question-text" style="font-weight: bold; color: #73625d;"></p>
            <div class="input-wrapper">
                <input type="text" id="security-answer" class="input-field" placeholder="답을 입력하세요!">
            </div>
            <button onclick="verifyAnswer()" style="background-color: #ffd700; color: #fff;">답변 확인하기</button>
    
            <div id="pw-result" class="result-area" style="display: none;">
                <p id="pw-message" style="color: #2f63c7; font-weight: bold;"></p>
                
                <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
                    <div class="input-wrapper" style="border: 2px dashed #2f63c7; background: #eef6ff; flex: 1; margin: 0; height: 45px;">
                        <input type="text" id="temp-pw-display" class="input-field" readonly style="text-align:center; font-weight:bold; cursor:pointer; background: transparent; height: 100%;">
                    </div>
                    
                    <button onclick="copyPassword()" title="복사해요!" style="
                        margin: 0; 
                        width: 48px; 
                        height: 48px; 
                        background-color: #ffd700; 
                        border: 2px solid #ffcc00;  
                        cursor: pointer; 
                        display: flex; 
                        align-items: center; 
                        justify-content: center;
                        padding: 0;">
                        <img src="https://cdn-icons-png.flaticon.com/512/1621/1621635.png" alt="복사" style="width: 22px; height: 22px; filter: invert(1);">
                    </button>
                </div>

                <div id="toast">비밀번호가 복사되었어요!</div>

                <p class="notice" style="color: #d9534f; font-size: 13px; margin: 10px 0;">
                    ⚠️ <b>주의:</b> 이 임시 비밀번호는 <b>한 번만 사용 가능</b>해요.<br>
                    로그인 후 반드시 '개인정보 수정' 메뉴로 들어가셔서 비밀번호를 새로 만들어 주세요!
                </p>
                
                <a href="login.html" class="login-link">로그인하러 가기</a>
            </div>
        </div>

    </div>
    
    <script type="module">
         import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    

        let supabase = null;

        let currentSecurityAnswer = "";

        let currentUserId = "";

    

        // Supabase 초기화

        async function initSupabase() {

            if (supabase) return supabase;

            const res = await fetch('/get-config');

            const config = await res.json();

            supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);

            return supabase;

        }

    

        function setError(inputField, message) {

            clearError(inputField);

            const errorSpan = document.createElement('span');

            errorSpan.className = 'error-text';

            errorSpan.style.color = "#ff4d4d";

            errorSpan.style.fontSize = "12px";

            errorSpan.style.display = "block";

            errorSpan.style.marginTop = "5px";

            errorSpan.textContent = message;

            inputField.parentElement.after(errorSpan);

        }



        // 모든 에러 메시지를 한 번에 지우는 단 하나의 함수
        function clearAllErrors() {
            // 모든 에러 텍스트 제거
            document.querySelectorAll('.error-text').forEach(el => el.remove());
            // 입력창 테두리 초기화
            document.querySelectorAll('.input-field').forEach(el => el.style.borderColor = "#ddd");
        }
  

        window.findId = async function() {
            clearAllErrors(); // [통합] 누르는 순간 모든 에러 삭제
            const sb = await initSupabase();
            const inputField = document.getElementById('find-nickname');
            const nickname = inputField.value.trim();
            
            if (!nickname) return setError(inputField, "별명을 입력해주세요!");
            
            const { data } = await sb.from('users').select('email').eq('nickname', nickname).maybeSingle();
            if (data) {
                const fullEmail = data.email;
                document.getElementById('id-result').textContent = `찾았다! 아이디는 '${fullEmail.split('@')[0]}'예요!`;
                const pwInput = document.getElementById('find-pw-id');
                pwInput.value = fullEmail.split('@')[0];
                pwInput.dataset.fullEmail = fullEmail; 
            } else {
                setError(inputField, "일치하는 별명을 찾을 수 없어요.");
            }
        };
        
        window.requestSecurityQuestion = async function() {
            clearAllErrors(); // [통합] 누르는 순간 모든 에러 삭제
            const sb = await initSupabase();
            const inputField = document.getElementById('find-pw-id');
            const fullEmail = inputField.dataset.fullEmail;
        
            if (!fullEmail) return setError(inputField, "아이디 찾기를 먼저 수행해주세요.");
        
            const { data } = await sb.from('users').select('id, security_question, security_answer').eq('email', fullEmail).maybeSingle();
            if (data) {
                currentUserId = data.id;
                currentSecurityAnswer = data.security_answer;
                document.getElementById('security-question-text').textContent = `질문: ${data.security_question}`;
                document.getElementById('qna-box').style.display = "block";
            } else {
                setError(inputField, "해당 아이디를 찾을 수 없어요.");
            }
        };

    

        window.verifyAnswer = async function() {

            const sb = await initSupabase();

            const inputField = document.getElementById('security-answer');

            const inputAnswer = inputField.value.trim();

            

            if (inputAnswer === currentSecurityAnswer) {

                const finalTempPassword = Math.random().toString(36).slice(-8) + "!A1";

                

                const { error } = await sb.rpc('force_update_password', {

                    target_id: currentUserId,

                    new_password: finalTempPassword,

                    new_usage: 0,

                    new_is_temp: true

                });

        

                if (error) {

                    console.error("DB 업데이트 오류:", error);

                    return setError(inputField, "서버 통신 오류가 발생했습니다.");

                }

        

                document.getElementById('pw-result').style.display = "block";

                document.getElementById('pw-message').textContent = "정답이에요! 아래 비밀번호를 복사하세요.";

                document.getElementById('temp-pw-display').value = finalTempPassword;

        

            } else {

                setError(inputField, "앗..다시 써주세요ㅠㅠ");

            }

        };

    

        window.copyPassword = async function() {

            const pw = document.getElementById('temp-pw-display').value.trim();

            if(!pw) return;

            

            // btoa로 암호화한 뒤, 특수문자까지 URL용으로 변환

            const encodedPw = encodeURIComponent(btoa(pw));

            

            // 1. 클립보드 복사

            await navigator.clipboard.writeText(pw);

            

            // 2. [핵심] 세션 스토리지에 비밀번호 저장

            sessionStorage.setItem('temp_pw_to_fill', pw);

            

            // 3. UI 알림 후 이동

            const toast = document.getElementById("toast");

            toast.className = "show";

            setTimeout(() => { toast.className = ""; }, 2500);

        };
    </script>
</body>
</html>
