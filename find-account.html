<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>헬시키즈 | 계정 찾기</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 40px; background-color: #afe1fc; }
        
        .main-box { 
            background: white; 
            padding: 40px; 
            width: 600px; 
            margin: 40px auto; 
            border: 2px solid #2f63c7; 
            text-align: left; 
        }
        
        h2 { text-align: center; margin-top: 0; }
        h3 { color: #2f63c7; margin-bottom: 10px; }
        
        .container { display: flex; align-items: stretch; gap: 30px; margin-top: 20px; }
        .section { flex: 1; }
        .divider { border-left: 1.5px solid #ddd; margin: 10px 0; }
        
        .input-wrapper { width: 100%; height: 45px; margin: 8px 0; border: 2px solid #ddd; display: flex; align-items: center; background: white; }
        .input-field { width: 100%; height: 100%; border: none; outline: none; padding: 0 12px; }

        .notice {
            background-color: #fff0f0;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ffcccc;
            line-height: 1.5;
        }
        
        button { width: 100%; background-color: #2f63c7; color: white; border: none; padding: 12px; margin-top: 30px; cursor: pointer; font-weight: bold; text-align: center; }

        #pw-result {
            margin-top: 15px;
            font-weight: bold;
            color: #316ef4;
            text-align: center;
        }
            
        
        .qna-box { 
            margin-top: 25px; 
            padding: 20px; 
            border: 2px solid #2f63c7; 
            background-color: #f8fbff; 
            display: none;
        }

        .result-area {
            margin-top: 25px;
            padding: 15px;
            border-top: 2px solid #2f63c7;
            text-align: center;
        }
        
        #temp-pw-display {
            background-color: transparent !important;
            font-size: 16px;
            color: #2f63c7;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
        }

        .login-link {
            color: rgb(128, 128, 128); 
            text-decoration: none; 
            font-weight: bold;
            transition: color 0.3s ease;
        }
    
        .login-link:hover {
            color: rgb(50, 50, 50);
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 14px;
        }
        
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2s;
        }
        
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div class="main-box">
        <h2>계정 찾기</h2>
        <p style="text-align: center; color: #444; margin-bottom: 30px;">
            아이디나 비밀번호를 잊으셨나요? 아래에서 정보를 입력해 주세요!
        </p>

        <div class="container">
            <div class="section">
                <h3>아이디 찾기</h3>
                <div class="input-wrapper">
                    <input type="text" id="find-nickname" class="input-field" placeholder="가입 시 별명을 입력해요!">
                </div>
                <button onclick="findId()">아이디 찾기</button>
                <div id="id-result" class="result-text"></div>
            </div>

            <div class="divider"></div>

            <div class="section">
                <h3>비밀번호 찾기</h3>
                <div class="input-wrapper">
                    <input type="text" id="find-pw-id" class="input-field" placeholder="아이디를 입력해주세요!">
                </div>
                <button onclick="requestSecurityQuestion()">비밀번호 질문 확인</button>
            </div>
        </div>

        <div id="qna-box" class="qna-box">
            <h3 style="margin-top: 0;">질문 확인</h3>
            <p id="security-question-text" style="font-weight: bold; color: #73625d;"></p>
            <div class="input-wrapper">
                <input type="text" id="security-answer" class="input-field" placeholder="답을 입력하세요!">
            </div>
            <button onclick="verifyAnswer()" style="background-color: #ffd700; color: #fff;">답변 확인하기</button>
    
            <div id="pw-result" class="result-area" style="display: none;">
                <p id="pw-message" style="color: #2f63c7; font-weight: bold;"></p>
                
                <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
                    <div class="input-wrapper" style="border: 2px dashed #2f63c7; background: #eef6ff; flex: 1; margin: 0; height: 45px;">
                        <input type="text" id="temp-pw-display" class="input-field" readonly style="text-align:center; font-weight:bold; cursor:pointer; background: transparent; height: 100%;">
                    </div>
                    
                    <button onclick="copyPassword()" title="복사해요!" style="
                        margin: 0; 
                        width: 48px; 
                        height: 48px; 
                        background-color: #ffd700; 
                        border: 2px solid #ffcc00;  
                        cursor: pointer; 
                        display: flex; 
                        align-items: center; 
                        justify-content: center;
                        padding: 0;">
                        <img src="https://cdn-icons-png.flaticon.com/512/1621/1621635.png" alt="복사" style="width: 22px; height: 22px; filter: invert(1);">
                    </button>
                </div>

                <div id="toast">비밀번호가 복사되었어요!</div>

                <p class="notice" style="color: #d9534f; font-size: 13px; margin: 10px 0;">
                    ⚠️ <b>주의:</b> 이 임시 비밀번호는 <b>한 번만 사용 가능</b>해요.<br>
                    로그인 후 반드시 '개인정보 수정' 메뉴로 들어가셔서 비밀번호를 새로 만들어 주세요!
                </p>
                
                <a href="login.html" class="login-link">로그인하러 가기</a>
            </div>
        </div>

    </div>
    
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        let supabase = null;
        let currentSecurityAnswer = "";
        let currentUserId = "";

        window.initSupabase = async function() {
            if (supabase) return supabase;
            try {
                const res = await fetch('/get-config');
                if (!res.ok) throw new Error("설정 로드 실패");
                const config = await res.json();
                
                if (!config.SUPABASE_URL || !config.SUPABASE_ANON_KEY) {
                    throw new Error("환경 설정 누락");
                }
                supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                return supabase;
            } catch (error) {
                console.error("Supabase 초기화 에러:", error);
                return null;
            }
        };
    
        function setError(inputField, message) {
            clearError(inputField);
            const errorSpan = document.createElement('span');
            errorSpan.className = 'error-text';
            errorSpan.style.color = "#ff4d4d";
            errorSpan.style.fontSize = "12px";
            errorSpan.style.display = "block";
            errorSpan.style.textAlign = "left";
            errorSpan.style.marginTop = "5px";
            errorSpan.textContent = message;
            inputField.parentElement.after(errorSpan);
        }
    
        function clearError(inputField) {
            const next = inputField.parentElement.nextElementSibling;
            if (next && next.classList.contains('error-text')) {
                next.remove();
            }
        }
    
        window.findId = async function() {
            const sb = await window.initSupabase();
            const inputField = document.getElementById('find-nickname');
            if (!sb) return setError(inputField, "서버 연결 오류. 새로고침 후 다시 시도하세요.");
            
            const nickname = inputField.value.trim();
            clearError(inputField);
            if (!nickname) return setError(inputField, "별명을 입력해주세요!");
    
            const { data, error } = await sb.from('public.users').select('email').eq('nickname', nickname).maybeSingle();
            
            if (data) {
                const foundId = data.email.split('@')[0];
                const resultBox = document.getElementById('id-result');
                resultBox.style.color = "#2f63c7";
                resultBox.textContent = `찾았다! 아이디는 '${foundId}'예요!`;
                document.getElementById('find-pw-id').value = foundId;
            } else {
                setError(inputField, "일치하는 별명을 찾을 수 없어요.");
            }
        };
    
        window.requestSecurityQuestion = async function() {
            const sb = await window.initSupabase();
            const inputField = document.getElementById('find-pw-id');
            if (!sb) return setError(inputField, "서버 연결 오류.");
            
            const userId = inputField.value.trim();
            clearError(inputField);
            
            const { data } = await sb.from('public.users').select('id, security_question, security_answer').eq('email', `${userId}@healthykids.com`).maybeSingle();
            
            if (data) {
                currentUserId = data.id;
                currentSecurityAnswer = data.security_answer;
                document.getElementById('security-question-text').textContent = `질문: ${data.security_question}`;
                document.getElementById('qna-box').style.display = "block";
            } else {
                setError(inputField, "해당 아이디를 찾을 수 없어요.");
            }
        };
    
        window.verifyAnswer = async function() {
            const sb = await window.initSupabase();
            const inputField = document.getElementById('security-answer');
            if (!sb) return alert("연결 오류");
            
            const inputAnswer = inputField.value.trim();
            
            if (inputAnswer === currentSecurityAnswer) {
                const finalTempPassword = Math.random().toString(36).slice(-8) + "!A1";
                await sb.from('public.users').update({ is_temp_password: true, temp_password: finalTempPassword }).eq('id', currentUserId);
                
                document.getElementById('pw-result').style.display = "block";
                document.getElementById('pw-message').textContent = "정답이에요! 아래 비밀번호를 복사하세요.";
                document.getElementById('temp-pw-display').value = finalTempPassword;
            } else {
                let hint = currentSecurityAnswer;
                let displayHint = hint.length <= 1 ? "*" : (hint.length === 2 ? hint[0] + "*" : hint[0] + "*".repeat(hint.length - 2) + hint[hint.length - 1]);
                setError(inputField, `앗..다시 써주세요ㅠㅠ (힌트: ${displayHint})`);
            }
        };
    
        // 기존 PATCH 요청 코드를 삭제하고 아래 RPC 호출 코드로 변경하세요
        window.copyPassword = async function() {
            const pw = document.getElementById('temp-pw-display').value;
            if(!pw) return;
        
            const sb = await window.initSupabase();
            if (!sb) return;
        
            // 1. 상태 업데이트 (RPC 호출)
            // 함수 이름: force_update_password
            // 파라미터: target_id, new_password, new_usage, new_is_temp
            const { error } = await sb.rpc('force_update_password', { 
                target_id: currentUserId, // 아까 정의한 변수 이름
                new_password: pw,         // 임시 비밀번호를 auth.users에도 동기화
                new_usage: 0,             // 사용 횟수 초기화
                new_is_temp: true         // 임시 상태 유지
            });
        
            if (error) {
                console.error("업데이트 실패:", error.message);
                alert("비밀번호 상태 업데이트에 실패했습니다.");
                return;
            }
        
            // 2. 클립보드 복사
            navigator.clipboard.writeText(pw).then(() => {
                const toast = document.getElementById("toast");
                toast.className = "show";
                setTimeout(() => { toast.className = ""; }, 2500);
            });
        };
    </script>
</body>
</html>
