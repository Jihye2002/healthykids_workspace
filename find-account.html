<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 | 아이디와 비밀번호 찾기</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 50px; background-color: #f0f7ff; }
        .find-container { display: flex; justify-content: center; gap: 40px; margin-top: 30px; flex-wrap: wrap; }
        .box { background: white; border-radius: 20px; padding: 30px; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-box { width: 90%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; transition: border 0.3s; }
        button { background-color: #2f63c7; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; width: 90%; font-weight: bold; }
        h2 { color: #2f63c7; margin-bottom: 20px; }
        .back-link { margin-top: 30px; display: block; color: #555; text-decoration: none; }
    </style>
</head>
<body>

    <h1>계정 찾기</h1>
    <p>잊어버린 아이디나 비밀번호(암호)를 여기서 찾아보세요!</p>

    <div class="find-container">
        <div class="box">
            <h2>아이디 찾기</h2>
            <input type="text" id="find-id-nickname" class="input-box" placeholder="가입한 별명을 입력해요!">
            <button onclick="findId()">아이디 찾기</button>
        </div>

        <div class="box">
            <h2>암호 찾기</h2>
            <div style="display: flex; align-items: center; justify-content: center; gap: 5px;">
                <input type="text" id="find-pw-id" class="input-box" placeholder="아이디" style="width: 50%;">
                <span style="color: #888; font-size: 14px;">@healthykids.com</span>
            </div>
            <button onclick="findPw()">암호 재설정</button>
        </div>
    </div>

    <a href="login.html" class="back-link">← 다시 로그인하러 가기</a>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            window.supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        }
        init();
    
        window.findId = async () => {
            const nickname = document.getElementById('find-id-nickname').value;
            const { data, error } = await window.supabase
                .from('users')
                .select('email')
                .eq('nickname', nickname)
                .single();
    
            if (error || !data) {
                alert("별명을 찾을 수 없어요.. 다시 한번 확인해볼까요?");
            } else {
                const foundId = data.email.split('@')[0];
                alert(`찾았다! 아이디는 '${foundId}'예요!`);
                document.getElementById('find-pw-id').value = foundId;
            }
        };
    
        window.findPw = async () => {
            const userId = document.getElementById('find-pw-id').value;
            if(!userId) { alert("먼저 아이디를 찾아보거나 입력해주세요!"); return; }
            
            const confirmGo = confirm(`아이디 '${userId}'의 암호를 바꾸러 갈까요?`);
            if (confirmGo) {
                window.location.href = `update-password.html?id=${userId}`;
            }
        };
    </script>
</body>
</html>
