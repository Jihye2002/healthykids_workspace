<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 | 아이디와 비밀번호 찾기</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #afe1fc; }
        .box { background: white; padding: 40px; width: 420px; margin: 20px auto; border: 2px solid #2f63c7; z-index: 1; border-radius: 10px; }
        .input-wrapper { width: 340px; height: 45px; margin: 8px auto; border: 2px solid #ddd; display: flex; align-items: center; position: relative; background: white; }
        .input-field { width: 100%; height: 100%; border: none; outline: none; padding: 0 12px; font-size: 14px; }
        button { width: 340px; background-color: #2f63c7; color: white; border: none; padding: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .result-text { margin-top: 20px; font-weight: bold; color: #316ef4; }
    </style>
</head>
<body>

    <div class="box">
        <h2>계정 찾기</h2>
        
        <h3>아이디 찾기</h3>
        <div class="input-wrapper">
            <input type="text" id="find-nickname" class="input-field" placeholder="가입 시 등록한 별명을 입력해요!">
        </div>
        <button onclick="findId()">아이디 찾기</button>
        <div id="id-result" class="result-text"></div>

        <hr style="margin: 30px 0; border-top: 1px solid #eee;">

        <h3>비밀번호 찾기</h3>
        <div class="input-wrapper">
            <input type="text" id="find-pw-id" class="input-field" placeholder="아이디를 입력해주세요!">
        </div>
        <button onclick="checkSecurityQuestion()">비밀번호 질문 확인</button>
        <div id="pw-result" class="result-text"></div>

        <p style="margin-top: 20px;"><a href="login.html" class="login-link">로그인하러 가기</a></p>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        let supabase;
        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        }
        init();

        // 1. 아이디 찾기 로직
        window.findId = async () => {
            const nickname = document.getElementById('find-nickname').value.trim();
            const { data, error } = await supabase
                .from('public.users')
                .select('email')
                .eq('nickname', nickname)
                .maybeSingle();

            if (data) {
                const foundId = data.email.split('@')[0];
                document.getElementById('id-result').textContent = `찾았다! 아이디는 '${foundId}'예요!`;
                document.getElementById('find-pw-id').value = foundId;
            } else {
                alert("별명을 찾을 수 없어요.. 다시 한번 확인해볼까요?");
            }
        };

        // 2. 암호 찾기 로직 (보안 질문 검증)
        window.checkSecurityQuestion = async () => {
            const userId = document.getElementById('find-pw-id').value.trim();
            if(!userId) return alert("먼저 아이디를 입력해주세요!");
        
            const { data, error } = await supabase
                .from('public.users')
                .select('security_question, security_answer')
                .eq('email', `${userId}@healthykids.com`)
                .maybeSingle();
        
            if (data) {
                const answer = prompt(`질문: ${data.security_question}\n답을 입력해주세요!`);
                
                if (answer === data.security_answer) {
                    window.location.href = `update-password.html?id=${userId}`;
                } else {
                    // 힌트 보여주기 로직: 답이 1글자 초과일 경우 첫 글자와 마지막 글자만 보여줌
                    let hint = data.security_answer;
                    if (hint.length > 1) {
                        hint = hint[0] + "*".repeat(hint.length - 2) + hint[hint.length - 1];
                    } else {
                        hint = "*";
                    }
                    alert(`앗, 답이 틀렸어요ㅠㅠ 힌트를 줄게요!\n답변은 이런 모양이에요: "${hint}"\n다시 한번 생각해보자!`);
                }
            } else {
                alert("해당 아이디를 찾을 수 없어요.");
            }
        };
    </script>
</body>
</html>
