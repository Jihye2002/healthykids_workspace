<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>헬시키즈 | 계정 찾기</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 40px; background-color: #afe1fc; }
        
        .main-box { 
            background: white; 
            padding: 40px; 
            width: 600px; 
            margin: 40px auto; 
            border: 2px solid #2f63c7; 
            text-align: left; 
        }
        
        h2 { text-align: center; margin-top: 0; }
        h3 { color: #2f63c7; margin-bottom: 10px; }
        
        .container { display: flex; align-items: stretch; gap: 30px; margin-top: 20px; }
        .section { flex: 1; }
        .divider { border-left: 1.5px solid #ddd; margin: 10px 0; }
        
        .input-wrapper { width: 100%; height: 45px; margin: 8px 0; border: 2px solid #ddd; display: flex; align-items: center; background: white; }
        .input-field { width: 100%; height: 100%; border: none; outline: none; padding: 0 12px; }
        
        button { width: 100%; background-color: #2f63c7; color: white; border: none; padding: 12px; margin-top: 30px; cursor: pointer; font-weight: bold; }

        .footer-link {
            margin-top: 30px; 
            text-align: center;
            font-size: 16px;
            text-decoration: none;
        }
        
        .footer-link a {
            color: rgb(128, 128, 128);
            text-decoration: none; /* 밑줄 제거 */
            font-weight: bold;
            transition: color 0.3s ease;
        }
        
        .footer-link a:hover {
            color: rgb(50, 50, 50)
        }
            
        
        .qna-box { 
            margin-top: 25px; 
            padding: 20px; 
            border: 2px solid #2f63c7; 
            background-color: #f8fbff; 
            display: none;
        }
    </style>
</head>
<body>

    <div class="main-box">
        <h2>계정 찾기</h2>
        <p style="text-align: center; color: #444; margin-bottom: 30px;">
            아이디나 비밀번호를 잊으셨나요? 아래에서 정보를 입력해 주세요!
        </p>

        <div class="container">
            <div class="section">
                <h3>아이디 찾기</h3>
                <div class="input-wrapper">
                    <input type="text" id="find-nickname" class="input-field" placeholder="가입 시 별명을 입력해요!">
                </div>
                <button onclick="findId()">아이디 찾기</button>
                <div id="id-result" class="result-text"></div>
            </div>

            <div class="divider"></div>

            <div class="section">
                <h3>비밀번호 찾기</h3>
                <div class="input-wrapper">
                    <input type="text" id="find-pw-id" class="input-field" placeholder="아이디를 입력해주세요!">
                </div>
                <button onclick="requestSecurityQuestion()">비밀번호 질문 확인</button>
            </div>
        </div>

        <div id="qna-box" class="qna-box">
            <h3 style="margin-top: 0;">질문 확인</h3>
            <p id="security-question-text" style="font-weight: bold;"></p>
            <div class="input-wrapper">
                <input type="text" id="security-answer" class="input-field" placeholder="답을 입력하세요!">
            </div>
            <button onclick="verifyAnswer()" style="background-color: #ffd700; color: #000;">답변 확인하기</button>
        </div>

        <p class="footer-link">
            <a href="login.html">로그인하러 가기</a>
            <br><br>
            <a href="update-password.html">비밀번호 다시 만들래요!</a>
        </p>

    </div>
    
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        let supabase;
        let currentSecurityAnswer = "";

        const qnaBox = document.getElementById('qna-box');
        const questionText = document.getElementById('security-question-text');

        function setError(inputField, message) {
            const inputWrapper = inputField.parentElement;
            
            let errorSpan = inputWrapper.nextElementSibling;
            if (!errorSpan || !errorSpan.classList.contains('error-text')) {
                errorSpan = document.createElement('span');
                errorSpan.className = 'error-text';
                errorSpan.style.color = "red";
                errorSpan.style.fontSize = "12px";
                errorSpan.style.display = "block";
                errorSpan.style.marginTop = "5px";
                errorSpan.style.marginBottom = "5px";
                errorSpan.style.textAlign = "left";
                
                inputWrapper.after(errorSpan);
            }
            errorSpan.textContent = message;
        }

        function clearError(inputField) {
            const inputWrapper = inputField.parentElement;
            const errorSpan = inputWrapper.nextElementSibling;
            if (errorSpan && errorSpan.classList.contains('error-text')) {
                errorSpan.remove();
            }
        }
    
        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        }
        init();
    
        // 1. 아이디 찾기
        window.findId = async () => {
            const inputField = document.getElementById('find-nickname');
            const nickname = inputField.value.trim();
            const resultBox = document.getElementById('id-result');
            
            // 기존 에러 메시지 정리
            clearError(inputField);
            resultBox.textContent = ""; // 결과창 초기화
            
            if (!nickname) {
                setError(inputField, "별명을 입력해주세요!");
                return;
            }
        
            const { data } = await supabase
                .from('public.users')
                .select('email')
                .eq('nickname', nickname)
                .maybeSingle();
        
            if (data) {
                const foundId = data.email.split('@')[0];
                resultBox.style.color = "#316ef4"; 
                resultBox.textContent = `찾았다! 아이디는 '${foundId}'예요!`;
                document.getElementById('find-pw-id').value = foundId;
            } else {
                setError(inputField, "별명은 자음과 모음을 혼합해서 한 글자나 아님 더 길게 입력해 주세요!");
            }
        };
        
        // 2. [비밀번호 질문 확인] 버튼 클릭 시 (질문 박스 노출)
        window.requestSecurityQuestion = async () => {
            const inputField = document.getElementById('find-pw-id');
            const userId = inputField.value.trim();
            const pwResult = document.getElementById('pw-result');
            
            clearError(inputField);
            if (!userId) {
                setError(inputField, "아이디를 먼저 입력해주세요!");
                return;
            }
        
            const { data } = await supabase
                .from('public.users')
                .select('security_question, security_answer')
                .eq('email', `${userId}@healthykids.com`)
                .maybeSingle();
        
            if (data) {
                currentSecurityAnswer = data.security_answer; // 정답 저장
                questionText.textContent = `질문: ${data.security_question}`;
                qnaBox.style.display = "block"; // 숨겨진 질문 박스 보이기
            } else {
                pwResult.style.color = "#ff4d4d";
                pwResult.innerHTML = `
                    앗, 해당 아이디를 찾을 수 없어요.<br>
                    혹시 아직 헬시키즈 친구가 아닌가요?<br><br>
                    <button onclick="location.href='signup.html'" style="cursor:pointer;">회원가입 하러 가기</button>
                `;
                qnaBox.style.display = "none";
            }
        };
    
        window.verifyAnswer = () => {
            const inputField = document.getElementById('security-answer');
            const inputAnswer = inputField.value.trim();
            const userId = document.getElementById('find-pw-id').value.trim();
            const resultBox = document.getElementById('pw-result');
            
            // 1. 에러 및 결과 초기화
            clearError(inputField); 
            resultBox.innerHTML = ""; 
            
            // 2. 입력 확인
            if (!inputAnswer) {
                setError(inputField, "답변을 입력해주세요!");
                return;
            }
            
            // 3. 정답 확인
            if (inputAnswer === currentSecurityAnswer) {
                window.location.href = `update-password.html?id=${userId}`;
            } else {
                let hint = currentSecurityAnswer;
                let displayHint = hint.length <= 1 ? "*" : (hint.length === 2 ? hint[0] + "*" : hint[0] + "*".repeat(hint.length - 2) + hint[hint.length - 1]);
        
                resultBox.style.color = "#ff4d4d";
                resultBox.innerHTML = `앗, 답이 틀렸어요ㅠㅠ<br>힌트: <b>"${displayHint}"</b><br>다시 한번 생각해봐요!`;
            }
        };
    </script>
</body>
</html>
