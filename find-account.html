<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 | 계정 찾기</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #afe1fc; }
        
        .main-box { width: 700px; margin: 40px auto; }
        
        /* 카드형 배치를 위해 flex 사용 */
        .card-container { display: flex; align-items: stretch; gap: 30px; margin-top: 30px; }
        
        .card { 
            flex: 1; 
            background: white; 
            padding: 30px; 
            border: 2px solid #2f63c7; 
            /* border-radius 제거 */
            text-align: left; 
        }
        
        .divider { border-left: 2px solid #2f63c7; margin: 10px 0; }

        h2 { color: black; margin-bottom: 10px; }
        h3 { margin-top: 0; color: #2f63c7; }
        
        .input-wrapper { width: 100%; height: 45px; margin: 8px 0; border: 2px solid #ddd; display: flex; align-items: center; background: white; margin-bottom: 15px; }
        .input-field { width: 100%; height: 100%; border: none; outline: none; padding: 0 12px; font-size: 14px; }
        
        button { width: 100%; background-color: #2f63c7; color: white; border: none; padding: 12px; margin-top: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2559c5; }
        
        .result-text { margin-top: 15px; font-weight: bold; color: #316ef4; line-height: 1.6; min-height: 50px; font-size: 14px; }
        
        .footer-link { margin-top: 30px; text-align: center; }
        .footer-link a { color: rgb(128, 128, 128); text-decoration: none; font-weight: bold; transition: color 0.3s ease; }
        .footer-link a:hover { color: rgb(50, 50, 50); }
        
        @media (max-width: 768px) {
            .main-box { width: 90%; }
            .card-container { flex-direction: row; }
            
            .divider { 
                display: block;
                border-left: 2px solid #ddd;  
                width: 80%; 
                margin: 20px 0; 
            }
        }

        /* 포커스 효과는 유지하되 모서리는 직각 */
        .input-field:focus { border: 2px solid #000; }
    </style>
</head>
<body>

    <div class="main-box">
        <h2>계정 찾기</h2>
        <p style="color: #444; margin-bottom: 20px;">
            아이디나 비밀번호를 잊으셨나요? 아래에서 정보를 입력해 주세요!
        </p>

        <div class="card-container">
            <div class="card">
                <h3>아이디 찾기</h3>
                <div class="input-wrapper">
                    <input type="text" id="find-nickname" class="input-field" placeholder="가입 시 별명을 입력해요!">
                </div>
                <button onclick="findId()">아이디 찾기</button>
                <div id="id-result" class="result-text"></div>
            </div>

            <div class="divider"></div>

            <div class="card">
                <h3>비밀번호 찾기</h3>
                <div class="input-wrapper">
                    <input type="text" id="find-pw-id" class="input-field" placeholder="아이디를 입력해주세요!">
                </div>
                <button onclick="checkSecurityQuestion()">비밀번호 질문 확인</button>
                <div id="pw-result" class="result-text"></div>
            </div>
        </div>

        <div class="footer-link">
            <a href="login.html">로그인하러 가기</a>
        </div>
    </div>
    
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        let supabase;
        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        }
        init();

        window.findId = async () => {
            const nickname = document.getElementById('find-nickname').value.trim();
            const resultBox = document.getElementById('id-result');
            
            resultBox.style.color = "#316ef4";
            
            if (!nickname) {
                resultBox.style.color = "red";
                resultBox.textContent = "별명을 입력해주세요!";
                return;
            }
        
            const { data, error } = await supabase
                .from('public.users')
                .select('email')
                .eq('nickname', nickname)
                .maybeSingle();
        
            if (data) {
                const foundId = data.email.split('@')[0];
                resultBox.textContent = `찾았다! 아이디는 '${foundId}'예요!`;
                document.getElementById('find-pw-id').value = foundId;
            } else {
                resultBox.style.color = "red";
                resultBox.textContent = "별명을 찾을 수 없어요.. 다시 한번 확인해볼까요?";
            }
        };
        
        window.checkSecurityQuestion = async () => {
            const userId = document.getElementById('find-pw-id').value.trim();
            const resultBox = document.getElementById('pw-result');
            
            resultBox.textContent = "";
        
            if (!userId) {
                resultBox.style.color = "red";
                resultBox.textContent = "먼저 아이디를 입력해주세요!";
                return;
            }
        
            const { data, error } = await supabase
                .from('public.users')
                .select('security_question, security_answer')
                .eq('email', `${userId}@healthykids.com`)
                .maybeSingle();
        
            if (data) {
                const answer = prompt(`질문: ${data.security_question}\n여기에 답을 써주세요!`);
                
                if (answer === null) return; // 사용자가 취소를 눌렀을 때
            
                if (answer === data.security_answer) {
                    window.location.href = `update-password.html?id=${userId}`;
                } else {
                    let hint = data.security_answer;
                    let displayHint = "";
            
                    if (hint.length <= 1) {
                        displayHint = "*";
                    } else if (hint.length === 2) {
                        displayHint = hint[0] + "*";
                    } else {
                        displayHint = hint[0] + "*".repeat(hint.length - 2) + hint[hint.length - 1];
                    }
            
                    resultBox.style.color = "#ff4d4d";
                    resultBox.innerHTML = `앗, 답이 틀렸어요ㅠㅠ<br>힌트: <b>"${displayHint}"</b><br>다시 한번 생각해봐요!`;
                }
            } else {
                resultBox.style.color = "#ff4d4d";
                resultBox.innerHTML = `
                    앗, 해당 아이디를 찾을 수 없어요.<br>
                    혹시 아직 헬시키즈 친구가 아닌가요?<br><br>
                    <button onclick="location.href='signup.html'" style="cursor:pointer;">회원가입 하러 가기</button>
                `;
            }
        };
    </script>
</body>
</html>
