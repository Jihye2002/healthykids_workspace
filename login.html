<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 로그인</title>
    <style>
            body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #f0f7ff; }
            /* border-radius를 모두 0으로 바꾸면 각진 디자인이 됩니다 */
            .box { 
                background: white; 
                padding: 40px; /* 로그인 패딩 감소 (상하 높이 슬림하게) */
                width: 420px; 
                margin: auto; 
                border: 2px solid #2f63c7; 
                border-radius: 0px; 
            }
            
            /* 입력창 및 공통 스타일 (border-radius 삭제) */
            .input-box { 
                width: 340px; 
                padding: 12px; 
                margin: 8px 0; 
                border: 2px solid #ddd; 
                border-radius: 0px; /* 각진 디자인 */
                box-sizing: border-box; 
            }
            
            /* 아이디 입력 영역만 폼 너비와 맞춤 */
            .id-input-group {
                width: 340px;
                margin: 8px auto; 
                display: flex;
                align-items: center;
                border: 2px solid #ddd;
                border-radius: 0px;
                box-sizing: border-box; 
            }
            
            /* 수정된 버전 */
            .id-input-group input {
                border: none !important;     
                outline: none !important;    
                box-shadow: none !important;  
                flex: 1;           /* 핵심: 남은 공간 차지 */
                padding: 12px;     /* 패딩을 10px로 조정 (아까보다 조금 더 슬림해집니다) */
                width: 100%;       /* 너비 강제 설정 */
            }
            
            /* @healthykids.com 스타일 유지 */
            .email-suffix {
                color: #777;
                padding-right: 12px;
                font-size: 14px;
                white-space: nowrap;
            }
            
            /* 로그인 버튼만 입력창 너비와 통일 */
            #login-form button { 
                width: 340px; 
                background-color: #2f63c7; 
                color: white; 
                border: none; 
                padding: 12px; 
                margin-top: 10px;
                border-radius: 0px; 
                cursor: pointer; 
                font-weight: bold;
            }

            /* 모든 input과 버튼의 둥근 모서리를 강제로 제거 */
            input, select, button, .box, .id-input-group {
                border-radius: 0px !important;
            }
            
            /* 폼 내부의 테두리 설정도 0px로 명시 */
            .input-box, .id-input-group {
                border-radius: 0px !important;
                border: 2px solid #ddd; /* 테두리 두께 유지 */
            }

            /* input이 포커스되었을 때 부모(id-input-group)의 테두리 색상 변경 */
            .id-input-group:has(input:focus) {
                border: 2px solid #000 !important;
                border-radius: 0px !important;
            }
            
            /* 포커스(클릭) 되었을 때 생기는 기본 둥근 효과 제거 */
            input:focus, select:focus, button:focus {
                outline: none;
                border: 2px solid #000;
            }
        
            .error-border { border: 2px solid #ff4d4d !important; }
            .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 5%; }
        </style>
    </head>
<body>
    
    <div class="box">
        <h2>로그인 | LOGIN</h2>
        
        <form id="login-form">
            <div class="id-input-group" id="id-group">
                <input type="text" id="user-id" placeholder="아이디를 여기에 입력해 주세요!" required>
                <span class="email-suffix">@healthykids.com</span>
            </div>
            <div id="user-id-error" class="error-text">아이디를 다시 봐주세요!!</div>
            
            <input type="password" id="password" class="input-box" placeholder="비밀번호(대소문자·숫자·기호 섞어 8자 이상!)" required>
            <div id="password-error" class="error-text">비밀번호가 틀렸어요. 다시 한 번 입력해 주세요!</div>
            
            <button type="submit">로그인</button>
        </form>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
            <button id="google-btn" style="width: 340px; background:#4285f4; color:white; border:none; padding:10px; margin-bottom:5px; cursor:pointer;">Google로 로그인</button>
            <button id="kakao-btn" style="width: 340px; background:#fee500; color:#000; border:none; padding:10px; margin-bottom:5px; cursor:pointer;">Kakao로 로그인</button>
            <button id="naver-btn" style="width: 340px; background:#03c75a; color:white; border:none; padding:10px; margin-bottom:5px; cursor:pointer;">Naver로 로그인</button>
                
            <p style="margin-top: 20px; gap: 5px">아직 아이디와 비밀번호가 없으신가요? <a href="signup.html" style="text-decoration: none; color: #ddd">회원가입하기</a></p>
            <p><a href="find-account.html" style="text-decoration: none; color: #ddd">아이디와 비밀번호를 잊어버렸어요!</a></p>
        </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            window.supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
    
            const { data: { session } } = await window.supabase.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('login-form').addEventListener('submit', handleLogin);
            document.getElementById('google-btn').addEventListener('click', () => socialLogin('google'));
            document.getElementById('kakao-btn').addEventListener('click', () => socialLogin('kakao'));
            document.getElementById('naver-btn').addEventListener('click', handleNaverLogin);
        }
    
        async function handleLogin(e) {
            e.preventDefault();
            const userId = document.getElementById('user-id').value;
            const password = document.getElementById('password').value;
            const email = `${userId.replace(/\s+/g, '')}@healthykids.com`;
        
            const { error } = await window.supabase.auth.signInWithPassword({ email, password });
        
            if (error) {
                // 공통 에러 메시지 처리 (위치를 구분해서 띄우기)
                const idInput = document.getElementById('user-id');
                const passInput = document.getElementById('password');
                const idError = document.getElementById('user-id-error');
                const passError = document.getElementById('password-error');
        
                // 테두리 빨갛게
                idInput.classList.add('error-border');
                passInput.classList.add('error-border');
        
                // 메시지 표시
                idError.style.display = 'block';
                passError.style.display = 'block';
                idError.textContent = "아이디를 확인해 주세요..";
                passError.textContent = "비밀번호가 올바르지 않아요!";
            } else {
                window.location.href = 'index.html';
            }
        }
        
        // [추가] 로그인 페이지용 입력 시 에러 초기화 로직
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                input.classList.remove('error-border');
                const errorDiv = document.getElementById(input.id + '-error');
                if (errorDiv) errorDiv.style.display = 'none';
            });
        });
    
        async function socialLogin(provider) {
            await window.supabase.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: 'https://healthykids-workspace.onrender.com/index.html' }
            });
        }
    
        async function handleNaverLogin() {
            const res = await fetch('/get-config');
            const config = await res.json();
            const callbackUrl = encodeURIComponent("https://healthykids-workspace.onrender.com/callback.html");
            window.location.href = `https://nid.naver.com/oauth2.0/authorize?response_type=token&client_id=${config.NAVER_CLIENT_ID}&redirect_uri=${callbackUrl}&state=RANDOM`;
        }
    
        init();
    </script>
</body>
</html>
