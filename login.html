<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 로그인</title>
    <style>
            body { font-family: 'Arial', sans-serif; text-align: center; padding: 50px; background-color: #f0f7ff; }
            /* border-radius를 모두 0으로 바꾸면 각진 디자인이 됩니다 */
            .box { 
                background: white; 
                border-radius: 0px; 
                padding: 40px; 
                width: 350px; 
                margin: auto; 
                border: 2px solid #2f63c7; /* 테두리를 주면 더 명확해져요 */
                box-shadow: none; /* 그림자도 없애면 더 딱딱한 느낌이 납니다 */
            }
            
            .input-box { 
                width: 90%; 
                padding: 12px; 
                margin: 8px 0; 
                border: 2px solid #ddd; 
                border-radius: 0px; /* 각지게 수정 */
            }
            
            button { 
                background-color: #2f63c7; 
                color: white; 
                border: none; 
                padding: 12px 20px; 
                border-radius: 0px; /* 각지게 수정 */
                cursor: pointer; 
                width: 90%; 
                font-weight: bold; 
            }    
            .error-border { border: 2px solid #ff4d4d !important; }
            .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 5%; }
        </style>
    </head>
<body>
    <div class="box">
        <h2>로그인 | LOGIN</h2>
        <div id="welcome-area" style="display:none;"><h3 id="welcome-message"></h3></div>

        <form id="login-form">
            <div style="display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 10px;">
                <input type="text" id="login-id" class="input-box" placeholder="만든 아이디를 여기에 입력해 주세요!" style="width: 50%;">
                <span style="color: #888; font-size: 14px;">@healthykids.com</span>
            </div>
            
            <input type="password" id="login-password" class="input-box" placeholder="비밀번호(암호)를 입력해 주세요!">
            
            <div id="login-error" class="error-text">아이디나 암호가 틀린 것 같아요. 한 번 더 입력해 주세요!</div>
            
            <button type="submit" class="input-box">로그인</button>
        </form>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <button id="google-btn" style="background:#4285f4; margin-bottom:5px;">Google로 로그인</button>
            <button id="kakao-btn" style="background:#fee500; color:#000; margin-bottom:5px;">Kakao로 로그인</button>
            <button id="naver-btn" style="background:#03c75a; margin-bottom:5px;">Naver로 로그인</button>
            
            <p style="margin-top: 20px;">아직 아이디와 비밀번호(암호)가 없으신가요?<a href="signup.html">회원가입하기</a></p>
            <p><a href="find-account.html">아이디와 비밀번호(암호)를 잊어버렸어요!</a></p>
        </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        let supabase = null;
        let failCount = 0;
    
        async function initSupabase() {
            try {
                // 1. 설정 가져오기
                const res = await fetch('/get-config');
                const config = await res.json();
                supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                window.supabase = supabase;
                
                // 2. 초기화 완료 후 인증 상태 체크
                await checkAuthState();
            } catch (err) {
                console.error("초기화 실패:", err);
            }
        }
    
        async function checkAuthState() {
            // 세션 확인
            const { data: { session }, error: sessionError } = await supabase.auth.getSession();
            if (!session) return;
    
            // URL에 붙은 # 토큰 정리 (가독성 및 깔끔한 주소 유지)
            if (window.location.hash) {
                window.history.replaceState(null, null, window.location.pathname);
            }
    
            // 3. 소셜 로그인 후 자동 가입/정보 저장 로직
            const userEmail = session.user.email;
            const { data: existingUser } = await supabase
                .from('users')
                .select('*')
                .eq('email', userEmail)
                .maybeSingle();
    
            if (!existingUser) {
                const provider = session.user.app_metadata.provider;
                let nickname = session.user.user_metadata.full_name || 
                               session.user.user_metadata.name || 
                               userEmail.split('@')[0];
    
                const { error: insertError } = await supabase.from('users').insert([{
                    email: userEmail,
                    nickname: nickname,
                    hint_question: "소셜가입",
                    hint_answer: "없음"
                }]);
    
                if (insertError) {
                    console.error("자동 가입 저장 오류:", insertError);
                    return; // 에러 시 이동 중단
                }
            }
    
            // 4. 로직 완료 후 메인으로 이동
            window.location.href = '/index.html';
        }
    
        // 일반 로그인 이벤트
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userIdInput = document.getElementById('login-id');
            const passwordInput = document.getElementById('login-password');
            const errorDiv = document.getElementById('login-error');
            
            const email = `${userIdInput.value}@healthykids.com`;
            const { error } = await supabase.auth.signInWithPassword({ 
                email, 
                password: passwordInput.value 
            });
    
            if (error) {
                failCount++;
                userIdInput.classList.add('error-border');
                passwordInput.classList.add('error-border');
                errorDiv.style.display = 'block';
                
                if (failCount >= 3) {
                    alert("로그인 실패 3회! 비밀번호 찾기 페이지로 이동합니다.");
                    window.location.href = 'find-account.html';
                    return;
                }
                errorDiv.innerText = `아이디나 암호가 틀린 것 같아요. (${failCount}/3) 다시 확인해볼까요?`;
            } else {
                window.location.href = '/index.html';
            }
        });
    
        // 소셜 로그인 버튼 연결 함수
        const handleSocialLogin = (provider) => {
            if (!supabase) { alert("잠시만 기다려주세요!"); return; }
            supabase.auth.signInWithOAuth({ 
                provider: provider, 
                options: { redirectTo: 'https://healthykids-workspace.onrender.com/index.html' } 
            });
        };
    
        document.getElementById('google-btn').addEventListener('click', () => handleSocialLogin('google'));
        document.getElementById('kakao-btn').addEventListener('click', () => handleSocialLogin('kakao'));
        document.getElementById('naver-btn').addEventListener('click', () => handleSocialLogin('naver-login'));
        
        // 페이지 로드 시 초기화 실행
        initSupabase();
    </script>
</body>
</html>
