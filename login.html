<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 로그인</title>
</head>
<body>
    <h2>로그인 | LOGIN</h2>
    
    <div id="welcome-area" style="display:none;">
        <h3 id="welcome-message"></h3>
    </div>

    <form id="login-form">
        <input type="text" id="login-email" placeholder="아이디를 입력해주세요!" required><br>
        <input type="password" id="login-password" placeholder="비밀번호(암호)를 입력해주세요!" required><br>
        <button type="submit">로그인</button>
    </form>
    <hr>
    <button id="google-btn">Google로 로그인</button>
    <button id="kakao-btn">Kakao로 로그인</button>
    <button id="naver-btn">Naver로 로그인</button>
    
    <p>아직 아이디와 비밀번호(암호)가 없으신가요? <a href="signup.html">회원가입하기</a></p>
    <p><a href="find-account.html">아이디와 비밀번호(암호)를 잊어버렸어요!</a></p>

    <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
    let supabase = null;
    let failCount = 0; // 실패 횟수 변수를 함수 밖으로 뺍니다.

    async function initSupabase() {
        try {
            const res = await fetch('/get-config');
            const config = await res.json();
            window.supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
            supabase = window.supabase;
            checkAuthState();
        } catch (err) {
            console.error("초기화 실패:", err);
        }
    }

    async function checkAuthState() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            // 메타데이터에서 별명(full_name)을 우선적으로 가져옵니다.
            const nickname = session.user.user_metadata.full_name || session.user.email.split('@')[0];
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('welcome-area').style.display = 'block';
            document.getElementById('welcome-message').innerText = `${nickname}님 환영해요!`;
        }
    }

    function setupEventListeners() {
        // 1. 아이디 기반 로그인 로직 (중복 제거 완료)
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('login-email').value; // ID 입력칸과 매칭
            const password = document.getElementById('login-password').value;
            const email = `${userId}@healthykids.com`;
            
            const { error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                failCount++;
                if (failCount >= 3) {
                    alert("아이디와 암호를 잊어버렸다면 아래 '아이디와 비밀번호(암호)를 잊어버렸어요!'를 눌러서 찾아볼까요?");
                    window.location.href = 'find-account.html';
                    return;
                }
                
                if (error.message.includes("Invalid login credentials")) {
                    alert(`아이디나 암호가 틀린 것 같아요. 다시 한번 확인해볼까요? (${failCount}/3)`);
                } else {
                    alert("로그인 중 문제가 생겼어요: " + error.message);
                }
            } else {
                window.location.href = '/index.html';
            }
        });

        // 2. 소셜 로그인
        const socialLogin = async (provider) => {
            await supabase.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: 'https://healthykids-workspace.onrender.com/index.html' }
            });
        };

        document.getElementById('google-btn').addEventListener('click', () => socialLogin('google'));
        document.getElementById('kakao-btn').addEventListener('click', () => socialLogin('kakao'));
        document.getElementById('naver-btn').addEventListener('click', () => socialLogin('custom:naver-login'));
    }

    initSupabase().then(setupEventListeners);
</script>
</body>
</html>
