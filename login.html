<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 로그인</title>
    <style>
            body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #f0f7ff; }
            /* border-radius를 모두 0으로 바꾸면 각진 디자인이 됩니다 */
            .box { 
                background: white; 
                padding: 40px; /* 로그인 패딩 감소 (상하 높이 슬림하게) */
                width: 420px; 
                margin: auto; 
                border: 2px solid #2f63c7; 
                border-radius: 0px; 
            }
            
            /* 입력창 및 공통 스타일 (border-radius 삭제) */
            .input-box { 
                width: 340px; 
                padding: 12px; 
                margin: 8px 0; 
                border: 2px solid #ddd; 
                border-radius: 0px; /* 각진 디자인 */
                box-sizing: border-box; 
            }
            
            /* 아이디 입력 영역만 폼 너비와 맞춤 */
            .id-input-group {
                width: 340px;
                margin: 8px auto; 
                display: flex;
                align-items: center;
                border: 2px solid #ddd;
                border-radius: 0px;
                box-sizing: border-box; 
            }
            
            /* 아이디 입력칸 */
            .id-input-group #user-id {
                border: none;
                padding: 12px;
                width: 100%; 
                box-sizing: border-box; 
            }
            
            /* @healthykids.com 스타일 유지 */
            .email-suffix {
                color: #777;
                padding-right: 12px;
                font-size: 14px;
                white-space: nowrap;
            }
            
            /* 로그인 버튼만 입력창 너비와 통일 */
            #login-form button { 
                width: 340px; 
                background-color: #2f63c7; 
                color: white; 
                border: none; 
                padding: 12px; 
                margin-top: 10px;
                border-radius: 0px; 
                cursor: pointer; 
                font-weight: bold;
            }
        
            .error-border { border: 2px solid #ff4d4d !important; }
            .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 5%; }
        </style>
    </head>
<body>
    
    <div class="box">
        <h2>로그인 | LOGIN</h2>
        
        <form id="login-form">
            <div class="id-input-group">
                <input type="text" id="user-id" placeholder="아이디를 여기에 입력해 주세요!" required>
                <span class="email-suffix">@healthykids.com</span>
            </div>
            
            <input type="password" id="password" class="input-box" placeholder="비밀번호(암호)를 입력해 주세요!" required>
            
            <button type="submit">로그인</button>
        </form>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
            <button id="google-btn" style="width: 340px; background:#4285f4; color:white; border:none; padding:10px; margin-bottom:5px; cursor:pointer;">Google로 로그인</button>
            <button id="kakao-btn" style="width: 340px; background:#fee500; color:#000; border:none; padding:10px; margin-bottom:5px; cursor:pointer;">Kakao로 로그인</button>
            <button id="naver-btn" style="width: 340px; background:#03c75a; color:white; border:none; padding:10px; margin-bottom:5px; cursor:pointer;">Naver로 로그인</button>
                
            <p style="margin-top: 20px; gap: 5px">아직 아이디와 비밀번호(암호)가 없으신가요? <a href="signup.html">회원가입하기</a></p>
            <p><a href="find-account.html">아이디와 비밀번호(암호)를 잊어버렸어요!</a></p>
        </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        // init 함수 수정 제안
        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            window.supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY, {
                auth: {
                    autoRefreshToken: true,
                    persistSession: true, 
                    detectSessionInUrl: true
                }
            });
        
            // [추가] 이미 로그인된 유저라면 메인으로 보냄
            const { data: { session } } = await window.supabase.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
                return; // 아래 코드 실행 방지
            }
            
            // 이벤트 리스너 연결
            document.getElementById('login-form')?.addEventListener('submit', handleLogin);
            document.getElementById('google-btn')?.addEventListener('click', () => socialLogin('google'));
            document.getElementById('kakao-btn')?.addEventListener('click', () => socialLogin('kakao'));
            document.getElementById('naver-btn')?.addEventListener('click', handleNaverLogin);
        }
        
        // 1. 일반 로그인 처리
        async function handleLogin(e) {
            e.preventDefault();
            
            // HTML에 있는 user-id와 password를 가져옵니다.
            const userId = document.getElementById('user-id').value;
            const password = document.getElementById('password').value;
        
            // [중요] 가입 시 'Date.now()'를 제거하고 이 이메일 규칙을 사용하세요!
            // (예: 아이디가 'jihye'면 'jihye@healthykids.com')
            const email = `${userId.replace(/\s+/g, '')}@healthykids.com`; 
        
            const { data, error } = await window.supabase.auth.signInWithPassword({
                email: email, 
                password: password
            });
        
            // handleLogin 함수 내부 if (error) 부분 수정
            if (error) {
                const errorText = document.querySelector('.error-text');
                if (errorText) {
                    errorText.textContent = "아이디나 비밀번호가 틀렸어요. 다시 확인해볼까요?";
                    errorText.style.display = 'block';
                }
                // 입력창 빨간 테두리 추가
                document.getElementById('user-id').classList.add('error-border');
                document.getElementById('password').classList.add('error-border');
            }
        
        // 2. 소셜 로그인 함수
        async function socialLogin(provider) {
            await window.supabase.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: 'https://healthykids-workspace.onrender.com/index.html' }
            });
        }
        
        // 3. 네이버 로그인 함수
        async function handleNaverLogin() {
            const res = await fetch('/get-config');
            const config = await res.json();
            const callbackUrl = encodeURIComponent("https://healthykids-workspace.onrender.com/callback.html");
            window.location.href = `https://nid.naver.com/oauth2.0/authorize?response_type=token&client_id=${config.NAVER_CLIENT_ID}&redirect_uri=${callbackUrl}&state=RANDOM`;
        }
        
        init();
    </script>
</body>
</html>
