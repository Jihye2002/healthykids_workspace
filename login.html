<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 로그인</title>
    <style>
            body { font-family: 'Arial', sans-serif; text-align: center; padding: 50px; background-color: #f0f7ff; }
            /* border-radius를 모두 0으로 바꾸면 각진 디자인이 됩니다 */
            .box { 
                background: white; 
                border-radius: 0px; 
                padding: 40px; 
                width: 420px; 
                margin: auto; 
                border: 2px solid #2f63c7; /* 테두리를 주면 더 명확해져요 */
                box-shadow: none; /* 그림자도 없애면 더 딱딱한 느낌이 납니다 */
            }
            
            .input-box { 
                width: 370px; 
                padding: 12px; 
                margin: 8px 0; 
                border: 2px solid #ddd; 
                border-radius: 0px; /* 각지게 수정 */
            }
            
            button { 
                background-color: #2f63c7; 
                color: white; 
                border: none; 
                padding: 12px 20px; 
                border-radius: 0px; /* 각지게 수정 */
                cursor: pointer; 
                width: 370px; 
                font-weight: bold; 
            }    
            .error-border { border: 2px solid #ff4d4d !important; }
            .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 5%; }
        </style>
    </head>
<body>
    <div class="box">
        <h2>로그인 | LOGIN</h2>
        <div id="welcome-area" style="display:none;"><h3 id="welcome-message"></h3></div>

        <form id="login-form">
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="login-id" class="input-box" placeholder="만든 아이디를 여기에 입력해 주세요!" style="width: 50%;" style="width: 225px;">
                <span style="color: #888; font-size: 14px;">@healthykids.com</span>
            </div>
            
            <input type="password" id="login-password" class="input-box" placeholder="비밀번호(암호)를 입력해 주세요!" style="width: 340px;">
            
            <div id="login-error" class="error-text">아이디나 암호가 틀린 것 같아요. 한 번 더 입력해 주세요!</div>
            
            <button type="submit" class="input-box">로그인</button>
        </form>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <button id="google-btn" style="background:#4285f4; margin-bottom:5px;">Google로 로그인</button>
            <button id="kakao-btn" style="background:#fee500; color:#000; margin-bottom:5px;">Kakao로 로그인</button>
            <button id="naver-btn" style="background:#03c75a; margin-bottom:5px;">Naver로 로그인</button>
            
            <p style="margin-top: 20px; gap: 5px">아직 아이디와 비밀번호(암호)가 없으신가요? <a href="signup.html">회원가입하기</a></p>
            <p><a href="find-account.html">아이디와 비밀번호(암호)를 잊어버렸어요!</a></p>
        </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        // 1. 초기화 및 로그인 확인
        async function init() {
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                window.supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                
                // 이미 로그인 되어있다면 메인으로
                if (localStorage.getItem('user_email')) {
                    window.location.replace('/index.html');
                }
            } catch (err) {
                console.error("초기화 실패:", err);
            }
        }
        
        // 2. 소셜 로그인 실행 (구글/카카오)
        const socialLogin = async (provider) => {
            await window.supabase.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: 'https://healthykids-workspace.onrender.com/callback.html' }
            });
        };
        
        // 3. 네이버 로그인 실행 (직접 리다이렉트)
        const handleNaverLogin = async () => {
            const res = await fetch('/get-config');
            const config = await res.json();
            const callbackUrl = encodeURIComponent("https://healthykids-workspace.onrender.com/callback.html");
            window.location.href = `https://nid.naver.com/oauth2.0/authorize?response_type=token&client_id=${config.NAVER_CLIENT_ID}&redirect_uri=${callbackUrl}&state=RANDOM`;
        };
        
        // 4. 이벤트 연결
        init();
        document.getElementById('google-btn').addEventListener('click', () => socialLogin('google'));
        document.getElementById('kakao-btn').addEventListener('click', () => socialLogin('kakao'));
        document.getElementById('naver-btn').addEventListener('click', handleNaverLogin);
    </script>
</body>
</html>
