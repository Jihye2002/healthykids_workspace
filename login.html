<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 로그인</title>
</head>
<body>
    <h2>로그인|LOGIN</h2>
    <form id="login-form">
        <input type="email" id="login-email" placeholder="이메일" required><br>
        <input type="password" id="login-password" placeholder="비밀번호" required><br>
        <button type="submit">로그인</button>
    </form>
    <hr>
    <button onclick="socialLogin('google')">Google로 로그인</button>
    <button onclick="socialLogin('kakao')">Kakao로 로그인</button>
    <button onclick="socialLogin('naver')">Naver로 로그인</button>
    
    <p>계정이 없으신가요? <a href="signup.html">회원가입하기</a></p>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
        const supabase = createClient('SUPABASE_URL' , 'SUPABASE_ANON_KEY')

        // 이메일 로그인
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data, error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            });
            if (error) alert("로그인 실패: " + error.message);
            else {
                alert("로그인 성공!");
                window.location.href = '/index.html'; // 성공 후 메인 페이지 이동
            }
        });

        // 소셜 로그인
        window.socialLogin = async (provider) => {
            await supabase.auth.signInWithOAuth({ provider });
        };
    </script>
</body>
</html>
