<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 로그인</title>
</head>
<body>
    <h2>로그인 | LOGIN</h2>
    
    <div id="welcome-area" style="display:none;">
        <h3 id="welcome-message"></h3>
    </div>

    <form id="login-form">
        <input type="email" id="login-email" placeholder="이메일" required><br>
        <input type="password" id="login-password" placeholder="비밀번호" required><br>
        <button type="submit">로그인</button>
    </form>
    <hr>
    <button id="google-btn">Google로 로그인</button>
    <button id="kakao-btn">Kakao로 로그인</button>
    <button id="naver-btn">Naver로 로그인</button>
    
    <p>아직 아이디와 비밀번호가 없으신가요? <a href="signup.html">회원가입하기</a></p>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        let supabase = null;

        // 1. Supabase 초기화
        async function initSupabase() {
            try {
                // 실제 서버 환경이 아니라면 여기 URL과 KEY를 직접 넣으셔도 됩니다.
                const res = await fetch('/get-config');
                const config = await res.json();
                window.supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                supabase = window.supabase;
                
                checkAuthState(); // 초기화 후 로그인 상태 확인
            } catch (err) {
                console.error("초기화 실패:", err);
            }
        }

        // 2. 환영 문구 및 로그인 상태 확인
        async function checkAuthState() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const userName = session.user.email.split('@')[0];
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('welcome-area').style.display = 'block';
                document.getElementById('welcome-message').innerText = `${userName}님 환영해요!`;
            }
        }

        // 3. 이벤트 리스너 설정
        function setupEventListeners() {
            // 1. 아이디 기반 로그인 로직
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const userId = document.getElementById('login-id').value;
                const password = document.getElementById('login-password').value;
                const email = `${userId}@healthykids.com`; // 가상 이메일 생성

                const { error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    // 에러 메시지 상세화
                    if (error.message.includes("Invalid login credentials")) {
                        alert("아이디나 비밀번호(암호)가 틀린 것 같아요. 다시 한번 확인해볼까요?");
                    } else if (error.message.includes("User not found")) {
                        alert("그런 이름을 가진 사용자를 찾을 수 없어요");
                    } else {
                        alert("로그인 중 문제가 생겼어요: " + error.message);
                    }
                } else {
                    window.location.href = '/index.html';
                }
            });

            // 2. 소셜 로그인
            const socialLogin = async (provider) => {
                await supabase.auth.signInWithOAuth({
                    provider: provider,
                    options: { redirectTo: 'https://healthykids-workspace.onrender.com/index.html' }
                });
            };

            document.getElementById('google-btn').addEventListener('click', () => socialLogin('google'));
            document.getElementById('kakao-btn').addEventListener('click', () => socialLogin('kakao'));
            document.getElementById('naver-btn').addEventListener('click', () => socialLogin('custom:naver-login'));
        }

        initSupabase().then(setupEventListeners);
    </script>
</body>
</html>
