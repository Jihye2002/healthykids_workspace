<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 로그인</title>
    <style>
            body { font-family: 'Arial', sans-serif; text-align: center; padding: 50px; background-color: #f0f7ff; }
            .box { background: white; border-radius: 20px; padding: 40px; width: 350px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
            .input-box { width: 90%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; transition: border 0.3s; }
            .error-border { border: 2px solid #ff4d4d !important; }
            .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 5%; }
            button { background-color: #2f63c7; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; width: 90%; font-weight: bold; }
        </style>
    </head>
<body>
    <div class="box">
        <h2>로그인 | LOGIN</h2>
        <div id="welcome-area" style="display:none;"><h3 id="welcome-message"></h3></div>

        <form id="login-form">
            <div style="display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 10px;">
                <input type="text" id="login-id" class="input-box" placeholder="만든 아이디를 여기에 입력해 주세요!" style="width: 50%;">
                <span style="color: #888; font-size: 14px;">@healthykids.com</span>
            </div>
            
            <input type="password" id="login-password" class="input-box" placeholder="비밀번호(암호)를 입력해 주세요!">
            <button type="submit" class="input-box">로그인</button>
        </form>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <button id="google-btn" style="background:#4285f4; margin-bottom:5px;">Google로 로그인</button>
            <button id="kakao-btn" style="background:#fee500; color:#000; margin-bottom:5px;">Kakao로 로그인</button>
            <button id="naver-btn" style="background:#03c75a; margin-bottom:5px;">Naver로 로그인</button>
            
            <p style="margin-top: 20px;">아직 아이디와 비밀번호(암호)가 없으신가요?<a href="signup.html">회원가입하기</a></p>
            <p><a href="find-account.html">아이디와 비밀번호(암호)를 잊어버렸어요!</a></p>
        </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        let supabase = null;
        let failCount = 0; // 실패 횟수 변수를 함수 밖으로 뺍니다.
    
        async function initSupabase() {
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                window.supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                supabase = window.supabase;
                checkAuthState();
            } catch (err) {
                console.error("초기화 실패:", err);
            }
        }
    
        async function checkAuthState() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // 메타데이터에서 별명(full_name)을 우선적으로 가져옵니다.
                const nickname = session.user.user_metadata.full_name || session.user.email.split('@')[0];
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('welcome-area').style.display = 'block';
                document.getElementById('welcome-message').innerText = `${nickname}님 환영해요!`;
            }
        }
    
        function setupEventListeners() {
            // 1. 아이디 기반 로그인 로직 (중복 제거 완료)
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const userIdInput = document.getElementById('login-id');
                const passwordInput = document.getElementById('login-password');
                const errorDiv = document.getElementById('login-error');
                
                const userId = userIdInput.value;
                const password = passwordInput.value;
                const email = `${userId}@healthykids.com`;
                
                const { error } = await supabase.auth.signInWithPassword({ email, password });
            
                if (error) {
                    failCount++;
                    
                    // 1. 박스 테두리 빨갛게 변신
                    userIdInput.classList.add('error-border');
                    passwordInput.classList.add('error-border');
                    
                    // 2. 빨간 안내 문구 보여주기
                    errorDiv.style.display = 'block';
            
                    if (failCount >= 3) {
                        alert("'아이디와 비밀번호(암호)를 잊어버렸어요!'를 눌러주세요!");
                        window.location.href = 'find-account.html';
                        return;
                    }
                    
                    // 3. 메시지 갱신 (횟수 표시)
                    errorDiv.innerText = `아이디나 암호가 틀린 것 같아요. (${failCount}/3) 다시 확인해볼까요?`;
                    
                } else {
                    // 성공 시 오류 표시 초기화
                    errorDiv.style.display = 'none';
                    window.location.href = '/index.html';
                }
            });
    
            // 2. 소셜 로그인
            const socialLogin = async (provider) => {
                await supabase.auth.signInWithOAuth({
                    provider: provider,
                    options: { redirectTo: 'https://healthykids-workspace.onrender.com/index.html' }
                });
            };
    
            document.getElementById('google-btn').addEventListener('click', () => socialLogin('google'));
            document.getElementById('kakao-btn').addEventListener('click', () => socialLogin('kakao'));
            document.getElementById('naver-btn').addEventListener('click', () => socialLogin('custom:naver-login'));
        }
    
        initSupabase().then(setupEventListeners);
</script>
</body>
</html>
