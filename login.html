<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 로그인</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #afe1fc; }

        .background-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .tori-container {
            position: fixed;
            bottom: 50px;
            left: 50px;
            width: 250px;
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

       @keyframes waveTori {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            25% { transform: rotate(10deg) translateY(-10px); } /* 오른쪽으로 살짝 기울임 */
            50% { transform: rotate(0deg) translateY(0); }
            75% { transform: rotate(-10deg) translateY(-10px); } /* 왼쪽으로 살짝 기울임 */
        }
        
        .tori-img {
            width: 360px;
            transform-origin: bottom center; 
            animation: waveTori 5s infinite ease-in-out; 
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .tori-img:hover {
            animation: none;
            transform: scale(1.1);
        }

        .floating-shape {
            position: fixed;
            z-index: 0;
            animation: floatShape 6s infinite ease-in-out;
        }

        @keyframes floatShape {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(15deg); }
        }

        /* 도형 모양들 */
        .star { color: #b39ddb; font-size: 24px; }
        .heart { color: #ff8a80; font-size: 24px; }
        .circle { width: 20px; height: 20px; border-radius: 50%; background: #80cbc4; }
        .triangle { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 20px solid #ffcc80; }
        
        .box { background: white; padding: 40px; width: 420px; margin: 50px auto; border: 2px solid #2f63c7; z-index: 1; }
        
        /* 회원가입 페이지와 동일한 입력창 스타일 */
        .input-wrapper { 
            width: 340px; height: 45px; margin: 8px auto; border: 2px solid #ddd; 
            box-sizing: border-box; display: flex; align-items: center; position: relative; background: white;
        }
        .input-field { width: 100%; height: 100%; border: none !important; outline: none !important; padding: 0 12px; font-size: 14px; background: transparent; }
        
        .email-suffix { color: #777; padding-right: 12px; font-size: 14px; white-space: nowrap; }
        #toggle-password { position: absolute; right: 10px; cursor: pointer; font-size: 18px; user-select: none; }
        
        /* 포커스 시 테두리 검정색 */
        .input-wrapper:has(input:focus) { border: 2px solid #000 !important; }

        .signup-link {
            color: rgb(128, 128, 128); 
            text-decoration: none; 
            font-weight: bold;
            transition: color 0.3s ease; /* 색상이 부드럽게 변하도록 추가 */
        }
    
        .signup-link:hover {
            color: rgb(50, 50, 50);
        }

        .account-link {
            color: rgb(128, 128, 128); 
            text-decoration: none; 
            font-weight: bold;
            transition: color 0.3s ease; /* 색상이 부드럽게 변하도록 추가 */
        }
    
        .account-link:hover {
            color: rgb(50, 50, 50);
        }

        .error-border { border: 2px solid #ff4d4d !important; }
        .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 40px; }
        
        button { width: 340px; background-color: #2f63c7; color: white; border: none; padding: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="tori-container">
        <img src="https://github.com/Jihye2002/healthykids_workspace/blob/main/%ED%86%A0%EB%A6%AC-%EB%A1%9C%EA%B7%B8%EC%9D%B8_%EB%B0%B0%EA%B2%BD%20.png?raw=true" class="tori-img" alt="토리">
    </div>

    <div class="background-elements">
        <div class="floating-shape" style="top: 15%; left: 10%; font-size: 35px; color: #a2d2ff; transform: rotate(15deg);">★</div>
        <div class="floating-shape" style="top: 45%; right: 12%; font-size: 28px; color: #fdfd96; transform: rotate(-20deg);">★</div>
        <div class="floating-shape" style="top: 80%; left: 20%; font-size: 40px; color: #ffafcc; transform: rotate(5deg);">★</div>
        
        <div class="floating-shape" style="top: 35%; left: 8%; font-size: 45px; color: #ff8fab;">♥</div>
        <div class="floating-shape" style="top: 15%; right: 28%; font-size: 30px; color: #ffc8dd;">♥</div>
        <div class="floating-shape" style="top: 70%; right: 10%; font-size: 35px; color: #bde0fe;">♥</div>
        
        <div class="floating-shape" style="width: 35px; height: 35px; background: #caffbf; border-radius: 50%; top: 65%; left: 15%;"></div>
        <div class="floating-shape" style="width: 25px; height: 25px; background: #bdb2ff; border-radius: 50%; top: 25%; right: 15%;"></div>
        
        <div class="floating-shape" style="width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 25px solid #ffcc80; top: 10%; left: 40%;"></div>
        <div class="floating-shape" style="width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 35px solid #a0c4ff; top: 85%; right: 35%;"></div>
    </div>
    
    <div class="box">
        <h2>로그인 | LOGIN</h2>
        
        <form id="login-form">
            <div class="input-wrapper" id="id-group">
                <input type="text" id="user-id" class="input-field" placeholder="아이디를 입력해 주세요!" required>
                <span class="email-suffix">@healthykids.com</span>
            </div>
            <div id="user-id-error" class="error-text">아이디를 다시 봐주세요!!</div>
            
            <div class="input-wrapper">
                <input type="password" id="password" class="input-field" placeholder="비밀번호" required>
                <span id="toggle-password">🔒</span>
            </div>
            <div id="password-error" class="error-text">비밀번호가 틀렸어요. 다시 한 번 입력해 주세요!</div>
            
            <button type="submit">로그인</button>
        </form>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <button id="google-btn" style="background:#4285f4;">Google로 로그인</button>
        <button id="kakao-btn" style="background:#fee500; color:#000;">Kakao로 로그인</button>
        <button id="naver-btn" style="background:#03c75a;">Naver로 로그인</button>
            
        <p style="margin-top: 20px;">아직 아이디와 비밀번호가 없으신가요? <a href="signup.html" class="signup-link">회원가입하기</a></p>
        <p><a href="find-account.html" class="account-link">아이디와 비밀번호를 잊어버렸어요!</a></p>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        async function init() {
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                window.supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                
                document.getElementById('login-form')?.addEventListener('submit', handleLogin);
                setupRealtimeErrorRemoval();
                
                const togglePassword = document.getElementById('toggle-password');
                const passwordInput = document.getElementById('password');
                togglePassword?.addEventListener('click', () => {
                    const type = passwordInput.type === 'password' ? 'text' : 'password';
                    passwordInput.type = type;
                    togglePassword.textContent = type === 'password' ? '🔒' : '🔓';
                });
            } catch (err) { console.error("초기화 실패:", err); }
        }
    
        function showError(inputId, message) {
            const input = document.getElementById(inputId);
            const errorDiv = document.getElementById(inputId + '-error');
            if (input) input.parentElement.classList.add('error-border');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }
        }
    
        function setupRealtimeErrorRemoval() {
            document.querySelectorAll('.input-field').forEach(input => {
                input.addEventListener('input', () => {
                    input.parentElement.classList.remove('error-border');
                    const errorDiv = document.getElementById(input.id + '-error');
                    if (errorDiv) errorDiv.style.display = 'none';
                });
            });
        }
    
        async function handleLogin(e) {
            e.preventDefault();
            const userId = document.getElementById('user-id').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = e.target.querySelector('button');
            
            document.querySelectorAll('.error-text').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.input-wrapper').forEach(el => el.classList.remove('error-border'));
            submitBtn.disabled = true;
    
            const { data: userRecord, error: dbError } = await window.supabase
                .from('public.users')
                .select('id')
                .eq('email', `${userId}@healthykids.com`)
                .maybeSingle();
    
            if (!userRecord) {
                showError('user-id', "아이디가 올바르지 않은 것 같아요. 한 번 더 볼까요?");
                submitBtn.disabled = false;
                return;
            }
    
            // 2. 아이디가 있다면 비밀번호 검증
            const { error } = await window.supabase.auth.signInWithPassword({ 
                email: `${userId}@healthykids.com`, 
                password 
            });
            
            if (error) {
                showError('password', "앗! 비밀번호가 맞지 않는 것 같아요. 한 번 더 봐주세요!");
                submitBtn.disabled = false;
            } else {
                window.location.href = 'index.html';
            }
        }
    
        document.addEventListener('DOMContentLoaded', init);
    
        async function socialLogin(provider) {
            try {
                if (!window.supabase) {
                    console.error("Supabase가 초기화되지 않았습니다.");
                    return;
                }
        
                // redirectTo를 index.html로 설정하여 DB 로직이 있는 페이지를 아예 거치지 않게 합니다.
                const { error } = await window.supabase.auth.signInWithOAuth({
                    provider: provider,
                    options: { 
                        redirectTo: 'https://healthykids-workspace.onrender.com/index.html' 
                    }
                });
        
                if (error) throw error;
            } catch (err) {
                console.error("소셜 로그인 오류:", err.message);
                alert("로그인 처리 중 문제가 발생했습니다.");
            }
        }
        
        // 버튼 연결
        document.getElementById('google-btn')?.addEventListener('click', (e) => {
            e.preventDefault();
            socialLogin('google');
        });
        
        document.getElementById('kakao-btn')?.addEventListener('click', (e) => {
            e.preventDefault();
            socialLogin('kakao');
        });
        
        // 2. 네이버 로그인 (기존 방식 유지 - 잘 되고 있으니 그대로)
        async function handleNaverLogin(e) {
            if (e) e.preventDefault();
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                const callbackUrl = encodeURIComponent("https://healthykids-workspace.onrender.com/callback.html");
                
                window.location.href = `https://nid.naver.com/oauth2.0/authorize?response_type=token&client_id=${config.NAVER_CLIENT_ID}&redirect_uri=${callbackUrl}&state=RANDOM`;
            } catch (err) {
                console.error("네이버 로그인 처리 중 오류 발생:", err);
            }
        }
        
        document.getElementById('naver-btn')?.addEventListener('click', handleNaverLogin);
    </script>
</body>
</html>
