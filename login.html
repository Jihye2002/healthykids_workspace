<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 로그인</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #f0f7ff; }
        .box { background: white; padding: 40px; width: 420px; margin: auto; border: 2px solid #2f63c7; }
        
        /* 회원가입 페이지와 동일한 입력창 스타일 */
        .input-wrapper { 
            width: 340px; height: 45px; margin: 8px auto; border: 2px solid #ddd; 
            box-sizing: border-box; display: flex; align-items: center; position: relative; background: white;
        }
        .input-field { width: 100%; height: 100%; border: none !important; outline: none !important; padding: 0 12px; font-size: 14px; background: transparent; }
        
        .email-suffix { color: #777; padding-right: 12px; font-size: 14px; white-space: nowrap; }
        #toggle-password { position: absolute; right: 10px; cursor: pointer; font-size: 18px; user-select: none; }
        
        /* 포커스 시 테두리 검정색 */
        .input-wrapper:has(input:focus) { border: 2px solid #000 !important; }

        .error-border { border: 2px solid #ff4d4d !important; }
        .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 40px; }
        
        button { width: 340px; background-color: #2f63c7; color: white; border: none; padding: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    
    <div class="box">
        <h2>로그인 | LOGIN</h2>
        
        <form id="login-form">
            <div class="input-wrapper" id="id-group">
                <input type="text" id="user-id" class="input-field" placeholder="아이디를 입력해 주세요!" required>
                <span class="email-suffix">@healthykids.com</span>
            </div>
            <div id="user-id-error" class="error-text">아이디를 다시 봐주세요!!</div>
            
            <div class="input-wrapper">
                <input type="password" id="password" class="input-field" placeholder="비밀번호" required>
                <span id="toggle-password">🔒</span>
            </div>
            <div id="password-error" class="error-text">비밀번호가 틀렸어요. 다시 한 번 입력해 주세요!</div>
            
            <button type="submit">로그인</button>
        </form>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <button id="google-btn" style="background:#4285f4;">Google로 로그인</button>
        <button id="kakao-btn" style="background:#fee500; color:#000;">Kakao로 로그인</button>
        <button id="naver-btn" style="background:#03c75a;">Naver로 로그인</button>
            
        <p style="margin-top: 20px;">아직 아이디와 비밀번호가 없으신가요? <a href="signup.html" style="color: rgb(50, 50, 50); text-decoration: none; font-weight: bold;">회원가입하기</a></p>
        <p><a href="find-account.html" style="color: rgb(50, 50, 50); text-decoration: none; font-weight: bold;">아이디와 비밀번호를 잊어버렸어요!</a></p>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        async function init() {
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                window.supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                
                document.getElementById('login-form')?.addEventListener('submit', handleLogin);
                setupRealtimeErrorRemoval();
                
                const togglePassword = document.getElementById('toggle-password');
                const passwordInput = document.getElementById('password');
                togglePassword?.addEventListener('click', () => {
                    const type = passwordInput.type === 'password' ? 'text' : 'password';
                    passwordInput.type = type;
                    togglePassword.textContent = type === 'password' ? '🔒' : '🔓';
                });
            } catch (err) { console.error("초기화 실패:", err); }
        }
    
        function showError(inputId, message) {
            const input = document.getElementById(inputId);
            const errorDiv = document.getElementById(inputId + '-error');
            if (input) input.parentElement.classList.add('error-border');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }
        }
    
        function setupRealtimeErrorRemoval() {
            document.querySelectorAll('.input-field').forEach(input => {
                input.addEventListener('input', () => {
                    input.parentElement.classList.remove('error-border');
                    const errorDiv = document.getElementById(input.id + '-error');
                    if (errorDiv) errorDiv.style.display = 'none';
                });
            });
        }
    
        async function handleLogin(e) {
            e.preventDefault();
            const userId = document.getElementById('user-id').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = e.target.querySelector('button');
            
            document.querySelectorAll('.error-text').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.input-wrapper').forEach(el => el.classList.remove('error-border'));
            submitBtn.disabled = true;
    
            const { data: userRecord, error: dbError } = await window.supabase
                .from('public.users')
                .select('id')
                .eq('email', `${userId}@healthykids.com`)
                .maybeSingle();
    
            if (!userRecord) {
                showError('user-id', "아이디가 올바르지 않은 것 같아요. 한 번 더 볼까요?");
                submitBtn.disabled = false;
                return;
            }
    
            // 2. 아이디가 있다면 비밀번호 검증
            const { error } = await window.supabase.auth.signInWithPassword({ 
                email: `${userId}@healthykids.com`, 
                password 
            });
            
            if (error) {
                showError('password', "앗! 비밀번호가 맞지 않는 것 같아요. 한 번 더 봐주세요!");
                submitBtn.disabled = false;
            } else {
                window.location.href = 'index.html';
            }
        }
    
        document.addEventListener('DOMContentLoaded', init);
    
        async function socialLogin(provider) {
        try {
            // 인증 시작 전 supabase 객체 확인
            if (!window.supabase) {
                console.error("Supabase가 초기화되지 않았습니다.");
                return;
            }
    
            const { error } = await window.supabase.auth.signInWithOAuth({
                provider: provider,
                options: { 
                    redirectTo: 'https://healthykids-workspace.onrender.com/index.html' 
                }
            });
    
            if (error) throw error;
        } catch (err) {
            console.error("소셜 로그인 오류:", err.message);
        }
    }
    
    document.getElementById('google-btn')?.addEventListener('click', (e) => {
        e.preventDefault();
        socialLogin('google');
    });
    
    document.getElementById('kakao-btn')?.addEventListener('click', (e) => {
        e.preventDefault();
        socialLogin('kakao');
    });

    async function handleNaverLogin(e) {
        e.preventDefault();
        try {
            const res = await fetch('/get-config');
            const config = await res.json();
            const callbackUrl = encodeURIComponent("https://healthykids-workspace.onrender.com/callback.html");
            
            window.location.href = `https://nid.naver.com/oauth2.0/authorize?response_type=token&client_id=${config.NAVER_CLIENT_ID}&redirect_uri=${callbackUrl}&state=RANDOM`;
        } catch (err) {
            console.error("네이버 로그인 처리 중 오류 발생:", err);
        }
    }
    </script>
</body>
</html>
