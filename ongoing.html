<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>헬시키즈 | 진행 중인 영상</title>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; padding: 40px; background-color: #f4f8ff; color: #333; }
        .box { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border: 2px solid #2f63c7; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h2 { color: #2f63c7; margin-bottom: 30px; text-align: center; }
        
        /* 비로그인 안내 메시지 스타일 */
        #auth-alert { display: none; text-align: center; padding: 60px 20px; }
        #auth-alert h2 { color: #2f63c7; margin-bottom: 15px; }
        .login-btn { display: inline-block; background: #2f63c7; color: white; padding: 12px 30px; border-radius: 2px; text-decoration: none; font-weight: bold; margin-top: 20px; }

        .video-item { border-bottom: 1px solid #eee; padding: 25px 0; }
        .video-item h3 { margin-bottom: 15px; color: #1a5f96; }
        .progress-bar-bg { background: #e0e0e0; height: 12px; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .progress-bar-fill { background: #2f63c7; height: 100%; transition: width 0.5s ease-in-out; }
        .btn-link { display: inline-block; background: #2f63c7; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 0.9em; margin-top: 10px; }
        .quiz-links { margin-top: 10px; font-size: 0.9em; color: #666; }
        .quiz-links a { color: #d9534f; font-weight: bold; text-decoration: none; margin-right: 10px; }
    </style>
</head>
<body>

<div id="auth-alert" class="box">
    <h2>로그인이 필요해요!</h2>
    <p>회원님만 볼 수 있는 소중한 시청 기록이에요.<br>로그인 후 이용해 주세요!</p>
    <a href="login.html" class="login-btn">로그인 하러 가기</a>
</div>

<div id="main-content" class="box" style="display: none;">
    <h2>🎥 진행 중인 영상</h2>
    <div id="video-list">목록을 불러오는 중이에요...</div>
</div>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    async function init() {
        const res = await fetch('/get-config');
        const config = await res.json();
        const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY, { auth: { persistSession: true } });

        const contentDB = {
            hygiene: { title: '토리와 함께 세균을 퇴치해봐요!', kahoot: ['https://kahoot.it/challenge/01812841', 'https://kahoot.it/challenge/03183156'] },
            crosswalk: { title: '토리와 함께 길 건널 때 어떻게 하면 되는지 알아가요!', kahoot: ['https://kahoot.it/challenge/07121259'] },
            foodsafety: { title: '토리와 올바르게 먹는 방법을 알아가요!', kahoot: ['https://kahoot.it/challenge/04466674'] },
            precaution: { title: '토리와 감기와 독감 바이러스를 물리쳐요!', kahoot: ['https://kahoot.it/challenge/07815381'] }
        };

        const container = document.getElementById('video-list');
        const { data: { user } } = await supabase.auth.getUser();

        // 1. 비로그인 처리
        if (!user) {
            document.getElementById('auth-alert').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
            container.innerHTML = '<p style="text-align:center;">로그인 후 학습 기록을 확인하세요.</p>';
            return;
        }

        // 2. 데이터 조회
        const { data: progressList } = await supabase
            .from('video_progress')
            .select('*')
            .eq('user_email', user.email);

        // 3. 렌더링
        let html = '';
        for (const [id, info] of Object.entries(contentDB)) {
            const record = (progressList || []).find(p => p.video_id === id) || { progress_time: 0 };
            const percent = Math.min(100, Math.round((record.progress_time / 100) * 100));
            html += `
                <div class="video-item">
                    <h3>${info.title}</h3>
                    <p>진행률: ${percent}%</p>
                    <a href="video.html?type=${id}">이어보기</a>
                </div>`;
        }
        container.innerHTML = html;
    }
    init();
</script>
</body>
</html>
