<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>헬시키즈 | 검색 결과</title>
    <style>
        /* 기존 스타일과 통일 */
        body { font-family: 'Arial', sans-serif; padding: 40px; background-color: #f4f8ff; }
        .box { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border: 2px solid #2f63c7; }
        .result-item { border-bottom: 1px solid #eee; padding: 20px 0; }
        .result-item h3 { color: #2f63c7; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="box">
    <h2>" <span id="query-text"></span> " 검색 결과</h2>
    <div id="results">검색 중...</div>
</div>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    async function initSearch() {
        // 1. 설정값 가져오기
        const res = await fetch('/get-config');
        const config = await res.json();
        const sb = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        
        // 2. 검색어 가져오기
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q');
        document.getElementById('query-text').textContent = q || "";

        if (!q) {
            document.getElementById('results').textContent = "검색어를 입력해주세요.";
            return;
        }

        // 3. Supabase 검색 실행
        const { data, error } = await sb
            .from('materials')
            .select('title, link')
            .ilike('title', `%${q}%`);

        // 4. 결과 표시
        const resultsDiv = document.getElementById('results');
        if (error) {
            resultsDiv.innerHTML = "검색 중 오류가 발생했습니다.";
            console.error(error);
        } else if (data && data.length > 0) {
            resultsDiv.innerHTML = data.map(item => `
                <div class="result-item">
                    <h3><a href="${item.link}">${item.title}</a></h3>
                </div>
            `).join('');
        } else {
            resultsDiv.innerHTML = "검색 결과가 없습니다.";
        }
    }

    // 함수 호출
    initSearch();
</script>
</body>
</html>
