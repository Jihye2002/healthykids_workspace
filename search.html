<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈</title>
    <style>
        /* 기본 리셋 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background-color: #fff; }

        /* --- 헤더 --- */
        .header { display: flex; align-items: center; padding: 10px 20px; flex-wrap: nowrap; gap: 20px; width: 100%;}
        .logo { flex-shrink: 0; }
        .logo img { display: block; width: 100%; max-width: 180px; height: auto; }
        .container { 
            display: flex; 
            align-items: center; 
            width: 100%; 
            gap: 20px; 
            flex: 1; 
            justify-content: space-between;
        }
        .search-bar { 
            display: flex; 
            align-items: center; 
            flex: 1;
            max-width: 800px;
            gap: 8px; 
        }
        .search-bar input { flex: 1 1 auto; padding: 10px; font-size: 15px; border: 1px solid #316ef4; min-width: 50px; border-radius: 5px; }
        .search-bar button { background-color: #fff; border: none; cursor: pointer; flex-shrink: 0; width: 30px; }
        .user-menu {
            display: flex;
            align-items: center;
            justify-content: flex-end; 
            white-space: nowrap;
            flex-shrink: 0;
            font-size: 15px;
            font-weight: 600;
        }
        
        #before-login {
            display: flex;
            align-items: center; /* 로그인, |, 회원가입을 한 줄로 정렬 */
        }

        /* 기존 스타일 아래에 추가 */
        #after-login {
            display: none; /* 기본적으로 숨김 처리 */
        }
        
        .user-menu a {
            white-space: nowrap;
            text-decoration: none;
            color: #6d6d6d;
            padding: 0 5px; 
            display: flex; /* 링크 안의 텍스트도 정렬 유지 */
            align-items: center;
        }
        
        .user-menu a:hover {
            color: #000000; 
        }
        
        .divider {
            margin: 0 4px;
            color: #6d6d6d;
            display: flex;       /* 추가: 수평 정렬을 위해 */
            align-items: center; /* 추가: 수평 정렬을 위해 */
        }
        /* --- 내비게이션 --- */
        /* --- 네비게이션바 전체 설정 --- */
        .navbar { 
            background-color: #2f63c7; 
            position: relative; 
        }

        .menu-list { 
            width: 100%;
            display: flex; 
            justify-content: center; /* 메뉴를 가로 중앙으로 정렬 */
            align-items: center;
            flex-wrap: nowrap;
            white-space: nowrap;
            list-style: none; 
            padding: 0;         /* 위아래 적절한 여백 */
            margin: 0;
            overflow-x: visible;
        }

        .menu-list > li { 
            flex: 1; 
            padding: 0 20px;
            text-align: center;
            position: relative;
            white-space: nowrap;
        }

        /* 상단 메인 메뉴 링크 스타일 */
        .menu-list > li { 
            display: block; 
            padding: 10px 15px; 
            color: white; 
            text-decoration: none; 
            font-weight: 600;
            transition: background 0.3s;
            white-space: nowrap;
        }

        /* 1. 메가 메뉴 전체 패널 */
        .mega-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%; 
            background-color: #ffffff;
            border-bottom: 3px solid #2f63c7;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        /* 호버 시 메가 메뉴 나타남 */
        .navbar:hover .mega-menu {
            display: block; 
        }

        /* 2. 컬럼 컨테이너 (정렬 담당) */
        .mega-content {
            display: flex;
            justify-content: stretch;
            width: 100%;
            padding: 20px 0;
        }

        /* 3. 각 컬럼 스타일 */
        .column {
            flex: 1;
            text-align: center;
            border-right: 1px solid #eee;
        }

        .column:last-child {
            border-right: none;
        }

        .column ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .column ul li a {
            color: #333;
            padding: 10px 0;
            display: block;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .column ul li a:hover {
            color: #2f63c7;
            font-weight: bold;
            background-color: #f8fbff;
        }        
        
       /* 검색 타이틀 스타일 */
        .search-title {
            padding-top: 35px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #2f63c7;
            color: #333;
        }
        
        /* 검색 결과 컨테이너 */
        .results-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        /* 검색 결과 항목 카드 스타일 */
        .result-item {
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #eee;
            transition: all 0.2s;
            text-decoration: none;
            color: #333;
            display: block;
        }
        
        .result-item:hover {
            background-color: #f0f7ff;
            border-color: #2f63c7;
            transform: translateX(5px);
        }
        
        .result-item strong {
            font-size: 1.1em;
            color: #2f63c7;
        }
    </style>
</head>
<body>

    <div class="logo">
        <a href="index.html">

</header>

<nav class="navbar">
    <ul class="menu-list">

        <li>안전수칙자료 다운로드</li>
        <li>Q&A</li>
    </ul>

    <div class="mega-menu">
        <div class="mega-content">
            <div class="column">
                <ul>
                    <li><a href="edit-profile.html">개인정보 수정</a></li>
                    <li><a href="withdraw.html">회원탈퇴</a></li>
                </ul>
            </div>

            <div class="column">
                <ul>
                    <li><a href="ongoing.html">진행중인 영상</a></li>
                    <li><a href="video.html?type=hygiene">위생안전</a></li>
                    <li><a href="video.html?type=crosswalk">실외안전</a></li>
                    <li><a href="video.html?type=foodsafety">생활건강</a></li>
                    <li><a href="video.html?type=precaution">질병예방</a></li>
                </ul>
            </div>

            <div class="column">
                <ul>
                    <li>
                        <a href="viewer.html?file=하루건강체크리스트.pdf">하루건강 체크리스트</a>
                    </li>
            
                    <li><a href="#">퀴즈</a></li>
                    <li><a href="viewer.html?file=활동지.pdf">활동지</a></li>
                </ul>
            </div>

            <div class="column">
                <ul>
                    <li><a href="viewer.html?file=위생안전수칙.pdf">위생안전자료</a></li>
                    <li><a href="viewer.html?file=실외안전수칙.pdf">실외안전자료</a></li>

<div class="contents">
    <h2 id="search-title" class="search-title">검색 결과</h2>
    <div id="search-results" class="results-container">
        </div>
</div>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // 1. 전역 상태 관리
    window.supabaseInstance = null;
    window.initPromise = null;

    async function initSupabase() {
        if (window.supabaseInstance) return window.supabaseInstance;
        
        if (sessionStorage.getItem('is_sb_initialized') === 'true') {
            const config = JSON.parse(sessionStorage.getItem('sb_config'));
            window.supabaseInstance = createClient(config.url, config.key);
            return window.supabaseInstance;
        }

        if (window.initPromise) return window.initPromise;

        window.initPromise = (async () => {
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                sessionStorage.setItem('sb_config', JSON.stringify({ url: config.SUPABASE_URL, key: config.SUPABASE_ANON_KEY }));
                sessionStorage.setItem('is_sb_initialized', 'true');
                window.supabaseInstance = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                return window.supabaseInstance;
            } catch (err) {
                console.error("초기화 실패:", err);
                return null;
            }
        })();
        return window.initPromise;
    }

    async function clearAllAuth() {
        const sb = await initSupabase();
        if (sb) await sb.auth.signOut();
        localStorage.clear();
        sessionStorage.clear();
    }

    // 2. UI 업데이트
    async function updateUI(session) {
        const sb = await initSupabase();
        const beforeLogin = document.getElementById('before-login');
        const afterLogin = document.getElementById('after-login');
        const welcomeMsg = document.getElementById('welcome-message');

        const naverUser = JSON.parse(localStorage.getItem('user'));
        const isNaver = naverUser && naverUser.provider === 'naver';
        const currentUser = session?.user || (isNaver ? naverUser : null);

        if (!currentUser) {
            if (beforeLogin) beforeLogin.style.display = 'flex';
            if (afterLogin) afterLogin.style.display = 'none';
            return;
        }

        if (beforeLogin) beforeLogin.style.display = 'none';
        if (afterLogin) afterLogin.style.display = 'flex';

        // 닉네임 표시 로직
        try {
            let displayName = "사용자";
            if (isNaver) {
                const { data: dbUser } = await sb.from('users').select('name').eq('email', naverUser.email).maybeSingle();
                displayName = dbUser?.name || naverUser.name || "사용자";
            } else {
                const provider = currentUser.app_metadata?.provider;
                const isSocial = ['google', 'kakao'].includes(provider);
                const table = isSocial ? 'users' : 'public.users';
                const col = isSocial ? 'name' : 'nickname';
                const { data: dbUser } = await sb.from(table).select(col).eq('email', currentUser.email).maybeSingle();
                displayName = dbUser?.[col] || currentUser.user_metadata?.[col] || "사용자";
            }
            if (welcomeMsg) welcomeMsg.textContent = displayName;
        } catch (err) { console.error("UI 업데이트 오류:", err); }
    }

    // search.html 코드 내 performSearch 함수 부분
    async function performSearch() {
        const params = new URLSearchParams(window.location.search);
        const query = params.get('q');
        const resultsDiv = document.getElementById('search-results');
        
        if (!query) return;
    
        document.getElementById('search-title').textContent = `"${query}" 검색 결과`;
        resultsDiv.textContent = "검색 중...";
    
        const sb = await initSupabase();
        
        const { data, error } = await sb
            .from('materials') 
            .select('*')
            .ilike('title', `%${query}%`);
    
        if (error) {
            resultsDiv.textContent = "검색 중 오류가 발생했습니다: " + error.message;
            return;
        }
    
        // [이 부분입니다] 아래 내용을 기존 resultsDiv.innerHTML 줄 대신 넣으세요!
        if (data && data.length > 0) {
            resultsDiv.innerHTML = data.map(item => `
                <a href="${item.link}" class="result-item" style="display: block; padding: 20px; background-color: #f9f9f9; border-radius: 10px; border: 1px solid #eee; text-decoration: none; color: #333; margin-bottom: 10px;">
                    <span style="font-size: 0.8em; color: #2f63c7; font-weight: bold; background: #eef5ff; padding: 2px 8px; border-radius: 4px;">${item.category}</span>
                    <strong style="display: block; margin-top: 10px; font-size: 1.1em; color: #333;">${item.title}</strong>
                    <p style="color: #777; margin-top: 5px; font-size: 0.9em;">바로가기 ></p>
                </a>
            `).join('');
        } else {
            resultsDiv.innerHTML = '<p>검색 결과가 없습니다.</p>';
        }
    }
    // 4. 통합 초기화
    document.addEventListener('DOMContentLoaded', async () => {
        const sb = await initSupabase();
        if (!sb) return;

        // 로그인/로그아웃 관련 초기화
        const { data: { session } } = await sb.auth.getSession();
        updateUI(session);

        document.getElementById('logout-btn')?.addEventListener('click', async () => {
            await clearAllAuth();
            window.location.href = 'index.html';
        });

        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN') updateUI(session);
        });

        // 검색 실행
        performSearch();
    });
</script>
</body>
</html>
