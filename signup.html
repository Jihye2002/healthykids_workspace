<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 회원가입</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #f0f7ff; }
        .box { 
            background: white; 
            border-radius: 20px; 
            padding: 30px; 
            width: 350px; 
            margin: auto; 
        }
    
        /* 입력창 스타일 */
        .input-box { 
            width: 90%; 
            padding: 10px; 
            margin: 8px 0; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            transition: border 0.3s; 
        }

        /* 오류 시 테두리 스타일 */
        .error-border { border: 2px solid #ff4d4d !important; }
        /* 안내 문구 스타일 */
        .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 5%; }
        input, select { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        button { background-color: #2f63c7; color: white; border: none; padding: 12px 20px; border-radius: 0px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box" style="width: 480px; margin: 50px auto; padding: 40px; border: 1px solid #ccc; text-align: center; border-radius: 8px;">
        <h2>회원가입 | SIGN-UP</h2>
        
        <form id="signup-form">
            <input type="text" id="signup-email" class="input-box" placeholder="이메일" style="width: 340px;" readonly>
            <input type="text" id="signup-name" class="input-box" placeholder="이름" style="width: 340px;" readonly>
            
            <input type="text" id="signup-nickname" class="input-box" placeholder="특별한 별명을 만들어주세요!" style="width: 340px;" required>
            
            <select id="hint-question" class="input-box" style="width: 340px; padding: 10px;">
                <option value="가장 좋아하는 동물은?">가장 좋아하는 동물은?</option>
                <option value="내가 태어난 곳은?">내가 태어난 곳은?</option>
                <option value="가장 좋아하는 음식은?">가장 좋아하는 음식은?</option>
            </select>
            
            <input type="text" id="hint-answer" class="input-box" placeholder="질문에 대한 답 (나만 알기!)" style="width: 340px;" required>
            
            <button type="submit" class="input-box" style="width: 340px; background-color: #2f63c7; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px;">가입하기</button>
        </form>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <button id="google-signup" style="width: 340px; background:#4285f4; color:white; border:none; padding:10px; margin-bottom:5px; cursor:pointer;">Google로 가입하기</button>
        <button id="kakao-signup" style="width: 340px; background:#fee500; color:#000; border:none; padding:10px; margin-bottom:5px; cursor:pointer;">Kakao로 가입하기</button>
        <button id="naver-signup" style="width: 340px; background:#03c75a; color:white; border:none; padding:10px; margin-bottom:5px; cursor:pointer;">Naver로 가입하기</button>
        
        <p style="margin-top: 20px;">이미 아이디와 비밀번호(암호)가 있으신가요? <a href="login.html">로그인하기</a></p>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        async function initSupabase() {
            const res = await fetch('/get-config');
            const config = await res.json();
            return createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        }
        
        // 1. 일반 회원가입
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const supabase = await initSupabase();
            
            // 폼 데이터 수집
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const nickname = document.getElementById('nickname').value;
            const question = document.getElementById('question').value;
            const answer = document.getElementById('answer').value;
        
            // Auth 생성
            const { data: auth, error: authErr } = await supabase.auth.signUp({ email, password });
            if (authErr) return alert(authErr.message);
        
            // DB 저장
            const { error: dbErr } = await supabase.from('users').insert([
                { email, name, nickname, question, answer }
            ]);
        
            if (dbErr) alert("DB 저장 실패: " + dbErr.message);
            else { alert("가입 완료!"); window.location.href = 'login.html'; }
        });
        
        // 2. 구글/카카오 가입 (Supabase OAuth)
        const socialSignUp = async (provider) => {
            // initSupabase()가 window.supabase를 반환하도록 되어있다고 가정합니다.
            const supabase = await initSupabase(); 
            
            await supabase.auth.signInWithOAuth({
                provider: provider, // 여기는 'google', 'kakao' 여야 합니다.
                options: { 
                    redirectTo: 'https://healthykids-workspace.onrender.com/callback.html' 
                }
            });
        };
        
        document.getElementById('google-signup').addEventListener('click', () => socialSignUp('google'));
        document.getElementById('kakao-signup').addEventListener('click', () => socialSignUp('kakao'));
        
        // 3. 네이버 가입 (기존 API 호출 방식)
        document.getElementById('naver-btn').addEventListener('click', async () => {
            const res = await fetch('/get-config');
            const config = await res.json();
            const callback = encodeURIComponent("https://healthykids-workspace.onrender.com/callback.html");
            window.location.href = `https://nid.naver.com/oauth2.0/authorize?response_type=token&client_id=${config.NAVER_CLIENT_ID}&redirect_uri=${callback}&state=RANDOM`;
        });
    </script>
</body>
</html>
