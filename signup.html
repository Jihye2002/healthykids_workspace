<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 회원가입</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #f0f7ff; }
        .box { 
            background: white; 
            border-radius: 20px; 
            padding: 30px; 
            width: 350px; 
            margin: auto; 
        }
    
        /* 입력창 스타일 */
        .input-box { 
            width: 90%; 
            padding: 10px; 
            margin: 8px 0; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            transition: border 0.3s; 
        }

        /* 오류 시 테두리 스타일 */
        .error-border { border: 2px solid #ff4d4d !important; }
        /* 안내 문구 스타일 */
        .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 5%; }
        input, select { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        button { background-color: #2f63c7; color: white; border: none; padding: 12px 20px; border-radius: 0px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>회원가입 | SIGN-UP</h2>
        <form id="signup-form">
        <div style="display: flex; align-items: center; justify-content: center; gap: 5px;">
            <input type="text" id="signup-id" class="input-box" placeholder="어떤 아이디를 사용할까요?" style="width: 50%;" required>
            <span style="font-size: 14px; color: #555;">@healthykids.com</span>
        </div>
        <div id="id-error" class="error-text">아이디를 입력해주세요!</div>
    
        <input type="text" id="signup-nickname" class="input-box" placeholder="특별한 별명을 만들어주세요!" required>
        <div id="nickname-error" class="error-text">별명을 입력해주세요!</div>
    
        <input type="password" id="signup-password" class="input-box" placeholder="암호를 만들어주세요!" required onkeyup="validatePassword()">
        <div id="pw-error" class="error-text">💡 암호는 8글자보다 길어야 하고, 알파벳 대문자/소문자, 숫자, 기호를 모두 사용해서 만들어주세요!</div>
        
        <select id="hint-question" class="input-box">
            <option value="가장 좋아하는 동물은?">가장 좋아하는 동물은?</option>
            <option value="내가 태어난 곳은?">내가 태어난 곳은?</option>
            <option value="가장 좋아하는 음식은?">가장 좋아하는 음식은?</option>
        </select>
        
        <input type="text" id="hint-answer" class="input-box" placeholder="질문에 대한 답 (나만 알기!)" required>
        
        <button type="submit" class="input-box" style="background-color: #2f63c7; color: white; border: none; cursor: pointer; font-weight: bold;">가입하기</button>
    </form>
    
    <hr>
    <button id="google-signup">Google로 가입하기</button>
    <button id="kakao-signup">Kakao로 가입하기</button>
    <button id="naver-signup">Naver로 가입하기</button>
    
    <p>이미 아이디와 비밀번호(암호)가 있으신가요? <a href="login.html">로그인하기</a></p>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
        let supabase = null;
    
        // 1. 초기화가 완료될 때까지 버튼 비활성화
        const signupBtn = document.querySelector('button[type="submit"]');
        if (signupBtn) {
            signupBtn.disabled = true;
            signupBtn.innerText = "로딩 중...";
        }
    
        async function init() {
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                window.supabase = supabase;
                if (signupBtn) {
                    signupBtn.disabled = false;
                    signupBtn.innerText = "가입하기";
                }
                console.log("Supabase 초기화 완료");
            } catch (err) {
                console.error("초기화 실패:", err);
                alert("서버 연결 실패. 페이지를 새로고침하세요.");
            }
        }
        init();
    
        // 2. 페이지 로드
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const email = params.get('email');
            const idEl = document.getElementById('signup-id');
            if (email && idEl) idEl.value = email.split('@')[0];
        };
    
        // 3. 폼 제출 이벤트
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            console.log("폼 제출 시작");
    
            if (!window.supabase) {
                alert("연결 중입니다. 잠시만 기다려주세요.");
                return;
            }
    
            const params = new URLSearchParams(window.location.search);
            const email = params.get('email');
            const name = decodeURIComponent(params.get('name') || '');
            const nickname = document.getElementById('signup-nickname').value;
    
            if (!email) {
                alert("이메일 정보가 없습니다. 다시 로그인해주세요.");
                return;
            }
    
            try {
                const { error } = await window.supabase.from('users').insert([
                    { 
                        email: email, 
                        name: name, 
                        nickname: nickname,
                        profile_image: '', 
                        gender: '',        
                        birthday: '', 
                        age: '0',          
                        birthyear: '0' 
                    }
                ]);
    
                if (error) {
                    console.error("저장 에러:", error);
                    alert("가입 실패: " + error.message);
                } else {
                    alert("회원가입 성공!");
                    localStorage.setItem('user_email', email);
                    window.location.href = '/index.html'; 
                }
            } catch (err) {
                console.error("예외:", err);
                alert("오류 발생: " + err.message);
            }
        });
    
        // 4. 소셜 가입
        document.getElementById('google-signup').addEventListener('click', () => {
            window.supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: 'https://healthykids-workspace.onrender.com/login.html' }});
        });
        document.getElementById('kakao-signup').addEventListener('click', () => {
            window.supabase.auth.signInWithOAuth({ provider: 'kakao', options: { redirectTo: 'https://healthykids-workspace.onrender.com/login.html' }});
        });
        document.getElementById('naver-signup').addEventListener('click', async () => {
            const res = await fetch('/get-config');
            const config = await res.json();
            const callbackUrl = encodeURIComponent("https://healthykids-workspace.onrender.com/callback.html");
            window.location.href = `https://nid.naver.com/oauth2.0/authorize?response_type=token&client_id=${config.NAVER_CLIENT_ID}&redirect_uri=${callbackUrl}&state=RANDOM`;
        });
    </script>
</body>
</html>
