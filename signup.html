<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 회원가입</title>
</head>
<body>
    <h2>회원가입 | SIGN-UP</h2>
    <form id="signup-form">
        <input type="text" id="signup-id" placeholder="아이디" required><br>
        <input type="password" id="signup-password" placeholder="비밀번호" required><br>
        <button type="submit">가입하기</button>
    </form>
    
    <hr>
    <button id="google-btn">Google로 가입</button>
    <button id="kakao-btn">Kakao로 가입</button>
    <button id="naver-btn">Naver로 가입</button>
    
    <p>이미 계정이 있으신가요? <a href="login.html">로그인하기</a></p>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        async function initSupabase() {
            try {
                const response = await fetch('/get-config');
                const config = await response.json();
                window.supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                setupEventListeners();
            } catch (err) {
                console.error("초기화 실패:", err);
            }
        }

        function setupEventListeners() {
            // 1. 아이디 기반 회원가입 로직
            document.getElementById('signup-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const userId = document.getElementById('signup-id').value;
                const password = document.getElementById('signup-password').value;
                
                // 아이디를 이메일 형식으로 변환 (가상 이메일)
                const email = `${userId}@healthykids.com`;
                
                const { error } = await window.supabase.auth.signUp({ email, password });
                
                if (error) {
                    alert("가입 실패: " + error.message);
                } else {
                    alert("가입 성공! 로그인 페이지로 이동합니다.");
                    window.location.href = 'login.html';
                }
            });

            // 2. 소셜 로그인 함수
            const socialLogin = async (provider) => {
                const { error } = await window.supabase.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: 'https://healthykids-workspace.onrender.com/index.html'
                    }
                });
                if (error) alert("로그인 실패: " + error.message);
            };
        
            document.getElementById('google-btn').addEventListener('click', () => socialLogin('google'));
            document.getElementById('kakao-btn').addEventListener('click', () => socialLogin('kakao'));
            document.getElementById('naver-btn').addEventListener('click', () => socialLogin('custom:naver-login'));
        }

        initSupabase();
    </script>
</body>
</html>
