<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 회원가입</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #f0f7ff; }
        .box { 
            background: white; 
            border-radius: 20px; 
            padding: 30px; 
            width: 350px; 
            margin: auto; 
        }
    
        /* 입력창 스타일 */
        .input-box { 
            width: 90%; 
            padding: 10px; 
            margin: 8px 0; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            transition: border 0.3s; 
        }

        /* 오류 시 테두리 스타일 */
        .error-border { border: 2px solid #ff4d4d !important; }
        /* 안내 문구 스타일 */
        .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 5%; }
        input, select { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        button { background-color: #2f63c7; color: white; border: none; padding: 12px 20px; border-radius: 0px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>회원가입 | SIGN-UP</h2>
        <form id="signup-form">
        <div style="display: flex; align-items: center; justify-content: center; gap: 5px;">
            <input type="text" id="signup-id" class="input-box" placeholder="어떤 아이디를 사용할까요?" style="width: 50%;" required>
            <span style="font-size: 14px; color: #555;">@healthykids.com</span>
        </div>
        <div id="id-error" class="error-text">아이디를 입력해주세요!</div>
    
        <input type="text" id="signup-nickname" class="input-box" placeholder="특별한 별명을 만들어주세요!" required>
        <div id="nickname-error" class="error-text">별명을 입력해주세요!</div>
    
        <input type="password" id="signup-password" class="input-box" placeholder="암호를 만들어주세요!" required onkeyup="validatePassword()">
        <div id="pw-error" class="error-text">💡 암호는 8글자보다 길어야 하고, 알파벳 대문자/소문자, 숫자, 기호를 모두 사용해서 만들어주세요!</div>
        
        <select id="hint-question" class="input-box">
            <option value="가장 좋아하는 동물은?">가장 좋아하는 동물은?</option>
            <option value="내가 태어난 곳은?">내가 태어난 곳은?</option>
            <option value="가장 좋아하는 음식은?">가장 좋아하는 음식은?</option>
        </select>
        
        <input type="text" id="hint-answer" class="input-box" placeholder="질문에 대한 답 (나만 알기!)" required>
        
        <button type="submit" class="input-box" style="background-color: #2f63c7; color: white; border: none; cursor: pointer; font-weight: bold;">가입하기</button>
    </form>
    
    <hr>
    <button id="google-signup">Google로 가입하기</button>
    <button id="kakao-signup">Kakao로 가입하기</button>
    <button id="naver-signup">Naver로 가입하기</button>
    
    <p>이미 아이디와 비밀번호(암호)가 있으신가요? <a href="login.html">로그인하기</a></p>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
        let supabase = null;
    
        async function initSupabase() {
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                window.supabase = supabase;
            } catch (err) {
                console.error("초기화 실패:", err);
            }
        }
    
        // [핵심] 페이지 로드 시 URL 파라미터 확인 (자동 채우기)
        window.onload = () => {
            initSupabase();
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            const name = urlParams.get('name');
    
            if (email) {
                // 이메일 앞부분만 따서 ID 칸에 넣기 (필요시 수정)
                document.getElementById('signup-id').value = email.split('@')[0];
                // 다른 입력창들에 값 자동 채우기 (HTML의 ID가 signup-name 등이라고 가정)
                if(document.getElementById('signup-name')) document.getElementById('signup-name').value = name;

                document.getElementById('email').value = email;
                document.getElementById('name').value = decodeURIComponent(name);
            }
        };
    
        // 회원가입 폼 제출
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!supabase) { alert("잠시만 기다려주세요!"); return; }
    
            const userId = document.getElementById('signup-id').value;
            const nickname = document.getElementById('signup-nickname').value;
            const password = document.getElementById('signup-password').value;
            const email = `${userId}@healthykids.com`;
    
            // DB 가입 로직 수행 (이미 구현하신 로직 사용)
            const { error } = await supabase.from('users').insert({
                email: email,
                name: document.getElementById('signup-name').value,
                nickname: nickname
            });
    
            if (!error) {
                alert("회원가입이 완료되었습니다! 로그인해주세요.");
                window.location.href = '/login.html'; // 로그인 페이지로 이동
            } else {
                alert("가입 중 오류가 발생했습니다: " + error.message);
            }
        });
    
        // 소셜 가입 이벤트 (redirectTo를 callback.html로 변경!)
        const socialSignup = async (provider) => {
            if (!supabase) { alert("초기화 중입니다. 잠시만요!"); return; }
            await supabase.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: 'https://healthykids-workspace.onrender.com/login.html' }
            });
        };
    
        const handleNaverSignup = async () => {
            if (!supabase) { alert("잠시만 기다려주세요!"); return; }
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                const clientId = config.NAVER_CLIENT_ID;
                const callbackUrl = encodeURIComponent("https://healthykids-workspace.onrender.com/callback.html");
                const state = Math.random().toString(36).substring(7);
                window.location.href = `https://nid.naver.com/oauth2.0/authorize?response_type=token&client_id=${clientId}&redirect_uri=${callbackUrl}&state=${state}`;
            } catch (err) {
                console.error("네이버 가입 오류:", err);
            }
        };
    
        document.getElementById('google-signup').addEventListener('click', () => socialSignup('google'));
        document.getElementById('kakao-signup').addEventListener('click', () => socialSignup('kakao'));
        document.getElementById('naver-signup').addEventListener('click', handleNaverSignup);
    </script>
</body>
</html>
