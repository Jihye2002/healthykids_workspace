<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 회원가입</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #f0f7ff; }
        .box { 
            background: white; 
            padding: 60px; /* 회원가입 패딩 유지 */
            width: 420px; 
            margin: auto; 
            border: 2px solid #2f63c7; 
        }
        
        /* 입력창 및 공통 스타일 (border-radius 삭제) */
        .input-box { 
            width: 340px; 
            padding: 12px; 
            margin: 8px 0; 
            border: 2px solid #ddd; 
            border-radius: 0px; /* 각진 디자인으로 통일 */
            box-sizing: border-box; 
        }

        /* 오류 시 테두리 스타일 */
        .error-border { border: 2px solid #ff4d4d !important; }
        /* 안내 문구 스타일 */
        .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 5%; }
        button { 
            width: 340px; /* 너비 통일 */
            background-color: #2f63c7; 
            color: white; 
            border: none; 
            padding: 12px; 
            margin-top: 10px;
            border-radius: 0px; /* 버튼도 각지게 */
            cursor: pointer; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="auth-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 9999;">
        <div style="background: white; padding: 30px; border-radius: 15px; text-align: center;">
            <p id="modal-message"></p>
            <button onclick="window.location.href='login.html'">로그인하러 가기</button>
        </div>
    </div>
    
    <div class="box">
        <h2>회원가입 | SIGN-UP</h2>
        
        <form id="signup-form">
            <input type="text" id="name" class="input-box" placeholder="이름" required>
            <div id="name-error" class="error-text">이름이 뭔가요?</div>
            
            <input type="password" id="password" class="input-box" placeholder="비밀번호" required>
            <div id="password-error" class="error-text">만들고 싶은 비밀번호를 입력해 주세요!</div>
            
            <input type="text" id="nickname" class="input-box" placeholder="특별한 별명을 만들어주세요!" required>
            <div id="nickname-error" class="error-text">별명을 입력해 주세요!</div>
            
            <select id="question" class="input-box">
                <option value="가장 좋아하는 동물은?">가장 좋아하는 동물은?</option>
                <option value="내가 태어난 곳은?">내가 태어난 곳은?</option>
                <option value="가장 좋아하는 음식은?">가장 좋아하는 음식은?</option>
            </select>
            
            <input type="text" id="answer" class="input-box" placeholder="질문에 대한 답 (나만 알기!)" required>
            <div id="answer-error" class="error-text">답을 입력해주세요!</div>
            
            <button type="submit">가입하기</button>
        </form>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <button id="google-signup" style="width: 340px; background:#4285f4; color:white; border:none; padding:10px; margin-bottom:5px; cursor:pointer;">Google로 가입하기</button>
        <button id="kakao-signup" style="width: 340px; background:#fee500; color:#000; border:none; padding:10px; margin-bottom:5px; cursor:pointer;">Kakao로 가입하기</button>
        <button id="naver-signup" style="width: 340px; background:#03c75a; color:white; border:none; padding:10px; margin-bottom:5px; cursor:pointer;">Naver로 가입하기</button>
        
        <p style="margin-top: 20px;">이미 아이디와 비밀번호(암호)가 있으신가요? <a href="login.html">로그인하기</a></p>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
        async function initSupabase() {
            const res = await fetch('/get-config');
            const config = await res.json();
            return createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        }
    
        // 1. 에러 표시 공통 함수
        function showError(inputId, message) {
            const input = document.getElementById(inputId);
            const errorDiv = document.getElementById(inputId + '-error');
            if (input) input.classList.add('error-border');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }
        }
    
        // 2. 이미 가입된 유저 차단 (페이지 로드 시)
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('user_name')) {
                showAuthModal(`${localStorage.getItem('user_name')}님은 이미 가입되어 있어요!`);
            }
            
            // 입력 시 에러 자동 초기화 설정
            document.querySelectorAll('.input-box').forEach(input => {
                input.addEventListener('input', () => {
                    input.classList.remove('error-border');
                    const errorDiv = document.getElementById(input.id + '-error');
                    if (errorDiv) errorDiv.style.display = 'none';
                });
            });
        });
    
        function showAuthModal(message) {
            const modal = document.getElementById('auth-modal');
            const msgElement = document.getElementById('modal-message');
            if (!modal || !msgElement) return;
            msgElement.textContent = message;
            modal.style.display = 'flex';
            setTimeout(() => { window.location.href = 'login.html'; }, 3000);
        }
    
        // 3. 회원가입 제출 처리
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const supabase = await initSupabase();
            
            const name = document.getElementById('name').value;
            const password = document.getElementById('password').value;
            const nickname = document.getElementById('nickname').value;
            const question = document.getElementById('question').value;
            const answer = document.getElementById('answer').value;
            const virtualEmail = `${name.replace(/\s+/g, '')}${Date.now()}@healthykids.com`;
        
            // 가입 시도
            const { error: authErr } = await supabase.auth.signUp({ email: virtualEmail, password: password });
            
            if (authErr) {
                // [핵심] 여기서 영어 에러 메시지를 한글로 예쁘게 바꿔줍니다.
                let errorMessage = "가입 중 오류가 발생했어요.";
                
                if (authErr.message.includes("weak")) {
                    errorMessage = "비밀번호는 8글자 이상, 대소문자, 숫자, 기호를 모두 섞어서 만들어야 해요!";
                } else if (authErr.message.includes("already registered")) {
                    errorMessage = "이미 가입된 이메일(이름)이에요.";
                }
        
                showError('password', errorMessage); // 비밀번호 입력창 아래에 띄우기
                return;
            }
        
            // DB 저장
            const { error: dbErr } = await supabase.from('users').insert([{ 
                email: virtualEmail, name, nickname, question, answer 
            }]);
            
            if (dbErr) {
                showError('name', '데이터 저장 실패: ' + dbErr.message);
                return;
            }
        
            alert("가입 완료!");
            localStorage.setItem('user_name', name);
            window.location.href = 'login.html';
        });
    
        // 4. 소셜 가입 로직
        const socialSignUp = async (provider) => {
            const supabase = await initSupabase();
            await supabase.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: 'https://healthykids-workspace.onrender.com/login.html' }
            });
        };
    
        document.getElementById('google-signup')?.addEventListener('click', () => socialSignUp('google'));
        document.getElementById('kakao-signup')?.addEventListener('click', () => socialSignUp('kakao'));
        
        document.getElementById('naver-signup')?.addEventListener('click', async () => {
            const res = await fetch('/get-config');
            const config = await res.json();
            const callbackUrl = encodeURIComponent("https://healthykids-workspace.onrender.com/callback.html");
            window.location.href = `https://nid.naver.com/oauth2.0/authorize?response_type=token&client_id=${config.NAVER_CLIENT_ID}&redirect_uri=${callbackUrl}&state=RANDOM`;
        });
    </script>
</body>
</html>
