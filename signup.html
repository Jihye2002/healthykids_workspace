<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 회원가입</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #f0f7ff; }
        .box { background: white; border-radius: 20px; padding: 30px; width: 350px; margin: auto; }
        input, select { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        button { background-color: #2f63c7; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>회원가입 | SIGN-UP</h2>
        <form id="signup-form">
        <div style="display: flex; align-items: center; justify-content: center;">
            <input type="text" id="signup-id" placeholder="어떤 아이디를 사용할까요?" style="width: 50%;" required>
            <span>@healthykids.com</span>
        </div>
        <input type="text" id="signup-nickname" placeholder="별명을 적어주세요!" required><br>
        <input type="password" id="signup-password" placeholder="암호를 만들어주세요!" 
               pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[^a-zA-Z0-9]).{12,}" required>
        <p style="font-size: 12px; color: #666;">💡 암호는 12글자보다 길어야 하고, 알파벳 대문자/소문자, 숫자, 기호를 모두 사용해서 만들어주세요!</p>
        <select id="hint-question">
            <option value="가장 좋아하는 동물은?">가장 좋아하는 동물은?</option>
            <option value="내가 태어난 곳은?">내가 태어난 곳은?</option>
            <option value="가장 좋아하는 음식은?">가장 좋아하는 음식은?</option>
        </select>
        <input type="text" id="hint-answer" placeholder="질문에 대한 답 (나만 알기!)" required>
        <button type="submit">가입하기</button>
    </form>
    
    <hr>
    <button id="google-btn">Google로 가입</button>
    <button id="kakao-btn">Kakao로 가입</button>
    <button id="naver-btn">Naver로 가입</button>
    
    <p>이미 아이디와 비밀번호(암호)가 있으신가요? <a href="login.html">로그인하기</a></p>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        async function initSupabase() {
            const res = await fetch('/get-config');
            const config = await res.json();
            window.supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('signup-id').value;
            const nickname = document.getElementById('signup-nickname').value;
            const password = document.getElementById('signup-password').value;
            const hintQ = document.getElementById('hint-question').value;
            const hintA = document.getElementById('hint-answer').value;
            const email = `${userId}@healthykids.com`;

            // 별명 중복 확인
            const { data: existing } = await supabase.from('users').select('nickname').eq('nickname', nickname).single();
            if (existing) {
                alert("이미 있는 별명이에요. 다른 별명을 만들어 주세요!");
                document.getElementById('signup-nickname').style.border = "2px solid red";
                return;
            }

            const { error } = await supabase.auth.signUp({
                email, password, options: { data: { full_name: nickname } }
            });

            if (error) alert("가입 실패: " + error.message);
            else {
                // 3. 사용자 정보 저장 (질문과 답 포함)
                await supabase.from('users').insert([{ 
                    email, 
                    nickname, 
                    hint_question: hintQ, 
                    hint_answer: hintA 
                }]);
                alert("가입 성공! 이제 로그인해보세요.");
                window.location.href = 'login.html';
            }
        });
        initSupabase();
    </script>
</body>
</html>
