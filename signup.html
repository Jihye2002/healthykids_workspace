<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 회원가입</title>
</head>
<body>
    <h2>회원가입|SIGN-UP</h2>
    <form id="signup-form">
        <input type="email" id="signup-email" placeholder="이메일" required><br>
        <input type="password" id="signup-password" placeholder="비밀번호" required><br>
        <button type="submit">가입하기</button>
    </form>
    
    <hr>
    <button id="google-btn">Google로 가입</button>
    <button id="kakao-btn">Kakao로 가입</button>
    <button id="naver-btn">Naver로 가입</button>
    
    <p>이미 계정이 있으신가요? <a href="login.html">로그인하기</a></p>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

        // 1. 서버에서 설정값을 받아와 Supabase를 초기화하는 함수
        async function initSupabase() {
            try {
                // 요청 주소를 바꾼 이름으로 수정
                const response = await fetch('/get-config');
                const config = await response.json();
                
                // 2. Supabase 클라이언트 생성 및 window 객체에 저장
                window.supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                console.log("Supabase 초기화 완료!");

                // 초기화가 완료된 후 이벤트 리스너 등록
                setupEventListeners();
            } catch (err) {
                console.error("환경 설정 로드 실패:", err);
                alert("연동 오류가 발생했습니다.");
            }
        }

        // 3. 회원가입 및 소셜 로그인 로직
        function setupEventListeners() {
            // 이메일 회원가입
            document.getElementById('signup-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;
                
                const { data, error } = await window.supabase.auth.signUp({ email, password });
                if (error) alert("가입 실패: " + error.message);
                else alert("가입 성공! 이메일을 확인하세요.");
            });

            // 소셜 로그인 함수 정의
            const socialLogin = async (provider) => {
                const { error } = await window.supabase.auth.signInWithOAuth({ provider });
                if (error) alert("로그인 실패: " + error.message);
            };

            // 버튼 연결
            document.getElementById('google-btn').addEventListener('click', () => socialLogin('google'));
            document.getElementById('kakao-btn').addEventListener('click', () => socialLogin('kakao'));
            document.getElementById('naver-btn').addEventListener('click', () => socialLogin('CUSTOM:NAVER-LOGIN'));
        }

        // 함수 실행
        initSupabase();
    </script>
</body>
</html>
