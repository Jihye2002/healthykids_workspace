<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 회원가입</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 30px; background-color: #f0f7ff; }
        /* border-radius를 모두 0으로 바꾸면 각진 디자인이 됩니다 */
        .box { 
            background: white; 
            padding: 40px; /* 로그인 패딩 감소 (상하 높이 슬림하게) */
            width: 420px; 
            margin: auto; 
            border: 2px solid #2f63c7; 
            border-radius: 0px; 
        }
        
        /* 입력창 및 공통 스타일 (border-radius 삭제) */
        .input-box { 
            width: 340px; 
            padding: 12px; 
            margin: 8px 0; 
            border: 2px solid #ddd; 
            border-radius: 0px; /* 각진 디자인 */
            box-sizing: border-box; 
        }
        
        /* 아이디 입력 영역만 폼 너비와 맞춤 */
        .id-input-group {
            width: 340px;
            margin: 8px auto; 
            display: flex;
            align-items: center;
            border: 2px solid #ddd;
            border-radius: 0px;
            box-sizing: border-box; 
        }
        
        /* 수정된 버전 */
        .id-input-group input {
            border: none !important;      /* 중요: 테두리 삭제 */
            outline: none !important;     /* 중요: 포커스 아웃라인 삭제 */
            box-shadow: none !important;  /* 혹시 모를 그림자 제거 */
            flex: 1;           /* 핵심: 남은 공간 차지 */
            padding: 12px;     /* 패딩을 10px로 조정 (아까보다 조금 더 슬림해집니다) */
            width: 100%;       /* 너비 강제 설정 */
        }
        
        /* @healthykids.com 스타일 유지 */
        .email-suffix {
            color: #777;
            padding-right: 12px;
            font-size: 14px;
            white-space: nowrap;
        }

        .password-group {
            position: relative; /* 자식 요소(아이콘)의 기준점이 됩니다 */
            width: 340px;       /* 전체 너비 */
            margin: 8px auto;   /* 중앙 정렬 */
        }
        
        /* inputbox가 그룹 전체를 꽉 채우게 합니다 */
        .password-group input {
            width: 100%;
            padding: 12px;
            padding-right: 45px; /* 아이콘이 들어갈 공간을 확보합니다 */
            box-sizing: border-box; /* 패딩이 너비에 포함되게 합니다 */
        }
        
        /* 아이콘을 입력창 내부 오른쪽 끝으로 보냅니다 */
        #toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%); /* 정확히 수직 중앙에 배치 */
            cursor: pointer;
            user-select: none;
            font-size: 18px;
            z-index: 10; /* 다른 요소보다 위에 보이게 함 */
            padding: 16px;
        }

        /* 모든 input과 버튼의 둥근 모서리를 강제로 제거 */
        input, select, button, .box, .id-input-group {
            border-radius: 0px !important;
        }
        
        /* 폼 내부의 테두리 설정도 0px로 명시 */
        .input-box, .id-input-group {
            border-radius: 0px !important;
            border: 2px solid #ddd; /* 테두리 두께 유지 */
        }

        /* input이 포커스되었을 때 부모(id-input-group)의 테두리 색상 변경 */
        .id-input-group:has(input:focus) {
            border: 2px solid #000 !important;
            border-radius: 0px !important;
        }
        
        /* 포커스(클릭) 되었을 때 생기는 기본 둥근 효과 제거 */
        input:focus, select:focus, button:focus {
            outline: none;
            border: 2px solid #000;
        }
    
        .error-border { border: 2px solid #ff4d4d !important; }
        .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 5%; }
        
        /* 버튼 스타일 (가입하기 및 소셜 로그인 버튼 공통) */
        button { 
            width: 340px; 
            background-color: #2f63c7; 
            color: white; 
            border: none; 
            padding: 12px; 
            margin-top: 10px; 
            cursor: pointer; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div id="auth-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 9999;">
        <div style="background: white; padding: 30px; text-align: center;">
            <p id="modal-message"></p>
            <button onclick="window.location.href='login.html'">로그인하러 가기</button>
        </div>
    </div>
    
    <div class="box">
        <h2>회원가입 | SIGN-UP</h2>
        
        <form id="signup-form">
            <input type="text" id="name" class="input-box" placeholder="이름을 입력해 주세요!" required>
            <div id="name-error" class="error-text">이름이 뭔가요?</div>
        
            <div class="id-input-group">
                <input type="text" id="user-id" placeholder="나만의 아이디" required>
                <span class="email-suffix">@healthykids.com</span>
            </div>
            <div id="id-error" class="error-text">아이디를 입력해 주세요!</div>
            
            <div class="password-group" style="position: relative;">
                <input type="password" id="password" class="input-box" placeholder="비밀번호(대소문자·숫자·기호 섞어 8자 이상!)" required>
                <span id="toggle-password">🔒</span>
            </div>
            <div id="password-error" class="error-text">비밀번호를 입력해 주세요!</div>
            
            <input type="text" id="nickname" class="input-box" placeholder="특별한 별명을 만들어주세요!" required>
            <div id="nickname-error" class="error-text">별명을 입력해 주세요!</div>
            
            <select id="question" class="input-box">
                <option value="가장 좋아하는 동물은?">가장 좋아하는 동물은?</option>
                <option value="내가 태어난 곳은?">내가 태어난 곳은?</option>
                <option value="가장 좋아하는 음식은?">가장 좋아하는 음식은?</option>
            </select>
            
            <input type="text" id="answer" class="input-box" placeholder="질문에 대한 답 (나만 알기!)" required>
            <div id="answer-error" class="error-text">답을 입력해주세요!</div>
            
            <button type="submit">가입하기</button>
        </form>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <button id="google-signup" style="background:#4285f4;">Google로 가입하기</button>
        <button id="kakao-signup" style="background:#fee500; color:#000;">Kakao로 가입하기</button>
        <button id="naver-signup" style="background:#03c75a;">Naver로 가입하기</button>
        
        <p style="margin-top: 20px;">이미 아이디가 있으신가요? <a href="login.html">로그인하기</a></p>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        let supabaseInstance = null;
        async function initSupabase() {
            if (supabaseInstance) return supabaseInstance;
            const res = await fetch('/get-config');
            const config = await res.json();
            return createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        }

        function showError(id, message) {
            const errorDiv = document.getElementById(id + '-error');
            const inputElement = document.getElementById(id);
            
            // 에러 메시지 보이기
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }
            
            // 입력창 테두리 빨갛게 (아이디는 그룹 전체에)
            if (id === 'user-id') {
                document.querySelector('.id-input-group').classList.add('error-border');
            } else if (inputElement) {
                inputElement.classList.add('error-border');
            }
        }

        // 입력 시 테두리 초기화
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                input.classList.remove('error-border');
                const errorDiv = document.getElementById(input.id + '-error');
                if (errorDiv) errorDiv.style.display = 'none';
            });
        });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const supabase = await initSupabase();
            const userId = document.getElementById('user-id').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const nickname = document.getElementById('nickname').value;
            const question = document.getElementById('question').value;
            const answer = document.getElementById('answer').value;
            
            const virtualEmail = `${userId}@healthykids.com`;

            // 가입 요청
            const { error: authErr } = await supabase.auth.signUp({ 
                email: virtualEmail, 
                password: password 
            });
            
            if (authErr) {
                console.error("Supabase Error:", authErr);
            
                // 모든 에러 메시지 초기화 (이전 에러 지우기)
                document.querySelectorAll('.error-text').forEach(el => el.style.display = 'none');
                document.querySelectorAll('.input-box, .id-input-group').forEach(el => el.classList.remove('error-border'));
            
                // 에러 종류에 따라 화면에 표시
                if (authErr.message.includes("weak")) {
                    // 비밀번호 에러 처리
                    const pErr = document.getElementById('password-error');
                    pErr.textContent = "비밀번호가 너무 쉬워요! 영어 대소문자, 숫자, 기호를 섞어서 8글자보다 길게 만들어 주세요.";
                    pErr.style.display = 'block';
                    document.getElementById('password').classList.add('error-border');
                    
                } else if (authErr.message.includes("already registered")) {
                    // 아이디 중복 에러 처리
                    const iErr = document.getElementById('id-error');
                    iErr.textContent = "이미 아이디가 있어요ㅠㅠ 다른 아이디를 입력해 볼까요?";
                    iErr.style.display = 'block';
                    document.querySelector('.id-input-group').classList.add('error-border');
                    
                } else {
                    // 기타 에러는 비밀번호 창 아래에 통합 표시
                    const pErr = document.getElementById('password-error');
                    pErr.textContent = "잠깐 잘못된 것 같아요. 조금만 있다가 다시 시도해 주세요!";
                    pErr.style.display = 'block';
                    document.getElementById('password').classList.add('error-border');
                }
                return; // 함수 종료
            }

            const { error: dbErr } = await supabase.from('users').insert([{ email: virtualEmail, name, nickname, question, answer }]);
            if (dbErr) { showError('name', "죄송해요.조금 후에 다시 시도해 주세요."); return; }

            const modal = document.getElementById('auth-modal');
            document.getElementById('modal-message').textContent = "가입 완료! 로그인 페이지로 이동해요!";
            modal.style.display = 'flex';
            setTimeout(() => window.location.href = 'login.html', 3000);
        });

        // 비밀번호 보이기/숨기기 토글 기능
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        
        if (togglePassword) {
            togglePassword.addEventListener('click', function() {
                // 현재 타입이 password면 text로, 아니면 다시 password로 변경
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.textContent = type === 'password' ? '🔒' : '🔓';
            });
        }
    
        // 4. 소셜 가입 로직
        const socialSignUp = async (provider) => {
            const supabase = await initSupabase();
            await supabase.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: 'https://healthykids-workspace.onrender.com/login.html' }
            });
        };
    
        document.getElementById('google-signup')?.addEventListener('click', () => socialSignUp('google'));
        document.getElementById('kakao-signup')?.addEventListener('click', () => socialSignUp('kakao'));
        
        document.getElementById('naver-signup')?.addEventListener('click', async () => {
            const res = await fetch('/get-config');
            const config = await res.json();
            const callbackUrl = encodeURIComponent("https://healthykids-workspace.onrender.com/callback.html");
            window.location.href = `https://nid.naver.com/oauth2.0/authorize?response_type=token&client_id=${config.NAVER_CLIENT_ID}&redirect_uri=${callbackUrl}&state=RANDOM`;
        });
    </script>
</body>
</html>
