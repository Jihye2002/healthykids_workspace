<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 회원가입</title>
</head>
<body>
    <h2>회원가입|SIGN-UP</h2>
    <form id="signup-form">
        <input type="email" id="signup-email" placeholder="이메일" required><br>
        <input type="password" id="signup-password" placeholder="비밀번호" required><br>
        <button type="submit">가입하기</button>
    </form>
    
    <hr>
    <button onclick="socialLogin('google')">Google로 가입</button>
    <button onclick="socialLogin('kakao')">Kakao로 가입</button>
    <button onclick="socialLogin('naver')">Naver로 가입</button>
    
    <p>이미 계정이 있으신가요? <a href="login.html">로그인하기</a></p>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
        const supabase = createClient('SUPABASE_URL' , 'SUPABASE_ANON_KEY')

        // 이메일 가입
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data, error } = await supabase.auth.signUp({
                email: document.getElementById('signup-email').value,
                password: document.getElementById('signup-password').value,
            });
            if (error) alert(error.message);
            else alert("가입 성공! 이메일을 확인하세요.");
        });

        // 소셜 가입(로그인과 동일 로직)
        window.socialLogin = async (provider) => {
            await supabase.auth.signInWithOAuth({ provider });
        };
    </script>
</body>
</html>
