<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>헬시키즈 | 새 비밀번호 만들기</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            padding: 80px; 
            background-color: #afe1fc; 
            position: relative;
            min-height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        /* 머티리얼 심볼 스타일 */
        .material-symbols-outlined {
            position: absolute;
            font-size: 80px !important;
            color: #2f63c7;
            opacity: 0.6;
            z-index: 0;
        }

        .box { 
            background: white; 
            padding: 40px; 
            width: 350px; 
            margin: 50px auto; 
            border: 2px solid #2f63c7;
            position: relative;
            z-index: 1; 
        }

        .input-box { width: 90%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; outline: none; }
        .error-border { border: 2px solid #ff4d4d !important; }
        .error-text { font-size: 13px; color: #ff4d4d; margin: 15px 0; display: none; text-align: left; padding-left: 5%; }
        button { background-color: #2f63c7; color: white; border: none; padding: 15px 20px; cursor: pointer; width: 95%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <span class="material-symbols-outlined" style="top: 15%; left: 15%;">family_star</span>
    <span class="material-symbols-outlined" style="top: 20%; right: 15%;">child_hat</span>
    <span class="material-symbols-outlined" style="bottom: 25%; left: 10%;">child_care</span>
    <span class="material-symbols-outlined" style="bottom: 15%; right: 20%;">toys_and_games</span>
    <span class="material-symbols-outlined" style="top: 10%; left: 35%;">cruelty_free</span>
    <span class="material-symbols-outlined" style="bottom: 10%; left: 40%;">face_4</span>
    <span class="material-symbols-outlined" style="top: 40%; right: 10%;">featured_seasonal_and_gifts</span>

    <div class="box">
        <h2>새 비밀번호를 정해요!</h2>
        <input type="password" id="new-pw" class="input-box" placeholder="새 비밀번호">
        <input type="password" id="confirm-pw" class="input-box" placeholder="비밀번호 확인">
        
        <div id="pw-error" class="error-text"></div>
        
        <p style="font-size: 12px; color: #666; margin: 15px 0; text-align: left; padding-left: 5%;">
            💡 8글자 이상, 알파벳 대문자/소문자, 숫자, 기호 조합 필수!
        </p>
        <button onclick="updatePw()">비밀번호 바꾸기</button>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        let supabase;
        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
            
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');
            const authKey = sessionStorage.getItem("pw_change_auth");
            
            if (!authKey || authKey !== "ALLOW_PW_CHANGE_" + userId) {
                console.log("일반 사용자 수정 모드 진입 가능");
            }
        }
        init();
        
        window.updatePw = async () => {
            const newPw = document.getElementById('new-pw');
            const confirmPw = document.getElementById('confirm-pw');
            const errorDiv = document.getElementById('pw-error');
            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;
            
            if (newPw.value !== confirmPw.value || !regex.test(newPw.value)) {
                newPw.classList.add('error-border');
                confirmPw.classList.add('error-border');
                errorDiv.textContent = "비밀번호 규칙을 확인해주세요! (8자 이상, 대/소문자, 숫자, 기호 조합)";
                errorDiv.style.display = 'block';
                return;
            }

            const userId = new URLSearchParams(window.location.search).get('id');
            const { error } = await supabase
                .from('public.users')
                .update({ password: newPw.value })
                .eq('email', `${userId}@healthykids.com`);
                
            if (error) {
                errorDiv.textContent = "앗, 잠시만 기다려 주세요!: " + error.message;
                errorDiv.style.display = 'block';
            } else {
                sessionStorage.removeItem("pw_change_auth");
                document.querySelector('.box').innerHTML = "<h2>성공!</h2><p>비밀번호가 성공적으로 변경됐어요.</p><button onclick=\"location.href='login.html'\">로그인하러 가기</button>";
            }
        };
    </script>
</body>
</html>
