<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 | 새 비밀번호 만들기</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 80px; background-color: #afe1fc; }
        .box { background: white; padding: 40px; width: 350px; margin: auto; border: 2px solid #2f63c7; box-shadow: 5px 5px 0px #e0e0e0; }
        .input-box { width: 90%; padding: 10px; margin: 10px 0; border: 2px solid #ddd; }
        .error-border { border: 2px solid #ff4d4d !important; }
        .error-text { font-size: 13px; color: #ff4d4d; margin: 10px 0; display: none; text-align: left; padding-left: 5%; }
        button { background-color: #2f63c7; color: white; border: none; padding: 12px 20px; cursor: pointer; width: 95%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>새 비밀번호를 정해요!</h2>
        <input type="password" id="new-pw" class="input-box" placeholder="새 비밀번호">
        <input type="password" id="confirm-pw" class="input-box" placeholder="비밀번호 확인">
        <div id="pw-error" class="error-text"></div>
        <p style="font-size: 12px; color: #666; margin: 10px 0; text-align: left; padding-left: 5%;">
            💡 8글자나 더 길게, 알파벳 대문자, 소문자, 숫자, 기호 필수!
        </p>
        <button onclick="updatePw()">비밀번호 바꾸기</button>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        let supabase;
        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
            
            // 보안 검사: 찾기 프로세스 또는 로그인 상태 확인
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');
            const authKey = sessionStorage.getItem("pw_change_auth");
            
            // 로그인 상태 확인 로직 추가 가능 (로그인 페이지에서 세션 확인 등)
            if (!authKey || authKey !== "ALLOW_PW_CHANGE_" + userId) {
                // 여기서 로그인 상태(supabase.auth.getSession())를 한 번 더 확인하면 더 안전합니다.
                console.log("일반 사용자 수정 모드 진입 가능");
            }
        }
        init();
        
        window.updatePw = async () => {
            const newPw = document.getElementById('new-pw');
            const confirmPw = document.getElementById('confirm-pw');
            const errorDiv = document.getElementById('pw-error');
            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;
            
            if (newPw.value !== confirmPw.value || !regex.test(newPw.value)) {
                newPw.classList.add('error-border');
                confirmPw.classList.add('error-border');
                errorDiv.textContent = "비밀번호 규칙을 확인해주세요! (8자 이상, 영문 대/소문자, 숫자, 기호 조합)";
                errorDiv.style.display = 'block';
                return;
            }

            const userId = new URLSearchParams(window.location.search).get('id');
            const { error } = await supabase
                .from('public.users')
                .update({ password: newPw.value })
                .eq('email', `${userId}@healthykids.com`);
                
            if (error) {
                errorDiv.textContent = "앗, 잠시만 기다려 주세요!: " + error.message;
                errorDiv.style.display = 'block';
            } else {
                sessionStorage.removeItem("pw_change_auth");
                document.querySelector('.box').innerHTML = "<h2>성공!</h2><p>비밀번호가 성공적으로 변경됐어요.</p><button onclick=\"location.href='login.html'\">로그인하러 가기</button>";
            }
        };
    </script>
</body>
</html>
