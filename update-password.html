<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>헬시키즈 | 비밀번호 변경</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 80px; background-color: #afe1fc; position: relative; min-height: 100vh; margin: 0; }
        .material-symbols-outlined { position: absolute; font-size: 80px !important; color: #2f63c7; opacity: 0.6; z-index: 0; }
        .box { background: white; padding: 40px; width: 350px; margin: 50px auto; border: 2px solid #2f63c7; position: relative; z-index: 1; }
        .input-wrapper { position: relative; width: 90%; margin: 15px auto; }
        .input-field { width: 100%; padding: 12px; padding-right: 40px; box-sizing: border-box; border: 2px solid #ddd; outline: none; }
        .input-field:focus {border-color: #000;}
        .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; user-select: none; }
        .forgot-pw-link {
            text-decoration: none;
            color: #ddd;
            font-size: 13px;
            display: inline-block;
            transition: color 0.3s;
        }
        
        .forgot-pw-link:hover {
            color: #000;
        }
        .error-border { border: 2px solid #ff4d4d !important; }
        .error-text { font-size: 13px; color: #ff4d4d; margin: 15px 0; display: none; text-align: left; padding-left: 5%; font-weight: bold; }
        button { background-color: #2f63c7; color: white; border: none; padding: 15px 20px; cursor: pointer; width: 95%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="auth-check-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 10px; text-align: center; width: 300px;">
            <h3 style="color: #2f63c7;">앗! 로그인이 필요해요</h3>
            <p style="font-size: 14px; color: #666; margin-bottom: 20px;">비밀번호를 변경하려면 먼저 로그인을 해주세요.</p>
            <button onclick="location.href='login.html'" style="background-color: #2f63c7; color: white; border: none; padding: 10px; width: 100%;">로그인하러 가기</button>
        </div>
    </div>
    
    <span class="material-symbols-outlined" style="top: 15%; left: 15%;">family_star</span>
    <span class="material-symbols-outlined" style="top: 20%; right: 15%;">child_hat</span>
    <span class="material-symbols-outlined" style="bottom: 25%; left: 10%;">child_care</span>
    <span class="material-symbols-outlined" style="bottom: 15%; right: 20%;">toys_and_games</span>
    <span class="material-symbols-outlined" style="top: 10%; left: 35%;">cruelty_free</span>
    <span class="material-symbols-outlined" style="bottom: 20%; left: 40%;">face_4</span>
    <span class="material-symbols-outlined" style="top: 40%; right: 10%;">featured_seasonal_and_gifts</span>

    <div class="box">
        <h2>새 비밀번호를 정해요!</h2>

        <div id="current-pw-group" class="input-wrapper">
            <input type="password" id="current-pw" class="input-field" placeholder="현재 비밀번호 (또는 임시)">
            <span id="toggle-current-pw" class="toggle-password">🔒</span>
        </div>
        
        <div class="input-wrapper">
            <input type="password" id="new-pw" class="input-field" placeholder="새 비밀번호">
            <span id="toggle-new-pw" class="toggle-password">🔒</span>
        </div>
        
        <div class="input-wrapper">
            <input type="password" id="confirm-pw" class="input-field" placeholder="비밀번호 확인">
            <span id="toggle-confirm-pw" class="toggle-password">🔒</span>
        </div>
        
        <div id="pw-error" class="error-text"></div>
        
        <p style="font-size: 12px; color: #666; margin: 15px 0; text-align: left; padding-left: 5%;">
            💡 8글자 이상, 알파벳 대문자/소문자, 숫자, 기호 조합 필수!
        </p>
        <button onclick="updatePw()">비밀번호 바꾸기</button>
    </div>

    <div style="margin-top: 20px;">
        <a href="find-account.html" class="forgot-pw-link">비밀번호를 잊으셨나요?</a>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        let supabase;
        let isTempUser = false;
        
        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('userId');
            const tempPw = params.get('tempPw');
        
            if (userId && tempPw) {
                isTempUser = true;
                const decodedPw = atob(tempPw);

                const currentPwInput = document.getElementById('current-pw');
                if (currentPwInput) {
                    currentPwInput.value = decodedPw;
                }
                
                // 자동 로그인 시도
                const { error } = await supabase.auth.signInWithPassword({
                    email: `${userId}@healthykids.com`,
                    password: decodedPw
                });

                if (error) {
                    console.error("자동 로그인 실패:", error.message);
                }
            } else {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    document.getElementById('auth-check-modal').style.display = 'flex';
                    document.querySelector('.box').style.opacity = '0.3';
                    document.querySelector('.box').style.pointerEvents = 'none';
                }
            }
        }
        init();
        
        window.updatePw = async () => {
            const currentPwInput = document.getElementById('current-pw');
            const newPwInput = document.getElementById('new-pw');
            const confirmPwInput = document.getElementById('confirm-pw');
            const errorDiv = document.getElementById('pw-error');
            
            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;
            
            if (newPwInput.value !== confirmPwInput.value || !regex.test(newPwInput.value)) {
                errorDiv.textContent = "비밀번호 규칙을 확인해주세요! (8자 이상, 알파벳 대/소문자, 숫자, 기호 조합)";
                errorDiv.style.display = 'block';
                return;
            }
        
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                errorDiv.textContent = "사용자 정보를 찾을 수 없습니다.";
                errorDiv.style.display = 'block';
                return;
            }
        
            // [로직 분리] 1. 일반 사용자 검증
            if (!isTempUser) {
                const { error: authError } = await supabase.auth.signInWithPassword({
                    email: user.email,
                    password: currentPwInput.value
                });
                if (authError) {
                    errorDiv.textContent = "현재 비밀번호가 일치하지 않습니다.";
                    errorDiv.style.display = 'block';
                    return;
                }
            }
        
            // 2. 비밀번호 업데이트 (Auth 및 DB 상태 변경을 위해 RPC 사용)
            // RPC 함수: force_update_password(target_id, new_password, new_usage, new_is_temp)
            const { error: updateError } = await supabase.rpc('force_update_password', { 
                target_id: user.id, 
                new_password: newPwInput.value,
                new_usage: 0,           // 성공했으니 사용 횟수 초기화
                new_is_temp: false      // 이제 정식 비밀번호임
            });
                    
            if (updateError) {
                errorDiv.textContent = "변경 실패: " + updateError.message;
                errorDiv.style.display = 'block';
            } else {
                // [추가] 임시 사용자였다면 기록 하나 더 남기기 (필요시)
                if (isTempUser) {
                    await supabase.from('public.users')
                        .update({ temp_password_usage: 0 }) // 사용 횟수 리셋
                        .eq('id', user.id);
                }
        
                // 3. 성공 시 로그인 페이지로 이동
                document.querySelector('.box').innerHTML = `
                    <h2>성공!</h2>
                    <p>비밀번호가 성공적으로 변경됐어요.<br>새 비밀번호로 로그인해주세요!</p>
                    <button onclick="location.href='login.html'">로그인 페이지에서 아이디, 비밀번호를 써요!</button>
                `;
            }
        };
        
        function setupToggle(inputId, toggleId) {
            const input = document.getElementById(inputId);
            const toggle = document.getElementById(toggleId);
            if (!input || !toggle) return;
            toggle.addEventListener('click', () => {
                const type = input.type === 'password' ? 'text' : 'password';
                input.type = type;
                toggle.textContent = type === 'password' ? '🔒' : '🔓';
            });
        }
        setupToggle('current-pw', 'toggle-current-pw');
        setupToggle('new-pw', 'toggle-new-pw');
        setupToggle('confirm-pw', 'toggle-confirm-pw');
    </script>
</body>
</html>
