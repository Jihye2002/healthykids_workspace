<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 | 새 비밀번호(암호) 만들기</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 50px; background-color: #f0f7ff; }
        .box { background: white; border-radius: 20px; padding: 40px; width: 350px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        button { background-color: #2f63c7; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>새 암호를 정해요!</h2>
        <input type="password" id="new-pw" placeholder="새 암호 입력"><br>
        <input type="password" id="confirm-pw" placeholder="새 암호 다시 입력"><br>
        <button onclick="updatePw()">암호 바꾸기</button>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        let supabase = null;

        // 1. Supabase 초기화 (다른 페이지와 동일)
        async function init() {
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
            } catch (err) {
                console.error("초기화 실패:", err);
            }
        }
        init();

        // 2. 암호 변경 로직
        window.updatePw = async () => {
            const newPw = document.getElementById('new-pw').value;
            const confirmPw = document.getElementById('confirm-pw').value;

            if (newPw !== confirmPw) {
                alert("두 암호가 달라요! 다시 확인해볼까요?");
                return;
            }

            if (!newPw) {
                alert("암호를 입력해주세요!");
                return;
            }

            // Supabase 암호 업데이트 실행
            const { error } = await supabase.auth.updateUser({ password: newPw });

            if (error) {
                alert("암호 변경 중 문제가 생겼어요: " + error.message);
            } else {
                alert("성공! 이제 새로운 암호로 로그인할 수 있어요.");
                window.location.href = 'login.html';
            }
        };
    </script>
</body>
</html>
