<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 | 새 비밀번호 만들기</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 50px; background-color: #f0f7ff; }
        .box { background: white; border-radius: 20px; padding: 40px; width: 350px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-box { width: 90%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; transition: border 0.3s; }
        .error-border { border: 2px solid #ff4d4d !important; }
        .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 5%; }
        button { background-color: #2f63c7; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; width: 90%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>새 암호를 정해요!</h2>
        <input type="password" id="new-pw" class="input-box" placeholder="암호는 8글자 넘게 영어 대소문자, 숫자, 기호를 모두 섞어서 만들어주세요!)">
        <input type="password" id="confirm-pw" class="input-box" placeholder="위에 있는 암호를 다시 입력해 주세요">
        <div id="pw-error" class="error-text">암호가 다르거나 규칙에 맞지 않아요!</div>
        <p style="font-size: 12px; color: #666; margin: 10px 0; text-align: left; padding-left: 5%;">
            💡 암호는 8글자보다 길어야 하고, 알파벳 대문자/소문자, 숫자, 기호를 모두 사용해서 만들어주세요!
        </p>
        <button onclick="updatePw()">암호 바꾸기</button>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        let supabase = null;

        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        }
        init();

        window.updatePw = async () => {
            const newPw = document.getElementById('new-pw');
            const confirmPw = document.getElementById('confirm-pw');
            const errorDiv = document.getElementById('pw-error');
            const regex = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[^a-zA-Z0-9]).{8,}$/;

            // 유효성 검사
            if (newPw.value !== confirmPw.value || !regex.test(newPw.value)) {
                newPw.classList.add('error-border');
                confirmPw.classList.add('error-border');
                errorDiv.style.display = 'block';
                return;
            }

            const { error } = await supabase.auth.updateUser({ password: newPw.value });

            if (error) {
                alert("변경 중 문제가 생겼어요: " + error.message);
            } else {
                alert("성공! 이제 새로운 암호로 로그인할 수 있어요.");
                window.location.href = 'login.html';
            }
        };
    </script>
</body>
</html>
