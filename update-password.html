<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 | 새 비밀번호 만들기</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 50px; background-color: #f0f7ff; }
        .box { 
            background: white; 
            border-radius: 0px; /* 각진 디자인 */
            padding: 40px; 
            width: 350px; 
            margin: auto; 
            border: 2px solid #2f63c7; 
            box-shadow: 5px 5px 0px #e0e0e0;
        }
        .input-box { border-radius: 0px; } /* 각진 입력창 */
        .error-border { border: 2px solid #ff4d4d !important; }
        .error-text { font-size: 13px; color: #ff4d4d; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; padding-left: 5%; }
        button { background-color: #2f63c7; color: white; border: none; padding: 12px 20px; border-radius: 0px; cursor: pointer; width: 90%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>새 비밀번호를 정해요!</h2>
        <input type="password" id="new-pw" class="input-box" placeholder="비밀번호는 8글자 넘게 영어 대소문자, 숫자, 기호를 모두 섞어서 만들어주세요!)">
        <input type="password" id="confirm-pw" class="input-box" placeholder="위에 있는 비밀번를 다시 입력해 주세요">
        <div id="pw-error" class="error-text">비밀번호가 다르거나 규칙에 맞지 않아요!</div>
        <p style="font-size: 12px; color: #666; margin: 10px 0; text-align: left; padding-left: 5%;">
            💡 비밀번호는 8글자보다 길어야 하고, 알파벳 대문자/소문자, 숫자, 기호를 모두 사용해서 만들어주세요!
        </p>
        <button onclick="updatePw()">암호 바꾸기</button>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        let supabase = null;
        
        async function init() {
            const res = await fetch('/get-config');
            const config = await res.json();
            supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');
            const authKey = sessionStorage.getItem("pw_change_auth");
        
            if (!authKey || authKey !== "ALLOW_PW_CHANGE_" + userId) {
                alert("권한이 없어요! 비밀번호 찾기를 먼저 진행해주세요.");
                window.location.href = 'find-account.html';
            }
        }
        init();
        
        window.updatePw = async () => {
            const newPw = document.getElementById('new-pw');
            const confirmPw = document.getElementById('confirm-pw');
            const errorDiv = document.getElementById('pw-error');
            
            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;
        
            if (newPw.value !== confirmPw.value || !regex.test(newPw.value)) {
                newPw.classList.add('error-border');
                confirmPw.classList.add('error-border');
                errorDiv.textContent = "비밀번호가 다르거나 규칙에 맞지 않아요! (8글자 이상, 알파벳 대문자, 소문자와 숫자, 기호(!, #, & 등등)를 섞어주세요!)";
                errorDiv.style.display = 'block';
                return;
            }
        
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');
        
            // DB 직접 업데이트 (로그인 안 된 상태에서도 작동)
            const { error } = await supabase
                .from('public.users')
                .update({ password: newPw.value })
                .eq('email', `${userId}@healthykids.com`);
        
            if (error) {
                errorDiv.textContent = "앗, 바꾸다가 문제가 생겼어요: " + error.message;
                errorDiv.style.display = 'block';
            } else {
                // 성공 후 토큰 삭제 및 화면 교체
                sessionStorage.removeItem("pw_change_auth");
                document.querySelector('.box').innerHTML = `
                    <h2>성공!</h2>
                    <p>이제 새로운 비밀번호로 로그인할 수 있어요.</p>
                    <button onclick="location.href='login.html'">로그인하러 가기</button>
                `;
            }
        };
    </script>
</body>
</html>
