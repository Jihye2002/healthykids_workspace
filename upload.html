<!DOCTYPE html>
<html>
<body>

<h2>PDF 업로드</h2>

<input type="file" id="file">
<button onclick="upload()">업로드</button>

<script>
async function upload() {
  const file = document.getElementById("file").files[0];

  const formData = new FormData();
  formData.append("file", file);

  await fetch("/upload", {
    method: "POST",
    body: file
  });

  alert("업로드 완료");
}
</script>

</body>
</html>
