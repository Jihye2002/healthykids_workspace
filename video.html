<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈</title>
    <style>
        /* 기본 리셋 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background-color: #fff;}

        /* --- 헤더 --- */
        .header { display: flex; align-items: center; padding: 10px 20px; flex-wrap: nowrap; gap: 10px; }
        .logo { flex-shrink: 0; }
        .logo img { display: block; width: 100%; max-width: 180px; height: auto; }
        .container { display: flex; align-items: center; width: 100%; min-width: 0; gap: 20px;}
        .search-bar { display: flex; align-items: center; margin-left: 20px; flex: 1 1 auto; max-width: 1280px; gap: 8px; }
        .search-bar input { flex: 1 1 auto; padding: 10px; font-size: 15px; border: 1px solid #316ef4; min-width: 50px; border-radius: 5px; }
        .search-bar button { background-color: #fff; border: none; cursor: pointer; flex-shrink: 0; width: 30px; }
        .user-menu { margin-left: auto; display: flex; align-items: center; white-space: nowrap; flex-shrink: 0; font-size: 15px; font-weight: 600;}
        .user-menu a { white-space: nowrap; text-decoration: none; color: #6d6d6d; }
        .divider { margin: 0 8px; color: #6d6d6d; }

        /* --- 내비게이션 --- */
        /* --- 네비게이션바 전체 설정 --- */
        .navbar { 
            background-color: #2f63c7; 
            position: relative; 
        }

        .menu-list { 
            width: 100%;
            display: flex; 
            justify-content: center; /* 메뉴를 가로 중앙으로 정렬 */
            align-items: center;
            flex-wrap: nowrap;
            white-space: nowrap;
            list-style: none; 
            padding: 0;         /* 위아래 적절한 여백 */
            margin: 0;
            overflow-x: visible;
        }

        .menu-list > li { 
            flex: 1; 
            padding: 0 20px;
            text-align: center;
            position: relative;
            white-space: nowrap;
        }

        /* 상단 메인 메뉴 링크 스타일 */
        .menu-list > li { 
            display: block; 
            padding: 10px 15px; 
            color: white; 
            text-decoration: none; 
            font-weight: 600;
            transition: background 0.3s;
            white-space: nowrap;
        }

        /* 1. 메가 메뉴 전체 패널 */
        .mega-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%; 
            background-color: #ffffff;
            border-bottom: 3px solid #2f63c7;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        /* 호버 시 메가 메뉴 나타남 */
        .navbar:hover .mega-menu {
            display: block; 
        }

        /* 2. 컬럼 컨테이너 (정렬 담당) */
        .mega-content {
            display: flex;
            justify-content: stretch;
            width: 100%;
            padding: 20px 0;
        }

        /* 3. 각 컬럼 스타일 */
        .column {
            flex: 1;
            text-align: center;
            border-right: 1px solid #eee;
        }

        .column:last-child {
            border-right: none;
        }

        .column ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .column ul li a {
            color: #333;
            padding: 10px 0;
            display: block;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .column ul li a:hover {
            color: #2f63c7;
            font-weight: bold;
            background-color: #f8fbff;
        }   
        
        .page-container {
            width: 100%;
            max-width: 1920px;
        
            margin: 0 auto;   /* 핵심 */
            padding: 30px;
        
            display: flex;
            flex-direction: column;
            align-items: center; /* 내부 요소 중앙 */
        }
    
        #video-title,
        .video-wrapper,
        .quiz-section {
            width: 100%;
            max-width: 1920px;
            min-width: 400px;
        }
        
        #video-title {
            width: 100%;
            color: #2f63c7;
            padding-bottom: 30px;
        }
        
       .video-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            margin:0 auto;
        
            background: #000;
            overflow: hidden;
            display: block;
        }
        
        #main-video {
            width: 100%;
            height: 100%;
            display: block;
        }
                
        /* 🎯 카훗 영역 (처음 숨김) */
        .quiz-section {
            width: 100%;
        
            margin-top: 40px;
            padding: 30px;
        
            background: #f5f6fa;
        
            display: none;
        
            text-align: center;
        
            border-radius: 10px;
        }
        
        .quiz-section h3 {
            margin-bottom: 12px;
        }
        
        .quiz-section p {
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        /* 버튼 감싸는 a 태그 때문에 간격 안 먹는 문제 해결 */
        .quiz-section a {
            display: inline-block;
        }
        
        .btn {
            padding:15px 20px;
            background:#2f63c7;
            cursor:pointer;
            border:none;
            font-size:16px;
            color: white;
        }

        #quiz-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .btn:hover { background:#709ac4 }
</style>
</head>

<body>

<header class="header">
    <div class="logo">
        <a href="index.html">
            <img src="https://github.com/Jihye2002/healthykids_workspace/blob/main/logo.png?raw=true" alt="헬시키즈로고">
        </a>
    </div>
    <div class="container">
        <form class="search-bar" action="search.html" method="get">
            <input type="text" name="q" placeholder="검색어를 입력하세요">
            <button type="submit"><img src="https://github.com/Jihye2002/healthykids_workspace/blob/main/search.png?raw=true" alt="검색버튼" width="40" height="40"></button>
        </form>
        <div class="user-menu">
            <a href="login.html">로그인</a>
            <span class="divider">|</span>
            <a href="signup.html">회원가입</a>
        </div>
    </div>
</header>

<nav class="navbar">
    <ul class="menu-list">
        <li>회원정보</li>
        <li>영상보기</li>
        <li>놀이&활동자료 다운로드</li>
        <li>안전수칙자료 다운로드</li>
        <li>Q&A</li>
    </ul>

    <div class="mega-menu">
        <div class="mega-content">
            <div class="column">
                <ul>
                    <li><a href="edit-profile.html">개인정보 수정</a></li>
                    <li><a href="withdraw.html">회원탈퇴</a></li>
                </ul>
            </div>

            <div class="column">
                <ul>
                    <li><a href="#">진행중인 영상</a></li>
                    <li><a href="video.html?type=hygiene">위생안전</a></li>
                    <li><a href="video.html?type=crosswalk">실외안전</a></li>
                    <li><a href="video.html?type=foodsafety">생활건강</a></li>
                    <li><a href="video.html?type=precaution">질병예방</a></li>
                </ul>
            </div>

            <div class="column">
                <ul>
                    <li><a href="viewer.html?file=하루건강체크리스트.pdf">하루건강 체크리스트</a></li>
                    <li><a href="#">퀴즈</a></li>
                    <li><a href="#">활동지</a></li>
                </ul>
            </div>

            <div class="column">
                <ul>
                    <li><a href="viewer.html?file=위생안전수칙.pdf">위생안전자료</a></li>
                    <li><a href="viewer.html?file=실외안전수칙.pdf">실외안전자료</a></li>
                    <li><a href="viewer.html?file=생활건강수칙.pdf">생활건강자료</a></li>
                    <li><a href="viewer.html?file=질병예방수칙.pdf">질병예방자료</a></li>
                </ul>
            </div>

            <div class="column">
                <ul>
                    <li><a href="#">자주 묻는 질문</a></li>
                    <li><a href="#">1:1상담 문의</a></li>
                    <li><a href="#">영상오류 해결방법</a></li>
                </ul>
            </div>

        </div>
    </div>
</nav>

<div class="page-container">

    <h2 id="video-title">불러오는 중...</h2>

    <div class="video-wrapper">
        <video id="main-video" controls muted autoplay playsinline></video>
    </div>

    <div class="quiz-section" id="quiz-section">
        <h3 style="margin-bottom:15px;">🎬 영상이 끝났어요!</h3>
        <p>아래에서 퀴즈를 시작해보세요</p>
    
       <div id="quiz-buttons"></div>
    </div>

</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
    
        const contentDB = {
            hygiene: {
                title: '손씻기 • 마스크착용 • 기침예절',
                src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/%EC%9C%84%EC%83%9D%EC%95%88%EC%A0%84.mp4',
                kahoot: [
                    'https://kahoot.it/challenge/01812841',
                    'https://kahoot.it/challenge/03183156'
                ]
            },
            crosswalk: {
                title: '횡단보도 안전',
                src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/%EC%8B%A4%EC%99%B8%EC%95%88%EC%A0%84.mp4',
                kahoot: [
                    'https://kahoot.it/challenge/07121259'
                ]
            },
            
            foodsafety: {
                title: '올바른 식습관',
                src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/%EC%83%9D%ED%99%9C%EA%B1%B4%EA%B0%95.mp4',
                kahoot: [
                    'https://kahoot.it/challenge/04466674'
                ]
            },
            
            precaution: {
                title: '감기 • 독감 예방',
                src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/%EC%A7%88%EB%B3%91%EC%98%88%EB%B0%A9.mp4',
                kahoot: [
                    'https://kahoot.it/challenge/07815381'
                ]
            }

        }
    
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const data = contentDB[type];
    
        const video = document.getElementById('main-video');
        const title = document.getElementById('video-title');
        const quiz = document.getElementById('quiz-section');
        const quizButtons = document.getElementById('quiz-buttons');
    
        if (!data) {
            title.innerText = "데이터를 찾을 수 없습니다.";
            return;
        }
    
        title.innerText = data.title;
        quizButtons.innerHTML = "";

        data.kahoot.forEach((url, index) => {
        
            const a = document.createElement("a");
            a.href = url;
            a.target = "_blank";
        
            const button = document.createElement("button");
            button.className = "btn";
            button.innerText = `🚀 카훗 퀴즈 ${index + 1}`;
        
            a.appendChild(button);
        
            quizButtons.appendChild(a);
        });
    
        // 처음에는 완전히 숨김
        quiz.style.display = "none";
    
        // 영상 설정
        video.src = data.src;
        video.load();
    
        // 자동재생
        video.play().catch(() => {});
    
        // 영상 끝났을 때만 실행
        video.addEventListener('ended', () => {
    
            quiz.style.display = "block";
    
            // 등장 애니메이션
            quiz.style.opacity = "0";
            quiz.style.transform = "translateY(30px)";
    
            setTimeout(() => {
                quiz.style.transition = "all 0.6s ease";
                quiz.style.opacity = "1";
                quiz.style.transform = "translateY(0)";
            }, 50);
    
            // 퀴즈 위치로 스크롤
            quiz.scrollIntoView({
                behavior: "smooth"
            });
        });
    
    });
</script>
    <script src="chat-ui.js"></script>
</body>
</html>
