<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <link rel="stylesheet" href="chat.css">
    <title>헬시키즈</title>
    <style>
        /* 기본 리셋 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background-color: #fff; }

        /* --- 헤더 --- */
        .header { display: flex; align-items: center; padding: 10px 20px; flex-wrap: nowrap; gap: 10px; }
        .logo { flex-shrink: 0; }
        .logo img { display: block; width: 100%; max-width: 180px; height: auto; }
        .container { display: flex; align-items: center; width: 100%; min-width: 0; gap: 20px;}
        .search-bar { display: flex; align-items: center; margin-left: 20px; flex: 1 1 auto; max-width: 1280px; gap: 8px; }
        .search-bar input { flex: 1 1 auto; padding: 10px; font-size: 15px; border: 1px solid #316ef4; min-width: 50px; border-radius: 5px; }
        .search-bar button { background-color: #fff; border: none; cursor: pointer; flex-shrink: 0; width: 30px; }
        .user-menu { margin-left: auto; display: flex; align-items: center; white-space: nowrap; flex-shrink: 0; font-size: 15px; font-weight: 600;}
        .user-menu a { white-space: nowrap; text-decoration: none; color: #6d6d6d; }
        .divider { margin: 0 8px; color: #6d6d6d; }

        /* --- 내비게이션 --- */
        /* --- 네비게이션바 전체 설정 --- */
        .navbar { 
            background-color: #2f63c7; 
            position: relative; 
        }

        .menu-list { 
            width: 100%;
            display: flex; 
            justify-content: center; /* 메뉴를 가로 중앙으로 정렬 */
            align-items: center;
            flex-wrap: nowrap;
            white-space: nowrap;
            list-style: none; 
            padding: 0;         /* 위아래 적절한 여백 */
            margin: 0;
            overflow-x: visible;
        }

        .menu-list > li { 
            flex: 1; 
            padding: 0 20px;
            text-align: center;
            position: relative;
            white-space: nowrap;
        }

        /* 상단 메인 메뉴 링크 스타일 */
        .menu-list > li > a { 
            display: block; 
            padding: 10px 15px; 
            color: white; 
            text-decoration: none; 
            font-weight: 600;
            transition: background 0.3s;
            white-space: nowrap;
        }

        /* 마우스를 올렸을 때 상단 메뉴 배경 변경 */
        .menu-list > li:hover > a { 
            background-color: #1e4fa8;
        }

        /* 1. 메가 메뉴 전체 패널 */
        .mega-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%; 
            background-color: #ffffff;
            border-bottom: 3px solid #2f63c7;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        /* 호버 시 메가 메뉴 나타남 */
        .navbar:hover .mega-menu {
            display: block; 
        }

        /* 2. 컬럼 컨테이너 (정렬 담당) */
        .mega-content {
            display: flex;
            justify-content: stretch;
            width: 100%;
            padding: 20px 0;
        }

        /* 3. 각 컬럼 스타일 */
        .column {
            flex: 1;
            text-align: center;
            border-right: 1px solid #eee;
        }

        .column:last-child {
            border-right: none;
        }

        .column ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .column ul li a {
            color: #333;
            padding: 10px 0;
            display: block;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .column ul li a:hover {
            color: #2f63c7;
            font-weight: bold;
            background-color: #f8fbff;
        }        
        .page-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px;
        
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    
        #video-title,
        .video-wrapper,
        .quiz-section {
            width: 100%;
            max-width: 900px;
        }
        
        .video-wrapper {
            width: 100%;
            max-width: 900px;   /* 크게 제한 */
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin: 0 auto;
        }
        
        #main-video {
            width: 100%;
            height: 100%;
            display: block;
        }
                
        /* 🎯 카훗 영역 (처음 숨김) */
        .quiz-section {
            margin-top: 40px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 20px;
        
            display: none;
        
            text-align: center;
        }
        
        .quiz-section h3 {
            margin-bottom: 12px;
        }
        
        .quiz-section p {
            margin-bottom: 20px;
            line-height: 1.6;
            color: #555;
        }
        
        /* 버튼 감싸는 a 태그 때문에 간격 안 먹는 문제 해결 */
        .quiz-section a {
            display: inline-block;
        }
        
        .btn {
            padding:15px 20px;
            background:pastelblue;
            cursor:pointer;
            border-radius:10px;
            font-size:16px;
            color: white;
        }
        
        .btn:hover { background:#eef5ff; }
</style>
</head>

<body>

<header class="header">
    <div class="logo">
        <a href="index.html">
            <img src="https://github.com/Jihye2002/healthykids_workspace/blob/main/logo.png?raw=true" alt="헬시키즈로고">
        </a>
    </div>
    <div class="container">
        <form class="search-bar" action="search.html" method="get">
            <input type="text" name="q" placeholder="검색어를 입력하세요">
            <button type="submit"><img src="https://github.com/Jihye2002/healthykids_workspace/blob/main/search.png?raw=true" alt="검색버튼" width="40" height="40"></button>
        </form>
        <div class="user-menu">
            <a href="login.html">로그인</a>
            <span class="divider">|</span>
            <a href="signup.html">회원가입</a>
        </div>
    </div>
</header>

<nav class="navbar">
    <ul class="menu-list">
        <li><a href="#">회원정보</a></li>
        <li><a href="#">영상보기</a></li>
        <li><a href="#">놀이&활동자료 다운로드</a></li>
        <li><a href="#">안전수칙자료 다운로드</a></li>
        <li><a href="#">Q&A</a></li>
    </ul>

    <div class="mega-menu">
        <div class="mega-content">
            <div class="column">
                <ul>
                    <li><a href="#">개인정보 수정</a></li>
                    <li><a href="#">회원탈퇴</a></li>
                </ul>
            </div>

            <div class="column">
                <ul>
                    <li><a href="#">진행중인 영상</a></li>
                    <li><a href="video.html?type=hygiene">위생안전</a></li>
                    <li><a href="video.html?type=crosswalk">실외안전</a></li>
                    <li><a href="video.html?type=foodsafety">생활건강</a></li>
                    <li><a href="video.html?type=precaution">질병예방</a></li>
                </ul>
            </div>

            <div class="column">
                <ul>
                    <li><a href="#">하루건강 체크리스트</a></li>
                    <li><a href="#">퀴즈</a></li>
                    <li><a href="#">놀이학습자료</a></li>
                </ul>
            </div>

            <div class="column">
                <ul>
                    <li><a href="viewer.html?file=위생안전수칙.pdf">위생안전자료</a></li>
                    <li><a href="viewer.html?file=실외안전수칙.pdf">실외안전자료</a></li>
                    <li><a href="viewer.html?file=생활건강수칙.pdf">생활건강자료</a></li>
                    <li><a href="viewer.html?file=질병예방수칙.pdf">질병예방자료</a></li>
                </ul>
            </div>

            <div class="column">
                <ul>
                    <li><a href="#">자주 묻는 질문</a></li>
                    <li><a href="#">1:1상담 문의</a></li>
                    <li><a href="#">영상오류 해결방법</a></li>
                </ul>
            </div>

        </div>
    </div>
</nav>

<div class="page-container">

    <h2 id="video-title">불러오는 중...</h2>

    <div class="video-wrapper">
        <video id="main-video" controls muted autoplay playsinline></video>
    </div>

    <div class="quiz-section" id="quiz-section" style="display:none;">
        <h3 style="margin-bottom:15px;">🎬 영상이 끝났어요!</h3>
        <p>아래에서 퀴즈를 시작해보세요</p>
    
        <a id="kahoot-link" target="_blank">
            <button class="btn">🚀 카훗 퀴즈 시작하기</button>
        </a>
    </div>

</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {

        const contentDB = {
            hygiene: {
                title: '손씻기 • 마스크착용',
                src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/%EC%9C%84%EC%83%9D%EC%95%88%EC%A0%84.mp4',
                kahoot: 'https://kahoot.it/solo?quizId=e21b4892-c67f-4c95-bd1d-6a6e660d7a85'
            },
            crosswalk: {
                title: '횡단보도 안전',
                src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/%EC%83%9D%ED%99%9C%EA%B1%B4%EA%B0%95.mp4',
                kahoot: 'https://kahoot.it/solo?quizId=987654'
            },
            foodsafety: {
                title: '올바른 식습관',
                src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/food.mp4',
                kahoot: 'https://kahoot.it/solo?quizId=food123'
            },
            precaution: {
                title: '감기 • 독감 예방',
                src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/cold.mp4',
                kahoot: 'https://kahoot.it/solo?quizId=cold123'
            }
        };
    
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const data = contentDB[type];
    
        const video = document.getElementById('main-video');
        const title = document.getElementById('video-title');
        const quiz = document.getElementById('quiz-section');
        const link = document.getElementById('kahoot-link');
    
        if (!data) {
            title.innerText = "데이터를 찾을 수 없습니다.";
            return;
        }
    
        title.innerText = data.title;
    
        video.src = data.src;
        video.load();
        video.play().catch(() => {});
    
        link.href = data.kahoot;
    
        // 🔑 완료 키 (영상별 1회만 인정)
        const key = "watched_" + type;
    
        // 이미 봤으면 바로 퀴즈 표시
        if (localStorage.getItem(key) === "done") {
            showQuiz();
        }
    
        // 🎬 영상 끝났을 때
        let isReady = false;
        let isEnded = false;
        
        // 메타데이터 준비 확인
        video.addEventListener("loadedmetadata", () => {
            isReady = true;
            isEnded = false;
        });
        
        // 🎬 핵심: ended 검증 강화
        video.addEventListener("ended", () => {
        
            if (!isReady) return;
            if (isEnded) return;
        
            // 🔥 핵심 방어 코드
            if (video.currentTime < video.duration - 0.3) {
                return; // 아직 끝 아님 (오작동 방지)
            }
        
            isEnded = true;
        
            const key = "watched_" + type;
            localStorage.setItem(key, "done");
        
            showQuiz();
        });
    
        function showQuiz() { 
            
                if (!quiz) return; 
                
                    quiz.style.display = "block"; 
                    quiz.style.opacity = "0"; 
                    quiz.style.transform = "translateY(30px)"; 
                
                setTimeout(() => { 
                    quiz.style.transition = "all 0.6s ease"; 
                    quiz.style.opacity = "1"; 
                    quiz.style.transform = "translateY(0)"; 
                }, 50); 
                
                quiz.scrollIntoView({ behavior: "smooth" }); 
            } 
        });
</script>

</body>
</html>
