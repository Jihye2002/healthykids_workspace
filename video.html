<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>헬시키즈 - 학습하기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background-color: #fff; }

        /* 헤더 (메뉴 없이 로고와 검색창만) */
        .header { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #eee; gap: 20px; }
        .logo img { width: 150px; }
        .search-bar { display: flex; align-items: center; flex: 1; max-width: 600px; }
        .search-bar input { flex: 1; padding: 10px; border: 1px solid #316ef4; border-radius: 5px; }

        /* 콘텐츠 영역 */
        .page-container { max-width: 900px; margin: 40px auto; padding: 20px; }
        #video-title { margin-bottom: 20px; color: #2f63c7; }
        .video-wrapper { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 20px; overflow: hidden; }
        video { width: 100%; height: 100%; }

        /* 퀴즈 영역 */
        .quiz-section { margin-top: 40px; padding: 30px; background: #f8f9fa; border-radius: 20px; }
        .quiz-q { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; }
        .quiz-btns { display: grid; gap: 10px; }
        .btn { padding: 15px; border: 1px solid #2f63c7; background: white; cursor: pointer; border-radius: 10px; }
        .btn:hover { background: #eef5ff; }
        #feedback { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<header class="header">
    <div class="logo"><a href="index.html"><img src="logo.png" alt="로고"></a></div>
    <form class="search-bar" action="search.html" method="get">
        <input type="text" name="q" placeholder="검색어를 입력하세요">
        <button type="submit">검색</button>
    </form>
</header>

<div class="page-container">
    <h2 id="video-title">불러오는 중...</h2>
    <div class="video-wrapper">
        <video id="main-video" controls>
            <source id="video-source" src="" type="video/mp4">
        </video>
    </div>

    <div class="quiz-section">
        <div class="quiz-q" id="quiz-question">질문을 불러오는 중...</div>
        <div class="quiz-btns" id="quiz-options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    // 1. 영상 및 퀴즈 데이터 정의
    const contentDB = {
        'hygiene': { title: '손씻기 학습', src: 'https://github.com/.../hygiene.mp4', q: '손을 씻을 때 가장 올바른 방법은?', opts: ['물로만', '비누칠 30초', '그냥 털기'], ans: 1 },
        'crosswalk': { title: '횡단보도 건너기', src: 'https://github.com/.../crosswalk.mp4', q: '초록불에 건널 때 어떻게 해야 할까요?', opts: ['뛰어간다', '손을 들고 확인한다', '핸드폰을 본다'], ans: 1 },
        'foodsafety': { title: '영양소 듬뿍', src: 'https://github.com/.../food.mp4', q: '골고루 먹으면 어디에 좋을까요?', opts: ['키가 커져요', '잠만 와요', '배가 아파요'], ans: 0 },
        'precaution': { title: '감기 예방', src: 'https://github.com/.../cold.mp4', q: '감기 예방을 위한 올바른 행동은?', opts: ['손 자주 씻기', '창문 닫기', '아이스크림 먹기'], ans: 0 }
    };

    // 2. URL에서 정보 가져오기
    const params = new URLSearchParams(window.location.search);
    const type = params.get('type');
    const data = contentDB[type];

    // 3. 화면에 데이터 뿌리기
    if (data) {
        document.getElementById('video-title').innerText = data.title;
        document.getElementById('video-source').src = data.src;
        document.getElementById('main-video').load();
        document.getElementById('quiz-question').innerText = data.q;

        const optDiv = document.getElementById('quiz-options');
        data.opts.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt;
            btn.onclick = () => {
                document.getElementById('feedback').innerText = (idx === data.ans) ? "✅ 정답입니다!" : "❌ 다시 한번 생각해보세요!";
            };
            optDiv.appendChild(btn);
        });
    } else {
        document.getElementById('video-title').innerText = "영상을 찾을 수 없습니다.";
    }
</script>

</body>
</html>
