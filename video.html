    <style>
        /* 기본 리셋 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background-color: #fff;}

        /* --- 헤더 --- */
        .header { display: flex; align-items: center; padding: 10px 20px; flex-wrap: nowrap; gap: 10px; }
        .logo { flex-shrink: 0; }
        .logo img { display: block; width: 100%; max-width: 180px; height: auto; }
        .container { display: flex; align-items: center; width: 100%; min-width: 0; gap: 20px;}
        .search-bar { display: flex; align-items: center; margin-left: 20px; flex: 1 1 auto; max-width: 1280px; gap: 8px; }
        .search-bar input { flex: 1 1 auto; padding: 10px; font-size: 15px; border: 1px solid #316ef4; min-width: 50px; border-radius: 5px; }
        .search-bar button { background-color: #fff; border: none; cursor: pointer; flex-shrink: 0; width: 30px; }
        .user-menu { margin-left: auto; display: flex; align-items: center; white-space: nowrap; flex-shrink: 0; font-size: 15px; font-weight: 600;}
        .user-menu a { white-space: nowrap; text-decoration: none; color: #6d6d6d; }
        .divider { margin: 0 8px; color: #6d6d6d; }

        /* --- 내비게이션 --- */
        /* --- 네비게이션바 전체 설정 --- */
        .navbar { 
            background-color: #2f63c7; 
            position: relative; 
        }

        .menu-list { 
            width: 100%;
            display: flex; 
            justify-content: center; /* 메뉴를 가로 중앙으로 정렬 */
            align-items: center;
            flex-wrap: nowrap;
            white-space: nowrap;
            list-style: none; 
            padding: 0;         /* 위아래 적절한 여백 */
            margin: 0;
            overflow-x: visible;
        }

        .menu-list > li { 
            flex: 1; 
            padding: 0 20px;
            text-align: center;
            position: relative;
            white-space: nowrap;
        }

        /* 상단 메인 메뉴 링크 스타일 */
        .menu-list > li { 
            display: block; 
            padding: 10px 15px; 
            color: white; 
            text-decoration: none; 
            font-weight: 600;
            transition: background 0.3s;
            white-space: nowrap;
        }

        /* 1. 메가 메뉴 전체 패널 */
        .mega-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%; 
            background-color: #ffffff;
            border-bottom: 3px solid #2f63c7;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        /* 호버 시 메가 메뉴 나타남 */
        .navbar:hover .mega-menu {
            display: block; 
        }

        /* 2. 컬럼 컨테이너 (정렬 담당) */
        .mega-content {
            display: flex;
            justify-content: stretch;
            width: 100%;
            padding: 20px 0;
        }

        /* 3. 각 컬럼 스타일 */
        .column {
            flex: 1;
            text-align: center;
            border-right: 1px solid #eee;
        }

        .column:last-child {
            border-right: none;
        }

        .column ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .column ul li a {
            color: #333;
            padding: 10px 0;
            display: block;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .column ul li a:hover {
            color: #2f63c7;
            font-weight: bold;
            background-color: #f8fbff;
        }   
        
        .page-container {
            width: 100%;
            max-width: 1920px;
        
            margin: 0 auto;   /* 핵심 */
            padding: 30px;
        
            display: flex;
            flex-direction: column;
            align-items: center; /* 내부 요소 중앙 */
        }
    
        #video-title,
        .video-wrapper,
        .quiz-section {
            width: 100%;
            max-width: 1920px;
            min-width: 400px;
        }
        
        #video-title {
            width: 100%;
            color: #2f63c7;
            padding-bottom: 30px;
        }
        
       .video-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            margin:0 auto;
        
            background: #000;
            overflow: hidden;
            display: block;
        }
        
        #main-video {
            width: 100%;
            height: 100%;
            display: block;
        }
                
        /* 🎯 카훗 영역 (처음 숨김) */
        .quiz-section {
            width: 100%;
        
            margin-top: 40px;
            padding: 30px;
        
            background: #f5f6fa;
        
            display: none;
        
            text-align: center;
        
            border-radius: 10px;
        }
        
        .quiz-section h3 {
            margin-bottom: 12px;
        }
        
        .quiz-section p {
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        /* 버튼 감싸는 a 태그 때문에 간격 안 먹는 문제 해결 */
        .quiz-section a {
            display: inline-block;
        }
        
        .btn {
            padding:15px 20px;
            background:#2f63c7;
            cursor:pointer;
            border:none;
            font-size:16px;
            color: white;
        }

        #quiz-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .btn:hover { background:#709ac4 }
</style>
</head>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    async function init() {
        const res = await fetch('/get-config');
        const config = await res.json();
        const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);

        // 1. URL 파라미터부터 최우선으로 확보
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        
        const contentDB = {
            hygiene: { title: '토리와 함께 세균을 퇴치해봐요!', src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/%EC%9C%84%EC%83%9D%EC%95%88%EC%A0%84.mp4' },
            crosswalk: { title: '토리와 함께 길 건널 때 어떻게 하면 되는지 알아가요!', src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/%EC%8B%A4%EC%99%B8%EC%95%88%EC%A0%84.mp4' },
            foodsafety: { title: '토리와 올바르게 먹는 방법을 알아가요!', src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/%EC%83%9D%ED%99%9C%EA%B1%B4%EA%B0%95.mp4' },
            precaution: { title: '토리와 감기와 독감 바이러스를 물리쳐요!', src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/%EC%A7%88%EB%B3%91%EC%98%88%EB%B0%A9.mp4' }
        };

        const data = contentDB[type];
        if (!data) {
            console.error("잘못된 접근입니다. type 파라미터를 확인하세요.");
            return; // 여기서 멈추면 안 열립니다. type이 제대로 들어오는지 확인이 필요합니다.
        }

        // [모든 페이지 공통] 현재 활성 유저 정보 반환
        async function getValidatedUser(sb) {
            // 1. 구글/카카오 확인 (Supabase Auth 세션)
            const { data: { session } } = await sb.auth.getSession();
            if (session) return { email: session.user.email, type: 'auth' };
        
            // 2. 네이버 확인 (localStorage + users 테이블 대조)
            const naverUser = JSON.parse(localStorage.getItem('user'));
            if (naverUser && naverUser.provider === 'naver') {
                // 실제 DB에 이메일이 존재하는지 한번 더 확인 (실시간 검증)
                const { data: dbUser } = await sb.from('users').select('email').eq('email', naverUser.email).maybeSingle();
                
                if (dbUser) return { email: naverUser.email, type: 'naver' };
                else {
                    // DB에 없으면(탈퇴/삭제) 로컬 정보도 지워버림
                    localStorage.clear();
                    return null;
                }
            }
            return null; // 진짜 로그아웃 상태
        }

        // 영상 로드 (로그인과 무관하게 실행)
        const video = document.getElementById('main-video');
        video.src = data.src;
        video.play().catch(() => {});

        video.addEventListener('ended', async () => {
            // [실시간 검증] localStorage 변수 대신, 함수를 호출하여 현재 진짜 로그인 상태인지 확인
            const user = await getValidatedUser(supabase);
            
            // user 객체가 있으면 로그인 상태, null이면 로그아웃 상태
            if (user) {
                await supabase.from('video_progress').upsert({
                    user_email: user.email, // 검증된 유효 이메일 사용
                    video_id: type,
                    progress_time: 100,
                    is_completed: true,
                    updated_at: new Date().toISOString()
                });
                console.log("기록 저장 완료");
            } else {
                console.log("로그아웃 상태: 기록하지 않음");
            }
            
            document.getElementById('quiz-section').style.display = "block";
        });
    init();
</script>
