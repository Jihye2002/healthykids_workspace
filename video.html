<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
<title>헬시키즈</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial; background:#fff; }

.header { display:flex; align-items:center; padding:10px 20px; gap:10px; }

.page-container { max-width:900px; margin:40px auto; padding:20px; }

#video-title { margin-bottom:20px; color:#2f63c7; }

.video-wrapper {
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:20px;
    overflow:hidden;
}

video { width:100%; height:100%; }

/* 🎯 카훗 영역 (처음 숨김) */
.quiz-section {
    margin-top:40px;
    padding:30px;
    background:#f8f9fa;
    border-radius:20px;
    display:none;
    text-align:center;
}

.btn {
    padding:15px 20px;
    border:1px solid #2f63c7;
    background:white;
    cursor:pointer;
    border-radius:10px;
    font-size:16px;
}

.btn:hover { background:#eef5ff; }
</style>
</head>

<body>

<header class="header">
    <h2>헬시키즈</h2>
</header>

<div class="page-container">

    <h2 id="video-title">불러오는 중...</h2>

    <div class="video-wrapper">
        <video id="main-video" controls muted autoplay playsinline></video>
    </div>

    <!-- 🎯 카훗 영역 -->
    <div class="quiz-section" id="quiz-section">
        <h3 style="margin-bottom:15px;">🎯 영상이 끝났어요!</h3>

        <a id="kahoot-link" target="_blank">
            <button class="btn">🚀 카훗 퀴즈 시작하기</button>
        </a>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
    
        const contentDB = {
            hygiene: {
                title: '손씻기 • 마스크착용',
                src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/%EC%9C%84%EC%83%9D%EC%95%88%EC%A0%84.mp4',
                kahoot: 'https://kahoot.it/solo?quizId=e21b4892-c67f-4c95-bd1d-6a6e660d7a85'
            },
        
            crosswalk: {
                title: '횡단보도 안전',
                src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/AI%20%EC%BA%90%EB%A6%AD%ED%84%B0%20%EC%8B%9C%EC%97%B0%EC%98%81%EC%83%81_%ED%9A%A1%EB%8B%A8%EB%B3%B4%EB%8F%84.mp4',
                kahoot: 'https://kahoot.it/solo?quizId=987654'
            },
        
            foodsafety: {
                title: '올바른 식습관',
                src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/food.mp4',
                kahoot: 'https://kahoot.it/solo?quizId=food123'
            },
        
            precaution: {
                title: '감기 • 독감 예방',
                src: 'https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/cold.mp4',
                kahoot: 'https://kahoot.it/solo?quizId=cold123'
            }
        }
    };
    
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
    
        const data = contentDB[type];
    
        const video = document.getElementById('main-video');
        const title = document.getElementById('video-title');
        const quiz = document.getElementById('quiz-section');
        const link = document.getElementById('kahoot-link');
    
        // ❗ 에러 방지 핵심
        if (!data) {
            title.innerText = "데이터를 찾을 수 없습니다.";
            return;
        }
    
        // 제목
        title.innerText = data.title;
    
        // 영상
        if (video && data.src) {
            video.src = data.src;
            video.load();
    
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    console.log("자동재생 차단됨 (정상)");
                });
            }
        }
    
        // 카훗 링크
        if (link && data.kahoot) {
            link.href = data.kahoot;
        }
    
        // 영상 끝나면 카훗 표시
        if (video) {
            video.addEventListener("ended", () => {
                if (quiz) {
                    quiz.style.display = "block";
                    quiz.scrollIntoView({ behavior: "smooth" });
                }
            });
        }
    
    });
</script>

</body>
</html>
