<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미리보기</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; text-align: center; }
        iframe { width: 90%; height: 80vh; border: 1px solid #ccc; margin-bottom: 20px; }

    </style>
</head>
<body>
    <iframe id="pdf-frame" src=""></iframe>
    

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file'); // 예: ?file=hygiene.pdf
        
        if (fileName) {
            document.getElementById('pdf-frame').src = fileName;
            document.getElementById('download-btn').href = fileName;
            document.getElementById('file-title').innerText = fileName + " 미리보기";
        }
    </script>
</body>
</html>
