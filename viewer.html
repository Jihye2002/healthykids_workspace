<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfobject/2.2.12/pdfobject.min.js"></script>
    
    <title>헬시키즈</title>
    <style>
        /* 모든 페이지 공통 스타일 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; } /* 전체 높이 고정 */
        body { font-family: 'Arial', sans-serif; background-color: #fff; display: flex; flex-direction: column; }

        /* 헤더 및 내비게이션바 (고정) */
        .header { display: flex; align-items: center; padding: 10px 20px; flex-wrap: nowrap; gap: 10px; flex-shrink: 0; }
        .logo { flex-shrink: 0; }
        .logo img { display: block; width: 100%; max-width: 180px; height: auto; }
        .container { display: flex; align-items: center; width: 100%; min-width: 0; gap: 20px; }
        .search-bar { display: flex; align-items: center; margin-left: 20px; flex: 1 1 auto; max-width: 1280px; gap: 8px; }
        .search-bar input { flex: 1 1 auto; padding: 10px; font-size: 15px; border: 1px solid #316ef4; min-width: 50px; border-radius: 5px; }
        .search-bar button { background-color: #fff; border: none; cursor: pointer; flex-shrink: 0; width: 30px; }
        .user-menu { margin-left: auto; display: flex; align-items: center; white-space: nowrap; flex-shrink: 0; font-size: 15px; font-weight: 600; }
        .user-menu a { white-space: nowrap; text-decoration: none; color: #6d6d6d; }
        .divider { margin: 0 8px; color: #6d6d6d; }

        .navbar { background-color: #2f63c7; position: relative; flex-shrink: 0; }
        .menu-list { width: 100%; display: flex; justify-content: center; align-items: center; list-style: none; padding: 0; margin: 0; }
        .menu-list > li { flex: 1; padding: 0 20px; text-align: center; position: relative; }
        .menu-list > li > a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-weight: 600; transition: background 0.3s; }
        .menu-list > li:hover > a { background-color: #1e4fa8; }

        /* 메가메뉴 */
        .mega-menu { display: none; position: absolute; top: 100%; left: 0; width: 100%; background-color: #ffffff; border-bottom: 3px solid #2f63c7; box-shadow: 0 5px 10px rgba(0,0,0,0.1); z-index: 1000; }
        .navbar:hover .mega-menu { display: block; }
        .mega-content { display: flex; justify-content: stretch; width: 100%; padding: 20px 0; }
        .column { flex: 1; text-align: center; border-right: 1px solid #eee; }
        .column ul { list-style: none; padding: 0; margin: 0; }
        .column ul li a { color: #333; padding: 10px 0; display: block; text-decoration: none; font-size: 14px; }
        .column ul li a:hover { color: #2f63c7; font-weight: bold; background-color: #f8fbff; }

        /* 뷰어 영역을 전체 화면으로 */
        #pdf-viewer { width: 100%; height: 100%; padding-top: 40px; padding-bottom: 40px; padding-left: 60px; padding-right: 60px;}
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo"><a href="index.html"><img src="https://github.com/Jihye2002/healthykids_workspace/blob/main/logo.png?raw=true" alt="헬시키즈로고"></a></div>
        <div class="container">
            <form class="search-bar" action="search.html" method="get">
                <input type="text" name="q" placeholder="검색어를 입력하세요">
                <button type="submit"><img src="https://github.com/Jihye2002/healthykids_workspace/blob/main/search.png?raw=true" alt="검색" width="40"></button>
            </form>
            <div class="user-menu"><a href="login.html">로그인</a> <span class="divider">|</span> <a href="signup.html">회원가입</a></div>
        </div>
    </header>

    <nav class="navbar">
        <ul class="menu-list">
            <li><a href="#">회원정보</a></li>
            <li><a href="#">영상보기</a></li>
            <li><a href="#">놀이&활동자료 다운로드</a></li>
            <li><a href="#">안전수칙자료 다운로드</a></li>
            <li><a href="#">Q&A</a></li>
        </ul>
        <div class="mega-menu">
            <div class="mega-content">
                <div class="column"><ul><li><a href="#">개인정보 수정</a></li><li><a href="#">회원탈퇴</a></li></ul></div>
                <div class="column"><ul><li><a href="#">진행중인 영상</a></li><li><a href="video.html?type=hygiene">위생안전</a></li><li><a href="video.html?type=crosswalk">실외안전</a></li><li><a href="video.html?type=foodsafety">생활건강</a></li><li><a href="video.html?type=precaution">질병예방</a></li></ul></div>
                <div class="column">
                    <ul>
                        <li>
                            <a href="viewer.html?file=하루건강체크리스트.pdf">하루건강 체크리스트</a>
                        </li>
                
                        <li><a href="#">퀴즈</a></li>
                        <li><a href="#">놀이학습자료</a></li>
                    </ul>
                </div>
                <div class="column"><ul><li><a href="viewer.html?file=위생안전수칙.pdf">위생안전자료</a></li><li><a href="viewer.html?file=실외안전수칙.pdf">실외안전자료</a></li><li><a href="viewer.html?file=생활건강수칙.pdf">생활건강자료</a></li><li><a href="viewer.html?file=질병예방수칙.pdf">질병예방자료</a></li></ul></div>
                <div class="column"><ul><li><a href="#">자주 묻는 질문</a></li><li><a href="#">1:1상담 문의</a></li><li><a href="#">영상오류 해결방법</a></li></ul></div>
            </div>
        </div>
    </nav>

    <div id="pdf-viewer"></div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const fileName = urlParams.get('file');
            
            // 중요: 깃허브 저장소 안의 상대 경로를 사용합니다.
            // 같은 폴더에 있다면 파일 이름만 쓰면 됩니다.
            const fileMap = {
                "위생안전수칙.pdf": "위생안전수칙.pdf",
                "실외안전수칙.pdf": "실외안전수칙.pdf",
                "생활건강수칙.pdf": "생활건강수칙.pdf",
                "질병예방수칙.pdf": "질병예방수칙.pdf",
            
                "하루건강체크리스트.pdf": "하루건강_체크리스트.pdf"
            };
    
            if (fileName && fileMap[fileName]) {
                const viewer = document.getElementById('pdf-viewer');
                
                // #toolbar=1을 붙여 브라우저 내장 뷰어를 강제로 호출합니다.
                // 이 방식은 브라우저 기본 UI를 사용하므로 가장 깔끔하고 인쇄/다운로드가 완벽합니다.
                const pdfFile = fileMap[fileName] + "#toolbar=1&navpanes=1";
                
                viewer.innerHTML = `<iframe src="${pdfFile}" width="100%" height="100%" style="border:none;"></iframe>`;
            } else {
                document.getElementById('pdf-viewer').innerText = "파일을 찾을 수 없습니다.";
            }
        };
    </script>
        <script src="chat-api.js"></script>
        <script src="chat-ui.js"></script>
    </body>
</html>
