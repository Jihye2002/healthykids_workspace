<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://github.com/Jihye2002/healthykids_workspace/raw/refs/heads/main/favicon.ico">
    <title>헬시키즈 - 자료 보기</title>
    <style>
        /* 1. 기본 스타일 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background-color: #fff; }

        /* 2. 헤더 및 네비게이션 스타일 (기존 index.html 디자인 유지) */
        .header { display: flex; align-items: center; padding: 10px 20px; }
        .logo img { width: 150px; }
        .navbar { background-color: #2f63c7; padding: 10px 0; text-align: center; position: relative; }
        .menu-list { display: flex; justify-content: center; list-style: none; }
        .menu-list li a { color: white; padding: 10px 20px; text-decoration: none; font-weight: 600; }

        /* 3. PDF 뷰어 영역 (화면 가득 채우기) */
        .viewer-container { width: 100%; padding: 20px; display: flex; justify-content: center; background-color: #f9f9f9; }
        #pdf-frame { width: 100%; max-width: 1200px; height: 85vh; border: 2px solid #2f63c7; border-radius: 10px; background-color: #fff; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <a href="index.html"><img src="https://github.com/Jihye2002/healthykids_workspace/blob/main/logo.png?raw=true" alt="헬시키즈로고"></a>
        </div>
    </header>

    <nav class="navbar">
        <ul class="menu-list">
            <li><a href="index.html">홈으로</a></li>
            <li><a href="viewer.html?type=hygiene">위생안전</a></li>
            <li><a href="viewer.html?type=safety">실외안전</a></li>
            <li><a href="viewer.html?type=health">생활건강</a></li>
            <li><a href="viewer.html?type=disease">질병예방</a></li>
        </ul>
    </nav>

    <div class="viewer-container">
        <iframe id="pdf-frame" src=""></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        
        // PDF 파일 경로 설정
        const files = {
            'hygiene': 'https://github.com/Jihye2002/healthykids_workspace/blob/main/%EC%9C%84%EC%83%9D%EC%95%88%EC%A0%84%EC%88%98%EC%B9%99.pdf',
            'safety': 'https://github.com/Jihye2002/healthykids_workspace/blob/main/%EC%8B%A4%EC%99%B8%EC%95%88%EC%A0%84%EC%88%98%EC%B9%99.pdf',
            'health': 'https://github.com/Jihye2002/healthykids_workspace/blob/main/%EC%83%9D%ED%99%9C%EA%B1%B4%EA%B0%95%EC%88%98%EC%B9%99.pdf',
            'disease': 'https://github.com/Jihye2002/healthykids_workspace/blob/main/%EC%A7%88%EB%B3%91%EC%98%88%EB%B0%A9%EC%88%98%EC%B9%99.pdf'
        };

        if (type && files[type]) {
            document.getElementById('pdf-frame').src = files[type];
        }
    </script>
</body>
</html>
