<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>헬시키즈 | 정보 삭제</title>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; text-align: center; padding: 50px; background-color: #afe1fc; }
        .box { background: white; padding: 40px; width: 420px; margin: 50px auto; border: 2px solid #2f63c7; }
        h2 { color: #2f63c7; }
        p { color: #666; font-size: 16px; }
        
        .info-card { 
            background: #b9e0fd; 
            padding: 20px; 
            margin: 20px 0; 
            text-align: left; 
            color: #444; 
            line-height: 1.8; 
            font-size: 0.95em;
        }
        
        .info-card p { margin: 0; padding: 0; }
        
        /* 비밀번호 전용 스타일 (동그라미 표현) */
        .password-mask { font-family: monospace; letter-spacing: 2px; color: #333; font-weight: bold; }
        
        .btn-withdraw { background-color: #2f63c7; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-cancel { background: none; border: none; color: #777; cursor: pointer; margin-top: 15px; }
        
        #status-msg { display: none; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); padding: 20px 30px; font-weight: bold; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #155724; }
        .fail { background-color: #f8d7da; color: #721c24; border: 1px solid #721c24; }
    </style>
</head>
<body>
    
    <div id="status-msg"></div>

    <div id="withdraw-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; text-align: center; box-shadow:0 5px 15px rgba(0,0,0,0.3); max-width: 300px;">
            <p style="font-size: 16px; color: #666; margin: 0 0 25px 0; text-align:left;">
                정말 떠나실 건가요? 😢 <br>떠나면 그동안의 정보들은 모두 없어져요.. <br>한 번 더 생각해봐요!
            </p>
            <div style="display: flex; justify-content: center; gap: 20px;">
                <button onclick="confirmWithdraw()" style="padding:10px 20px; background:#2f63c7; color:white; border:none; cursor:pointer;">네, 없애주세요</button>
                <button onclick="closeWithdrawModal()" style="padding:10px 20px; background:#ccc; color:white; border:none; cursor:pointer;">아니요!</button>
            </div>
        </div>
    </div>

    <div class="box">
        <h2>정말 떠나실 건가요? 😢</h2>
        <p>⚠️ 사용자님의 소중한 정보가 모두 사라져요.<br>탈퇴 후에는 지금까지의 모든 정보를 되돌릴 수 없어요.</p>
        
        <div class="info-card" id="user-info">
            정보를 불러오는 중이에요...
        </div>

        <button class="btn-withdraw" onclick="withdrawAccount()">네, 탈퇴할게요</button>
        <br>
        <button class="btn-cancel" onclick="history.back()">아니요, 더 머물래요!</button>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
        // 1. Supabase 객체를 담을 변수를 null로 선언
        let supabase = null;
    
        // 2. 초기화 함수 정의
        async function initSupabase() {
            try {
                const res = await fetch('/get-config');
                if (!res.ok) throw new Error("설정 정보를 가져올 수 없습니다.");
                const config = await res.json();
                
                // 여기서 클라이언트를 생성하고 변수에 할당
                supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                console.log("Supabase 초기화 완료");
                
                // 초기화가 완료된 후 사용자 정보 로드 실행
                loadUserInfo(); 
            } catch (err) {
                console.error("Supabase 초기화 실패:", err);
            }
        }
    
        // 3. 페이지가 로드되자마자 초기화 실행
        initSupabase();
    
        // 4. 정보 로드 (supabase가 확실히 생성된 후 호출됨)
        async function loadUserInfo() {
            if (!supabase) return;
        
            // 1. 인증 상태가 완전히 준비될 때까지 기다림 (중요!)
            const { data: { session } } = await supabase.auth.getSession();
            
            // 2. 세션이 없는 경우, 아주 짧은 지연 후 다시 확인 (혹은 로컬 데이터 사용)
            const activeUser = session?.user || JSON.parse(localStorage.getItem('user'));
            
            if (!activeUser) {
                console.log("로그인 정보 없음, 로그인 페이지로 이동합니다.");
                window.location.href = 'index.html';
                return;
            }

            currentUser = activeUser;
            
            const targetEmail = activeUser.email;
            const isSocial = session?.user ? (session.user.app_metadata.providers?.length > 0) : false;

            const socialGuide = (isSocial || !session?.user) 
                ? `<div style="margin-bottom: 15px;">
                    <div style="color: #d9534f; font-weight: bold; margin-bottom: 5px;">📢 알려드려요!</div>
                    <div style="color: #1a5f96; line-height: 1.5;">
                        계정 정보가 모두 사라져요!<br>
                        탈퇴 후 같은 계정으로 다시 오시면 처음부터 다시 시작할 수 있어요.
                    </div>
                   </div>`
                : `<p style="color: #555; margin-bottom: 15px;">일반 계정으로 로그인 중입니다.</p>`;

            // 데이터 조회
            const { data: publicData } = await supabase.from('public.users')
                .select('name, email, nickname, security_question, security_answer')
                .eq('email', targetEmail)
                .maybeSingle();

            const { data: naverData } = await supabase.from('users')
                .select('name, email, nickname')
                .eq('email', targetEmail)
                .maybeSingle();

            const data = publicData || naverData;

            if (data) {
                const userId = data.email ? data.email.split('@')[0] : '없음';
                const passwordDisplay = !session?.user ? '없음 (소셜/커스텀 로그인)' : '<span class="password-mask">●●●●●●●●</span>';

                document.getElementById('user-info').innerHTML = `
                    ${socialGuide}
                    <strong>이름:</strong> ${data.name || '없음'}<br>
                    <strong>아이디:</strong> ${userId}<br>
                    <strong>이메일:</strong> ${data.email || '없음'}<br>
                    <strong>별명:</strong> ${data.nickname || '없음'}<br>
                    <strong>비밀번호:</strong> ${passwordDisplay}<br>
                    <strong>비밀번호 질문:</strong> ${data.security_question || '없음'}<br>
                    <strong>비밀번호 답변:</strong> ${data.security_answer || '없음'}
                `;
            } else {
                console.log("기록이 없는 계정입니다. 로그아웃합니다.");
                await supabase.auth.signOut();
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }
    
        // 5. 알림 메시지 함수
        window.showMessage = function(msg, isSuccess) {
            const box = document.getElementById('status-msg');
            box.textContent = msg;
            box.className = isSuccess ? 'success' : 'fail';
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 2000);
        }
        
        // 6. 탈퇴 모달 제어
        window.withdrawAccount = () => {
            document.getElementById('withdraw-modal').style.display = 'flex';
        };
        
        window.closeWithdrawModal = () => {
            document.getElementById('withdraw-modal').style.display = 'none';
        };
        
        window.confirmWithdraw = async () => {
            if (!supabase) return;
            closeWithdrawModal();
            
            // 1. 전역 변수(currentUser)를 사용하여 로그인 여부 판단
            if (!currentUser || !currentUser.email) {
                console.log("currentUser 정보 없음:", currentUser);
                showMessage("다시 로그인해주세요ㅠㅠ", false);
                return;
            }
        
            try {
                console.log("탈퇴 진행할 계정 이메일:", currentUser.email);
        
                // 2. RPC 호출 (인증 객체 대신 저장된 이메일을 직접 전달)
                const { error } = await supabase.rpc('delete_my_account', { p_email: currentUser.email });
                if (error) throw error;
        
                // 3. 로그아웃 및 저장소 초기화
                await supabase.auth.signOut();
                localStorage.clear();
                sessionStorage.clear();
        
                showMessage("안녕! 그동안 함께해서 즐거웠어요. 다음에 다시 만나요 😊", true);
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                
            } catch (err) {
                console.error("탈퇴 에러:", err);
                showMessage("앗, 잠시 문제가 생겼어요! 다시 시도해봐요", false);
            }
        };
    </script>
</body>
</html>
