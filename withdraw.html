<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>헬시키즈 | 정보 삭제</title>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; text-align: center; padding: 50px; background-color: #afe1fc; }
        .box { background: white; padding: 40px; width: 420px; margin: 50px auto; border: 2px solid #2f63c7; }
        h2 { color: #2f63c7; }
        p { color: #666; font-size: 16px; }
        
        .info-card { 
            background: #b9e0fd; 
            padding: 20px; 
            margin: 20px 0; 
            text-align: left; 
            color: #444; 
            line-height: 1.8; 
            font-size: 0.95em;
        }
        
        .info-card p { margin: 0; padding: 0; }
        
        /* 비밀번호 전용 스타일 (동그라미 표현) */
        .password-mask { font-family: monospace; letter-spacing: 2px; color: #333; font-weight: bold; }
        
        .btn-withdraw { background-color: #2f63c7; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-cancel { background: none; border: none; color: #777; cursor: pointer; margin-top: 15px; }
        
        #status-msg { display: none; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); padding: 20px 30px; font-weight: bold; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #155724; }
        .fail { background-color: #f8d7da; color: #721c24; border: 1px solid #721c24; }
    </style>
</head>
<body>

    <div id="status-msg"></div>

    <div class="box">
        <h2>정말 떠나실 건가요? 😢</h2>
        <p>⚠️ 사용자님의 소중한 정보가 모두 사라져요.<br>탈퇴 후에는 지금까지의 모든 정보를 되돌릴 수 없어요.</p>
        
        <div class="info-card" id="user-info">
            정보를 불러오는 중이에요...
        </div>

        <button class="btn-withdraw" onclick="withdrawAccount()">네, 탈퇴할게요</button>
        <br>
        <button class="btn-cancel" onclick="history.back()">아니요, 더 머물래요!</button>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
        const res = await fetch('/get-config');
        const config = await res.json();
        const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
    
        async function loadUserInfo() {
            // 1. Supabase 인증 유저 정보 가져오기
            const { data: { user: authUser } } = await supabase.auth.getUser();
            // 2. 로컬 스토리지 정보 가져오기 (네이버 등 커스텀 로그인용)
            const localUser = JSON.parse(localStorage.getItem('user'));
            
            const activeUser = authUser || localUser;
            if (!activeUser) return;
    
            // 커스텀 유저인지 확인 (auth에 없거나 provider가 없는 경우)
            const isSocial = authUser ? (authUser.app_metadata.providers?.length > 0) : false;
            
            const socialGuide = (isSocial || !authUser) 
                ? `<div style="margin-bottom: 15px;">
                    <div style="color: #d9534f; font-weight: bold; margin-bottom: 5px;">📢 알려드려요!</div>
                    <div style="color: #1a5f96; line-height: 1.5;">
                        계정 정보가 모두 사라져요!<br>
                        탈퇴 후 같은 계정으로 다시 오시면 처음부터 다시 시작할 수 있어요.
                    </div>
                   </div>`
                : `<p style="color: #555; margin-bottom: 15px;">일반 계정으로 로그인 중입니다.</p>`;
    
            // 이메일 기준으로 데이터 조회 (테이블이 나뉘어 있으므로 로직상 유연하게 대처)
            const targetEmail = activeUser.email;
            
            // 1. 자체 로그인용 테이블 조회
            const { data: publicData } = await supabase.from('public.users')
                .select('id, email, name, nickname, security_question, security_answer, is_temp_password, temp_password, temp_password_usage')
                .eq('email', targetEmail)
                .single();
    
            // 2. 네이버 로그인용 테이블 조회 (없을 경우를 대비)
            const { data: naverData } = await supabase.from('users')
                .select('name, email, nickname, profile_image, gender, birthday, age')
                .eq('email', targetEmail)
                .single();
    
            const data = publicData || naverData;
    
            if (data) {
                const userId = data.email ? data.email.split('@')[0] : '없음';
                const passwordDisplay = !authUser ? '없음 (소셜/커스텀 로그인)' : '<span class="password-mask">●●●●●●●●</span>';
    
                document.getElementById('user-info').innerHTML = `
                    ${socialGuide}
                    <strong>이름:</strong> ${data.name || '없음'}<br>
                    <strong>아이디:</strong> ${userId}<br>
                    <strong>이메일:</strong> ${data.email || '없음'}<br>
                    <strong>별명:</strong> ${data.nickname || '없음'}<br>
                    <strong>비밀번호:</strong> ${passwordDisplay}<br>
                    <strong>비밀번호 질문:</strong> ${data.security_question || '없음'}<br>
                    <strong>비밀번호 답변:</strong> ${data.security_answer || '없음'}
                `;
            }
        }
        loadUserInfo();
    
        function showMessage(msg, isSuccess) {
            const box = document.getElementById('status-msg');
            box.textContent = msg;
            box.className = isSuccess ? 'success' : 'fail';
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 2000);
        }
        
        window.withdrawAccount = async () => {
            if (!confirm("정말 탈퇴하실 건가요? 계정 정보가 모두 사라집니다!")) return;
        
            try {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) throw new Error("로그인 정보를 확인할 수 없습니다.");
        
                // 1. 서버 측 RPC 호출 (여기가 중요합니다!)
                // 'delete_my_account' 함수가 내부적으로 auth.users를 삭제하는지 꼭 확인하세요.
                const { error } = await supabase.rpc('delete_my_account', { p_email: user.email });
                if (error) throw error;
        
                // 2. Supabase Auth 세션 완전히 초기화
                await supabase.auth.signOut();
                
                // 3. 로컬 스토리지 및 기타 잔여 데이터 완전 삭제
                localStorage.clear(); // 모든 로컬 스토리지 초기화
                sessionStorage.clear(); // 세션 스토리지 초기화
        
                // 4. 확실하게 페이지 이동
                alert("탈퇴가 완료되었습니다. 이용해 주셔서 감사합니다.");
                window.location.href = 'index.html'; // 로그인 페이지가 아닌 메인으로 이동
            } catch (err) {
                console.error("탈퇴 에러:", err);
                showMessage("탈퇴 처리 중 오류가 발생했습니다.", false);
            }
        };
    </script>
</body>
</html>
