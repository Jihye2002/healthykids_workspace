<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>헬시키즈 | 정보 삭제</title>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; text-align: center; padding: 50px; background-color: #afe1fc; }
        .box { background: white; padding: 40px; width: 420px; margin: 50px auto; border: 2px solid #2f63c7; }
        h2 { color: #2f63c7; }
        p { color: #666; font-size: 16px; }
        
        .info-card { 
            background: #b9e0fd; 
            padding: 20px; 
            margin: 20px 0; 
            text-align: left; 
            color: #444; 
            line-height: 1.8; 
            font-size: 0.95em;
        }
        
        .btn-withdraw { background-color: #2f63c7; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-cancel { background: none; border: none; color: #777; cursor: pointer; margin-top: 15px; }
        
        #status-msg { display: none; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); padding: 20px 30px; font-weight: bold; z-index: 3000; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #155724; }
        .fail { background-color: #f8d7da; color: #721c24; border: 1px solid #721c24; }
    </style>
</head>
<body>
    
    <div id="status-msg"></div>

    <div id="withdraw-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; text-align: center; box-shadow:0 5px 15px rgba(0,0,0,0.3); max-width: 320px; border-radius: 0px;">
            <div id="withdraw-info" style="margin-bottom: 20px;"></div>
            
            <p style="font-size: 16px; color: #666; margin: 0 0 25px 0;">정말 떠나실 건가요? 😢</p>
            
            <div style="display: flex; justify-content: center; gap: 20px;">
                <button onclick="window.confirmWithdraw()" style="padding:10px 20px; background:#2f63c7; color:white; border:none; cursor:pointer;">네, 없애주세요</button>
                <button onclick="window.closeWithdrawModal()" style="padding:10px 20px; background:#ccc; color:white; border:none; cursor:pointer;">아니요!</button>
            </div>
        </div>
    </div>

    <div class="box">
        <h2>정말 떠나실 건가요? 😢</h2>
        <p>⚠️ 사용자님의 소중한 정보가 모두 사라져요.<br>탈퇴 후에는 지금까지의 모든 정보를 되돌릴 수 없어요.</p>
        
        <div class="info-card" id="user-info">
            정보를 불러오는 중이에요...
        </div>

        <button class="btn-withdraw" onclick="window.withdrawAccount()">네, 탈퇴할게요</button>
        <br>
        <button class="btn-cancel" onclick="history.back()">아니요, 더 머물래요!</button>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        let supabase = null;
        let currentUser = null;
        let loginType = null; 

        async function initSupabase() {
            try {
                const res = await fetch('/get-config');
                const config = await res.json();
                supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
                loadUserInfo();
            } catch (err) {
                console.error("초기화 실패:", err);
            }
        }

        async function loadUserInfo() {
            if (!supabase) return;
        
            const naverUser = JSON.parse(localStorage.getItem('user'));
            const { data: { session } } = await supabase.auth.getSession();
        
            if (!session?.user && (!naverUser || naverUser.provider !== 'naver')) {
                window.location.replace('index.html');
                return;
            }
        
            let data = null;
            const targetEmail = session?.user?.email || naverUser?.email;
            const provider = session?.user?.app_metadata?.provider; // google, kakao 등
        
            try {
                // 1. 소셜(구글, 카카오) 로그인인 경우: auth.users 의 메타데이터 사용
                if (['google', 'kakao'].includes(provider)) {
                    loginType = 'social';
                    // auth.users는 직접 조회 불가, 이미 가져온 session.user 데이터를 활용
                    data = {
                        name: session.user.user_metadata?.full_name || session.user.user_metadata?.name,
                        email: session.user.email,
                        nickname: session.user.user_metadata?.nickname || '없음'
                    };
                } 
                // 2. 네이버 로그인인 경우: users 테이블 사용
                else if (naverUser?.provider === 'naver') {
                    loginType = 'naver';
                    const { data: nData } = await supabase.from('users').select('*').eq('email', targetEmail).maybeSingle();
                    data = nData;
                } 
                // 3. 헬시키즈 일반 로그인인 경우: public.users 테이블 사용
                else {
                    loginType = 'local';
                    const { data: lData } = await supabase.from('public.users').select('*').eq('email', targetEmail).maybeSingle();
                    data = lData;
                }
        
                if (!data) {
                    window.location.replace('index.html');
                    return;
                }
        
                currentUser = { ...data, email: targetEmail };
                renderUI(currentUser);
            } catch (err) {
                console.error("데이터 로드 오류:", err);
            }
        }

        function renderUI(data) {
            const isSocial = loginType !== 'local';
            const userId = data.email ? data.email.split('@')[0] : '알 수 없음';
            
            // 정책 변경에 맞춰 안내 문구 구체화
            const socialGuide = isSocial 
                ? `<div style="background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9em;">
                     <strong>📢 알려드려요</strong><br>
                     소셜 계정은 모두 삭제가 불가능해요.<br>
                     탈퇴 시 소셜 계정을 제외하고 <strong>헬시키즈에서 로그인한 사용자님의 계정 정보는 모두 삭제</strong>되고, 
                     다시 로그인 할 때에는 기록이 없는 새로운 계정으로 시작돼요.<br> 그래서 회원가입을 해야 해요!
                   </div>`
                : `<p style="margin-bottom: 15px; color: #555;">일반 계정으로 로그인 중입니다.</p>`;
        
            document.getElementById('user-info').innerHTML = `
                <div style="line-height: 1.8; font-family: 'Pretendard', sans-serif;">
                    ${socialGuide}
                    <strong>이름:</strong> ${data.name || '없음'}<br>
                    <strong>아이디:</strong> ${userId}<br>
                    <strong>이메일:</strong> ${data.email || '없음'}<br>
                    <strong>별명:</strong> ${data.nickname || '없음'}<br>
                    <strong>비밀번호:</strong> ${!isSocial ? '●●●●●●●●' : '소셜 로그인'}<br>
                    <strong>질문:</strong> ${data.security_question || '없음'}<br>
                    <strong>답변:</strong> ${data.security_answer || '없음'}
                </div>
            `;

            const modalInfo = document.getElementById('withdraw-info');
            if (modalInfo) {
                modalInfo.innerHTML = socialGuide; // 위에서 선언한 socialGuide 변수 사용
            }
        }

        window.withdrawAccount = () => {
            // 이제 모달 안에 들어갈 내용은 HTML에 이미 고정되어 있거나 
            // 필요시 renderUI에서 처리하므로, 여기서는 모달창을 띄우는 기능만 수행합니다.
            const modal = document.getElementById('withdraw-modal'); 
            
            if (modal) {
                modal.style.display = 'flex';
            }
        };

        window.closeWithdrawModal = () => {
            const modal = document.getElementById('withdraw-modal');
            if (modal) {
                modal.style.display = 'none';
            }
        };
        
        window.confirmWithdraw = async () => {
            // 탈퇴 실행 전 사용자에게 다시 한번 확인받는 로직 권장
            if (!confirm("정말 탈퇴하시겠습니까? 기록은 복구할 수 없습니다.")) return;
        
            try {
                const { error } = await supabase.rpc('delete_account_by_email', { 
                    target_email: currentUser.email 
                });
        
                if (error) throw error;
        
                // 로그아웃 및 브라우저 데이터 완전 삭제
                if (loginType !== 'naver') await supabase.auth.signOut();
                
                localStorage.clear();
                sessionStorage.clear();
                
                const dbs = await indexedDB.databases();
                dbs.forEach(db => { if(db.name) indexedDB.deleteDatabase(db.name); });
        
                window.location.replace('index.html?status=withdrawn');
            } catch (err) {
                console.error("삭제 실패 상세:", err);
                window.showMessage("앗! 정리가 잠시 멈췄어요. 다시 시도해볼까요?", false);
            }
        };

        window.showMessage = (msg, isSuccess) => {
            const box = document.getElementById('status-msg');
            box.textContent = msg;
            box.className = isSuccess ? 'success' : 'fail';
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 2500);
        };

        initSupabase();
    </script>
</body>
</html>
